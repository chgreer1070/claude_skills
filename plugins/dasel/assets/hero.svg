<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <!-- Gold gradient for accents -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="50%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <!-- Purple glow gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#6c3483"/>
    </linearGradient>
    <!-- Amber highlight -->
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
    </pattern>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Soft shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <!-- Badge outer glow -->
    <filter id="badgeGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>
  <rect width="800" height="400" fill="url(#grid)"/>

  <!-- Decorative corner accents -->
  <path d="M 0 0 L 60 0 L 0 60 Z" fill="url(#goldGrad)" opacity="0.08"/>
  <path d="M 800 0 L 740 0 L 800 60 Z" fill="url(#goldGrad)" opacity="0.08"/>
  <path d="M 0 400 L 60 400 L 0 340 Z" fill="url(#goldGrad)" opacity="0.08"/>
  <path d="M 800 400 L 740 400 L 800 340 Z" fill="url(#goldGrad)" opacity="0.08"/>

  <!-- Thin gold border frame -->
  <rect x="16" y="16" width="768" height="368" rx="12" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.3"/>

  <!-- Central badge/shield shape -->
  <g transform="translate(400, 185)" filter="url(#badgeGlow)">
    <!-- Outer shield ring -->
    <ellipse cx="0" cy="0" rx="105" ry="100" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.5"/>
    <!-- Inner dark fill -->
    <ellipse cx="0" cy="0" rx="90" ry="86" fill="#0f0f20" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.9"/>

    <!-- Central data transformation icon -->
    <!-- Left bracket { -->
    <text x="-52" y="8" font-family="'Courier New', monospace" font-size="58" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle" opacity="0.9">{</text>
    <!-- Right bracket } -->
    <text x="52" y="8" font-family="'Courier New', monospace" font-size="58" font-weight="bold" fill="url(#goldGrad)" text-anchor="middle" opacity="0.9">}</text>

    <!-- Central arrow/selector symbol -->
    <g filter="url(#glow)">
      <!-- Dot selector -->
      <circle cx="-12" cy="-6" r="4" fill="url(#purpleGrad)"/>
      <!-- Arrow -->
      <line x1="-4" y1="-6" x2="20" y2="-6" stroke="url(#purpleGrad)" stroke-width="3" stroke-linecap="round"/>
      <polygon points="20,-12 32,-6 20,0" fill="url(#purpleGrad)"/>
    </g>

    <!-- Small format labels orbiting the badge -->
    <!-- JSON -->
    <g transform="translate(-70, -60)">
      <rect x="-20" y="-9" width="40" height="18" rx="4" fill="#1a1a2e" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.8"/>
      <text x="0" y="4" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#f0c040" text-anchor="middle" font-weight="600">JSON</text>
    </g>
    <!-- YAML -->
    <g transform="translate(70, -60)">
      <rect x="-20" y="-9" width="40" height="18" rx="4" fill="#1a1a2e" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.8"/>
      <text x="0" y="4" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#f0c040" text-anchor="middle" font-weight="600">YAML</text>
    </g>
    <!-- TOML -->
    <g transform="translate(-80, 10)">
      <rect x="-20" y="-9" width="40" height="18" rx="4" fill="#1a1a2e" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.8"/>
      <text x="0" y="4" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#f0c040" text-anchor="middle" font-weight="600">TOML</text>
    </g>
    <!-- XML -->
    <g transform="translate(80, 10)">
      <rect x="-17" y="-9" width="34" height="18" rx="4" fill="#1a1a2e" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.8"/>
      <text x="0" y="4" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#f0c040" text-anchor="middle" font-weight="600">XML</text>
    </g>
    <!-- CSV -->
    <g transform="translate(-45, 60)">
      <rect x="-17" y="-9" width="34" height="18" rx="4" fill="#1a1a2e" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.8"/>
      <text x="0" y="4" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#f0c040" text-anchor="middle" font-weight="600">CSV</text>
    </g>
    <!-- HCL -->
    <g transform="translate(45, 60)">
      <rect x="-17" y="-9" width="34" height="18" rx="4" fill="#1a1a2e" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.8"/>
      <text x="0" y="4" font-family="'SF Mono', 'Fira Code', monospace" font-size="9" fill="#f0c040" text-anchor="middle" font-weight="600">HCL</text>
    </g>

    <!-- Connecting dots between format labels -->
    <circle cx="-55" cy="-38" r="1.5" fill="#9b59b6" opacity="0.5"/>
    <circle cx="55" cy="-38" r="1.5" fill="#9b59b6" opacity="0.5"/>
    <circle cx="-68" cy="30" r="1.5" fill="#9b59b6" opacity="0.5"/>
    <circle cx="68" cy="30" r="1.5" fill="#9b59b6" opacity="0.5"/>
    <circle cx="-20" cy="50" r="1.5" fill="#9b59b6" opacity="0.5"/>
    <circle cx="20" cy="50" r="1.5" fill="#9b59b6" opacity="0.5"/>
  </g>

  <!-- Plugin name: "dasel" -->
  <text x="400" y="330" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="42" font-weight="700" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="6" filter="url(#shadow)">dasel</text>

  <!-- Tagline -->
  <text x="400" y="358" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#8a8a9a" text-anchor="middle" letter-spacing="3" font-weight="400">ONE TOOL FOR ALL STRUCTURED DATA</text>

  <!-- Subtle decorative lines flanking the title -->
  <line x1="220" y1="335" x2="290" y2="335" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.3"/>
  <line x1="510" y1="335" x2="580" y2="335" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.3"/>

  <!-- Small diamond accents -->
  <g transform="translate(210, 335) rotate(45)" opacity="0.4">
    <rect x="-3" y="-3" width="6" height="6" fill="url(#goldGrad)"/>
  </g>
  <g transform="translate(590, 335) rotate(45)" opacity="0.4">
    <rect x="-3" y="-3" width="6" height="6" fill="url(#goldGrad)"/>
  </g>

  <!-- Top decorative element -->
  <line x1="350" y1="50" x2="450" y2="50" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.25"/>
  <circle cx="400" cy="50" r="3" fill="url(#purpleGrad)" opacity="0.5"/>
  <circle cx="350" cy="50" r="1.5" fill="url(#goldGrad)" opacity="0.3"/>
  <circle cx="450" cy="50" r="1.5" fill="url(#goldGrad)" opacity="0.3"/>

  <!-- Floating data particles -->
  <circle cx="120" cy="100" r="2" fill="#9b59b6" opacity="0.2"/>
  <circle cx="680" cy="120" r="1.5" fill="#f0c040" opacity="0.15"/>
  <circle cx="150" cy="300" r="1.5" fill="#f0c040" opacity="0.12"/>
  <circle cx="650" cy="310" r="2" fill="#9b59b6" opacity="0.18"/>
  <circle cx="100" cy="200" r="1" fill="#f0c040" opacity="0.1"/>
  <circle cx="700" cy="220" r="1" fill="#9b59b6" opacity="0.15"/>
  <circle cx="200" cy="150" r="1.5" fill="#9b59b6" opacity="0.12"/>
  <circle cx="600" cy="170" r="1.5" fill="#f0c040" opacity="0.1"/>
</svg>