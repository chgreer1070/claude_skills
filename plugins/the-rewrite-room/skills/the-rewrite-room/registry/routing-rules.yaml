routing:
  version: "1.0"

  intent_signals:
    drift-audit:
      keywords:
        - "out of date"
        - "stale"
        - "diverged"
        - "undocumented"
        - "documented but"
        - "drift"
        - "audit docs"
        - "code changed"
        - "implemented but undocumented"
        - "documented but unimplemented"
        - "docs don't match"
        - "verify documentation"
      source_signals: [git-diff, branch-changes, code-file]
      artifact_signals: [README.md, "docs/", "references/"]

    documentation-sync:
      keywords:
        - "sync docs"
        - "doc sync"
        - "update docs"
        - "pull latest"
        - "docs behind"
        - "refresh docs"
        - "automate documentation"
        - "upstream docs"
        - "download docs"
        - "external documentation"
        - "documentation pipeline"
      source_signals: [upstream-url, external-source]
      artifact_signals: ["references/", "docs/"]

    authoring:
      keywords:
        - "rewrite"
        - "rephrase"
        - "improve tone"
        - "audience"
        - "human-facing"
        - "user-facing"
        - "make clearer"
        - "style"
        - "clarity"
        - "compress"
        - "edit prose"
        - "transform text"
        - "positive framing"
      source_signals: [inline-text, file]
      artifact_signals: [README.md, "docs/", user-facing-content]

    prompt-optimization:
      keywords:
        - "optimize prompt"
        - "improve CLAUDE.md"
        - "SKILL.md quality"
        - "agent instructions"
        - "AI-facing"
        - "prompt engineering"
        - "LLM instruction"
        - "token waste"
        - "AI comprehension"
        - "agent definition"
      source_signals: [CLAUDE.md, SKILL.md, agent-definition]
      artifact_signals: [CLAUDE.md, SKILL.md, "agents/"]

    summarization:
      keywords:
        - "summarize"
        - "summary"
        - "tldr"
        - "overview"
        - "condense"
        - "abstract"
        - "highlights"
        - "break down"
        - "explain file"
        - "synthesize"
        - "merge findings"
      source_signals: [file, url, image, multi-source]
      artifact_signals: [summary-output, report]

    formatting-validation:
      keywords:
        - "validate format"
        - "check markdown"
        - "GLFM"
        - "frontmatter valid"
        - "lint docs"
        - "formatting errors"
        - "validate SKILL.md"
        - "token complexity"
        - "broken links"
        - "frontmatter schema"
      source_signals: [file, markdown-content]
      artifact_signals: [any-markdown-file]

    research-utilities:
      keywords:
        - "discover"
        - "inventory"
        - "token count"
        - "file metrics"
        - "find all"
        - "list components"
        - "word count"
        - "how large"
        - "data extraction"
        - "extract data"
      source_signals: [directory, repo]
      artifact_signals: [inventory-report, metrics-report]

  chain_rules:
    - pattern: "drift-audit"
      chain: [drift-audit, formatting-validation]
      condition: "artifact_target is markdown"

    - pattern: "prompt-optimization"
      chain: [prompt-optimization, formatting-validation, prompt-structure-validator]
      condition: "always"

    - pattern: "documentation-sync"
      chain: [documentation-sync, drift-audit, formatting-validation]
      condition: "verify_after_sync: true"

  hybrid_resolution:
    rule: "When multiple workflows triggered, run highest-confidence first, then chain per chain_rules"
    tiebreak: "Ask user to clarify intent"

  disambiguation:
    - conflict: ["drift-audit", "authoring"]
      resolution: "If source includes git diff or code file, route drift-audit. If source is text-only, route authoring."

    - conflict: ["authoring", "prompt-optimization"]
      resolution: "If target is CLAUDE.md, SKILL.md, or agent definition, route prompt-optimization. If target is README or user-facing docs, route authoring."

    - conflict: ["drift-audit", "formatting-validation"]
      resolution: "If 'stale' or 'changed' in description with code file present, drift-audit first, chain formatting-validation."

    - conflict: ["summarization", "research-utilities"]
      resolution: "If request is to read and compress content, route summarization. If request is file size or token count only, route research-utilities."
