validators:
  - id: glfm-validator
    name: "GLFM Syntax Validator"
    script: "plugins/gitlab-skill/skills/gitlab-skill/scripts/validate_glfm.py"
    invocation: "uv run {script} --file {target}"
    requires_env: ["GITLAB_TOKEN"]
    applies_to: [gitlab-ci, merge-request-descriptions, gitlab-docs]
    hard_stop: true

  - id: frontmatter-validator
    name: "SKILL.md Frontmatter Validator"
    script: "plugins/plugin-creator/scripts/plugin_validator.py"
    invocation: "uv run {script} {target}"
    requires_env: []
    applies_to: [SKILL.md, agent-definitions]
    hard_stop: true

  - id: plugin-structure-validator
    name: "Plugin Structure Validator"
    script: "plugins/plugin-creator/scripts/plugin_validator.py"
    invocation: "uv run {script} {plugin_dir}"
    requires_env: []
    applies_to: [plugin-directories]
    hard_stop: false

  - id: link-checker
    name: "Cross-Reference Link Checker"
    script: "plugins/the-rewrite-room/skills/the-rewrite-room/scripts/link_checker.py"
    invocation: "uv run {script} check {target}"
    requires_env: []
    applies_to: [SKILL.md, agent-definitions, README.md, "docs/"]
    hard_stop: true

  - id: fidelity-enforcer
    name: "Summarization Fidelity Enforcer"
    type: "prompt-hook"
    rules_ref: "./references/fidelity-rules.md"
    applies_to: [summarization-output]
    hard_stop: true
    checks:
      - "source was read before summarizing (Rule 1)"
      - "counts and specifics preserved (Rule 3)"
      - "absence vs nonexistence language correct (Rule 4)"
      - "no lossy re-summarization (Rule 5)"
      - "confidence stated explicitly (Rule 6)"

  - id: prompt-structure-validator
    name: "Prompt Optimization Structure Validator"
    type: "pattern-check"
    applies_to: [CLAUDE.md, SKILL.md, agent-definitions]
    hard_stop: false
    checks:
      - "required sections present"
      - "examples included"
      - "no prohibition-only patterns without alternatives"
      - "frontmatter description free of colons (except URLs)"
      - "allowed-tools is comma-separated string (not YAML array)"

  - id: cross-reference-validator
    name: "Cross-Reference Validator"
    type: "pattern-check"
    applies_to: [SKILL.md, "docs/", README.md]
    hard_stop: false
    checks:
      - "all relative markdown links resolve to existing files"
      - "no absolute paths in markdown links"
      - "skill activation references use Skill() syntax"
