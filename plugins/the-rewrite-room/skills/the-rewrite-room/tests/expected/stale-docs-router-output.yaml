test: stale-docs-after-refactor
description: "Docs reference process_items but code implements process_data — stale function name"
expected_workflow: drift-audit
expected_chain:
  - drift-audit
  - formatting-validation
expected_validators:
  - link-checker
  - citation-check
expected_status: DONE
required_findings:
  - type: stale-reference
    target: process_items
    evidence_required: true
    evidence_format: "file:line"
    description: "docs.md references process_items which no longer exists in code.py"
  - type: signature-mismatch
    target: process_data
    evidence_required: true
    description: "Return type and parameter type annotations differ between docs and code"
forbidden_in_output:
  - "likely"
  - "probably"
  - "I think"
  - "may have"
