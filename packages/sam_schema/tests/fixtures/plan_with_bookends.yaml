feature: bookend-demo
version: "1.0"
description: |
  Demo plan with T0 and TN bookend tasks and structured acceptance criteria.
acceptance-criteria-structured:
  - criterion-id: AC-1
    description: "Models exist and validate"
    check-command: "uv run pytest tests/test_models.py -v"
    expected-baseline: fail
    expected-final: pass
  - criterion-id: AC-2
    description: "Linting passes"
    check-command: "uv run ruff check src/"
    expected-baseline: pass
    expected-final: pass
tasks:
  - id: T0
    title: Capture baseline state
    status: not-started
    agent: t0-baseline-capture
    dependencies: []
    priority: 1
    complexity: low
    is-bookend: true
    bookend-type: t0-baseline
  - id: T1
    title: Implement models
    status: not-started
    agent: python3-development:python-cli-architect
    dependencies:
      - T0
    priority: 2
    complexity: medium
  - id: T2
    title: Add tests
    status: not-started
    agent: python3-development:python-pytest-architect
    dependencies:
      - T1
    priority: 3
    complexity: medium
  - id: T99
    title: Verify implementation against baseline
    status: not-started
    agent: tn-verification-gate
    dependencies:
      - T1
      - T2
    priority: 5
    complexity: low
    is-bookend: true
    bookend-type: tn-verification
