context: |-
  ## Context Manifest

  ### How This Currently Works: task_status_hook.py

  When a Claude Code hook event fires (PostToolUse or SubagentStop), the Claude Code runtime invokes `task_status_hook.py` as a subprocess, passing a JSON payload on stdin. The script lives at `plugins/development-harness/skills/implementation-manager/scripts/task_status_hook.py` and is the sole hook script shared by two different SKILL.md declarations.

  The script's `main()` function calls `parse_hook_input()` to consume stdin JSON, then reads `hook_event_name` from the parsed dict and dispatches to one of two handlers:

  1. **SubagentStop** -> `handle_subagent_stop(hook_input)`: Extracts the task file path and task ID from the sub-agent's prompt text (via regex patterns matching `/start-task` or `Skill(skill="start-task", ...)` invocations). Falls back to reading `.claude/context/active-task-{session_id}.json` if prompt parsing fails. Then calls `sam_update_status(full_path, task_id, SamTaskStatus.COMPLETE, timestamp_field="completed")` to mark the task complete. Cleans up the context file and calls `sync_completion_to_github()` for best-effort GitHub sync.

  2. **PostToolUse** (when `tool_name` is Write, Edit, or Bash) -> `handle_activity_update(hook_input)`: Reads the active task context file to get the task file path and task ID. Guards against updating already-complete tasks by calling `sam_get_task()` and checking status. Then calls `sam_update_plan_fields(full_path, task_id, set_fields={"last-activity": timestamp})` to update the LastActivity timestamp.

  There is currently NO environment variable check, NO profile branching, and NO early-exit path based on configuration. Every invocation runs the full handler for its event type. The PostToolUse hook fires on every Write/Edit/Bash call during task execution (30-50 times per typical task), each performing stdin JSON parse, context file read, sam_get_task lookup, and sam_update_plan_fields file write.

  ### Hook Declarations in SKILL.md Files

  Two SKILL.md files declare hooks that invoke this script. Neither file needs modification for this feature — all changes are confined to the Python script itself.

  **`plugins/development-harness/skills/start-task/SKILL.md`** declares a PostToolUse hook:

  ```yaml
  hooks:
    PostToolUse:
    - matcher: Write|Edit|Bash
      hooks:
      - type: command
        command: python3 "${CLAUDE_SKILL_DIR}/../../implementation-manager/scripts/task_status_hook.py"
  ```

  **`plugins/development-harness/skills/implement-feature/SKILL.md`** declares a SubagentStop hook:

  ```yaml
  hooks:
    SubagentStop:
    - hooks:
      - type: command
        command: python3 "${CLAUDE_SKILL_DIR}/../../implementation-manager/scripts/task_status_hook.py"
  ```

  ### Import Structure and sys.path Manipulation

  The script uses `from __future__ import annotations` and imports from `sam_schema` which is located at `plugins/development-harness/sam_schema/`. The script resolves the repo root as `Path(__file__).resolve().parents[5]` and adds a packages directory to `sys.path`. The actual sam_schema package is a workspace dependency installed in the project venv, with a fallback sys.path insertion for direct-script execution.

  Key imports from sam_schema used by the script:

  - `sam_schema.core.models.TaskStatus` (StrEnum): values are `"not-started"`, `"in-progress"`, `"complete"`, `"blocked"`, `"deferred"`, `"skipped"`
  - `sam_schema.core.query.get_task(plan_path, task_id) -> Task`: loads plan, finds task by ID. Raises `KeyError` if not found, `FileNotFoundError` if plan missing.
  - `sam_schema.core.query.update_plan_fields(plan_path, task_id, *, set_fields, ...)`: updates task-level fields via YAML read-modify-write.
  - `sam_schema.core.query.update_status(plan_path, task_id, new_status, timestamp_field)`: updates status and optional timestamp atomically.

  The `backlog_core` module is conditionally imported for GitHub sync only, guarded by path existence check.

  ### Task Model Fields Relevant to Strict Mode

  The `Task` Pydantic model (at `plugins/development-harness/sam_schema/core/models.py`) has these fields relevant to the strict-mode validation checks specified in the architect spec:

  - `status: TaskStatus` — strict check #1 verifies this is `IN_PROGRESS` (not `NOT_STARTED`) to confirm the task was claimed before completion
  - `acceptance_criteria: str` — strict check #2 verifies this is non-empty, confirming acceptance criteria were defined

  The `sam_get_task()` function returns a full `Task` model instance, so strict checks can inspect `task.status` and `task.acceptance_criteria` directly without additional file I/O.

  ### For New Feature Implementation: What Needs to Change

  Since all changes are confined to `task_status_hook.py`, this is a single-file modification. The architect spec calls for:

  1. A `HookProfile` StrEnum with three values: `minimal`, `standard`, `strict`
  2. Constants `HOOK_ID_POST_TOOL_USE = "task-status:post-tool-use"` and `HOOK_ID_SUBAGENT_STOP = "task-status:subagent-stop"`
  3. A mapping `_EVENT_TO_HOOK_ID: dict[str, str]` from event names to hook IDs
  4. Three new functions: `resolve_profile()`, `parse_disabled_hooks()`, `should_skip_hook()`
  5. One new function: `run_strict_pre_completion_checks()`
  6. Three new lines in `main()` between stdin parsing and event dispatch
  7. A modified signature for `handle_subagent_stop()` adding `profile: HookProfile = HookProfile.STANDARD`

  The critical insertion point in `main()` is between line 436 (`event_name = hook_input.get("hook_event_name", "")`) and line 438 (`if event_name == "SubagentStop":`). The new profile/disable logic goes there, calling `sys.exit(0)` if the hook should be skipped.

  The new code must use only stdlib + existing sam_schema imports. `enum.StrEnum` requires Python 3.11+ which matches the project minimum. `os.environ.get()` is used for env var reads. No new dependencies.

  ### Environment Variable Contracts

  `CLAUDE_SKILLS_HOOK_PROFILE`: case-sensitive lowercase string, valid values `"minimal"`, `"standard"`, `"strict"`. Default when unset/empty: `"standard"`. Invalid values: warn to stderr, use `"standard"`.

  `CLAUDE_SKILLS_DISABLED_HOOKS`: comma-separated hook IDs. Each ID stripped of whitespace. Empty segments excluded. Unknown IDs silently ignored for forward compatibility. Default when unset/empty: empty set.

  Disabled hooks take precedence over profile. If both `HOOK_PROFILE=strict` and `DISABLED_HOOKS=task-status:subagent-stop` are set, SubagentStop is skipped entirely (no strict checks run).

  ### Profile Behavior Matrix

  - `minimal`: PostToolUse SKIPPED (exit 0), SubagentStop RUNS normally, no strict checks
  - `standard`: PostToolUse RUNS, SubagentStop RUNS, no strict checks (current behavior exactly)
  - `strict`: PostToolUse RUNS, SubagentStop RUNS with pre-completion validation warnings to stderr

  Strict mode warnings are observational only — they print to stderr but do NOT prevent completion. ADR-001 in the architect spec explains why: hook scripts that exit non-zero kill the hook chain, and blocking completion after the sub-agent has finished its work cannot undo the work.

  ### Exit Code and stdin Constraints

  - Disabled/skipped hooks MUST exit 0 (non-zero is treated as error by Claude Code)
  - stdin MUST be consumed even when skipping (profile/disable checks run AFTER `parse_hook_input()`)
  - This means the skip check placement is: after `parse_hook_input()` (consumes stdin), after extracting `event_name`, before any sam_schema operations

  ### Technical Reference Details

  #### Current main() Structure (Lines 428-450)

  ```python
  def main() -> None:
      try:
          hook_input = parse_hook_input()
      except (ValueError, json.JSONDecodeError) as e:
          print(f"Failed to parse hook input: {e}", file=sys.stderr)
          sys.exit(2)

      event_name = hook_input.get("hook_event_name", "")

      # NEW CODE GOES HERE: resolve_profile, parse_disabled_hooks, should_skip_hook

      if event_name == "SubagentStop":
          handle_subagent_stop(hook_input)  # MODIFY: pass profile parameter
      elif event_name == "PostToolUse":
          tool_name = hook_input.get("tool_name", "")
          if tool_name in {"Write", "Edit", "Bash"}:
              handle_activity_update(hook_input)
      sys.exit(0)
  ```

  #### New Function Signatures

  ```python
  class HookProfile(enum.StrEnum):
      MINIMAL = "minimal"
      STANDARD = "standard"
      STRICT = "strict"

  def resolve_profile() -> HookProfile:
      """Returns HookProfile.STANDARD when unset/empty. Warns to stderr for unknown values."""

  def parse_disabled_hooks() -> set[str]:
      """Returns empty set when unset/empty. Splits on comma, strips whitespace."""

  def should_skip_hook(event_name: str, profile: HookProfile, disabled_hooks: set[str]) -> bool:
      """True if hook should be skipped. Checks disabled set first, then profile rules."""

  def run_strict_pre_completion_checks(task_file_path: Path, task_id: str, hook_input: dict[str, Any]) -> list[str]:
      """Returns list of warning strings. Empty list = all checks pass."""

  def handle_subagent_stop(hook_input: dict[str, Any], profile: HookProfile = HookProfile.STANDARD) -> None:
      """Modified: gains optional profile parameter. Calls strict checks when profile is STRICT."""
  ```

  #### sam_schema API Used by Strict Checks

  ```python
  # Get task to check status and acceptance_criteria
  from sam_schema.core.query import get_task as sam_get_task
  task = sam_get_task(task_file_path, task_id)  # raises KeyError, FileNotFoundError
  task.status  # TaskStatus enum, compare against TaskStatus.IN_PROGRESS
  task.acceptance_criteria  # str, check for non-empty
  ```

  #### Constants

  ```python
  HOOK_ID_POST_TOOL_USE = "task-status:post-tool-use"
  HOOK_ID_SUBAGENT_STOP = "task-status:subagent-stop"

  _EVENT_TO_HOOK_ID: dict[str, str] = {
      "PostToolUse": HOOK_ID_POST_TOOL_USE,
      "SubagentStop": HOOK_ID_SUBAGENT_STOP,
  }
  ```

  #### Skip Log Format

  ```text
  [hook] Skipped: {handler_name} (profile={profile})
  [hook] Skipped: {handler_name} (disabled)
  ```

  #### File Locations

  - Implementation target: `plugins/development-harness/skills/implementation-manager/scripts/task_status_hook.py`
  - sam_schema models: `plugins/development-harness/sam_schema/core/models.py`
  - sam_schema query API: `plugins/development-harness/sam_schema/core/query.py`
  - Test file: `tests/test_task_status_hook_profiles.py`
  - Feature context: `plan/feature-context-hook-profile-controls.md`
  - Architecture spec: `plan/architect-hook-profile-controls.md`
  - No SKILL.md files modified
  - No pyproject.toml changes
  - No new files created (except test file)

  #### Existing Imports in task_status_hook.py (Do Not Duplicate)

  ```python
  from __future__ import annotations
  import json, re, sys, contextlib
  from datetime import UTC, datetime
  from pathlib import Path
  from typing import Any
  from sam_schema.core.models import TaskStatus as SamTaskStatus
  from sam_schema.core.query import get_task as sam_get_task, update_plan_fields as sam_update_plan_fields, update_status as sam_update_status
  ```

  New imports needed: `import enum`, `import os` (both stdlib, already available).
