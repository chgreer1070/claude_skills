  context-notes: |
    ## Objective

    Add HookProfile enum (minimal/standard/strict), environment variable parsing for CLAUDE_SKILLS_HOOK_PROFILE and CLAUDE_SKILLS_DISABLED_HOOKS, skip logic in main(), and strict validation checks to task_status_hook.py. All changes are confined to the single script at plugins/development-harness/skills/implementation-manager/scripts/task_status_hook.py. No new files, no new dependencies, no SKILL.md modifications. When no environment variables are set, behavior is identical to the current codebase.

    ## Requirements

    Primary implementation file: plugins/development-harness/skills/implementation-manager/scripts/task_status_hook.py

    Architecture spec: plan/architect-hook-profile-controls.md

    Environment variables to implement:
    - CLAUDE_SKILLS_HOOK_PROFILE: valid values are 'minimal', 'standard', 'strict' (case-sensitive, lowercase). Default when unset or empty: 'standard'. Invalid value behavior: print warning to stderr ('[hook] Unknown profile "{value}", using "standard"') and use standard.
    - CLAUDE_SKILLS_DISABLED_HOOKS: comma-separated list of hook IDs. Whitespace-stripped per ID. Empty segments excluded. Unknown IDs silently ignored. Default when unset or empty: empty set.

    Hook ID format (from arch spec section 5): {script-name}:{handler-name}
    - HOOK_ID_POST_TOOL_USE = 'task-status:post-tool-use'
    - HOOK_ID_SUBAGENT_STOP = 'task-status:subagent-stop'

    New components to add (from arch spec section 4):
    - HookProfile(enum.StrEnum) with MINIMAL, STANDARD, STRICT members
    - resolve_profile() -> HookProfile
    - parse_disabled_hooks() -> set[str]
    - should_skip_hook(event_name, profile, disabled_hooks) -> bool
    - run_strict_pre_completion_checks(task_file_path, task_id, hook_input) -> list[str]
    - Modified main(): profile/disable checks after parse_hook_input() and before dispatch
    - Modified handle_subagent_stop(): gains optional profile parameter (default STANDARD), calls run_strict_pre_completion_checks when strict

    Constraints (from feature context section environment-constraints):
    - Skipped hooks must exit 0, not error
    - stdin must be consumed even when skipping (parse_hook_input runs before skip check)
    - DISABLED_HOOKS takes precedence over HOOK_PROFILE
    - Strict mode warns only, does not prevent completion

    ## Acceptance Criteria

    - [ ] Profile parsing: resolve_profile() returns HookProfile.STANDARD when CLAUDE_SKILLS_HOOK_PROFILE is unset, returns the correct HookProfile member for each valid value ('minimal', 'standard', 'strict'), and prints a stderr warning and returns STANDARD for any unrecognized value
    - [ ] Minimal profile skips PostToolUse: when CLAUDE_SKILLS_HOOK_PROFILE=minimal, handle_activity_update is NOT called for PostToolUse events; the hook exits 0
    - [ ] Minimal profile does not skip SubagentStop: when CLAUDE_SKILLS_HOOK_PROFILE=minimal, handle_subagent_stop IS called normally for SubagentStop events
    - [ ] Disabled hooks: when CLAUDE_SKILLS_DISABLED_HOOKS=task-status:post-tool-use, PostToolUse handler is skipped and exits 0; when value is task-status:subagent-stop, SubagentStop handler is skipped and exits 0
    - [ ] Disabled hooks take precedence over profile: HOOK_PROFILE=strict with DISABLED_HOOKS=task-status:subagent-stop causes SubagentStop to exit 0 without running strict checks
    - [ ] Strict mode validation: when HOOK_PROFILE=strict and SubagentStop fires, run_strict_pre_completion_checks is called; warnings for unclaimed task (NOT_STARTED) or empty acceptance criteria are printed to stderr; completion proceeds regardless
    - [ ] Backward compatibility: when neither CLAUDE_SKILLS_HOOK_PROFILE nor CLAUDE_SKILLS_DISABLED_HOOKS is set, behavior is identical to the current codebase for both SubagentStop and PostToolUse events
    - [ ] stdin is always consumed: parse_hook_input() is called before any skip/profile check, so stdin is drained even on early exit

    ## Verification Steps

    1. Run with HOOK_PROFILE=minimal and a synthetic PostToolUse stdin payload: verify handle_activity_update is NOT invoked and the process exits 0 (use monkeypatch in the test suite or manually mock the handler to assert it was not called)
    2. Run with HOOK_PROFILE=minimal and a synthetic SubagentStop stdin payload: verify handle_subagent_stop IS invoked normally and the process exits 0
    3. Run with no environment variables set and both SubagentStop and PostToolUse payloads: verify behavior is identical to the pre-patch codebase (same exit code, same file mutations, same stderr output) — backward compatibility check
    4. Run with an invalid HOOK_PROFILE value (e.g., 'MINIMAL' or 'fast'): verify the script prints the warning format '[hook] Unknown profile "{value}", using "standard"' to stderr and continues with standard behavior
    5. Run with DISABLED_HOOKS=task-status:subagent-stop and a SubagentStop payload: verify the handler is skipped and exits 0; run with DISABLED_HOOKS=task-status:post-tool-use and a PostToolUse payload: verify the handler is skipped and exits 0
    6. Run with HOOK_PROFILE=strict and a SubagentStop payload for a task in NOT_STARTED status: verify a warning about unclaimed task appears on stderr and completion still proceeds (task status marked COMPLETE)
    7. Confirm no SKILL.md files were modified: run git diff --name-only and verify no start-task/SKILL.md or implement-feature/SKILL.md appears in the diff
