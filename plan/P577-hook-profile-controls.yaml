version: '1.0'
description: ''
goal: |-
  Add environment-variable-based profile controls (CLAUDE_SKILLS_HOOK_PROFILE, CLAUDE_SKILLS_DISABLED_HOOKS) to task_status_hook.py enabling minimal/standard/strict profiles and per-hook disablement without SKILL.md edits
