feature: redesign-work-milestone-worktree-agents
version: '1.0'
description: ''
goal: |-
  Replace TeamCreate dispatch in /work-milestone with Agent(isolation: worktree) calls
context: See Context Manifest section below.
issue: '970'

tasks:
- id: T01
  title: 'Rewrite work-milestone SKILL.md — replace TeamCreate dispatch with Agent(isolation:
    worktree)'
  status: complete
  agent: plugin-creator:contextual-ai-documentation-optimizer
  priority: 1
  complexity: high
  skills:
  - plugin-creator:claude-plugins-reference-2026
  - plugin-creator:claude-skills-overview-2026
  description: |
    ## Context

    The work-milestone SKILL.md currently uses TeamCreate to spawn parallel teammates
    for milestone item execution. TeamCreate teammates lack the Agent tool, making the
    SAM pipeline non-functional inside teammates.

    ## Objective

    Rewrite the dispatch flow (Steps 4-7) to use Agent(isolation: "worktree") calls
    instead of TeamCreate. The orchestrator spawns one worktree agent per item per wave,
    waits for all to return, then merges worktree branches into the integration branch.

    ## Requirements

    - Remove ALL TeamCreate, SendMessage, and teammate references from SKILL.md
    - Replace Step 5 (TeamCreate spawn) with parallel Agent(isolation: "worktree") dispatch
    - Replace Step 6 (Monitor via SendMessage) with "Wait for all agents to return"
    - Replace Step 7 (Merge Queue with SendMessage coordination) with sequential merge of worktree branches
    - Add pre-decomposition step: orchestrator reads SAM plan and backlog item before dispatch, builds per-agent prompt
    - Add discovery relay step between waves: collect agent outputs, feed into next wave prompts
    - Update Tools Used: remove TeamCreate, SendMessage; add Agent(isolation: worktree)
    - Update Error Conditions: remove "Worker no heartbeat"; add "Agent returned with PARTIAL status"
    - Update references section: team-member-protocol.md -> worktree-worker-protocol.md
    - Include the worktree agent prompt template from architect spec Component 2
    - Include the completion report format (STATUS/BRANCH/TASKS_COMPLETED/FILES_CHANGED/COMMITS/NOTES)
    - Include conflict handling flow from architect spec Component 5
    - Replace the existing Mermaid flowchart with the revised workflow diagram from architect spec

    ## Source Files

    - Current SKILL.md: plugins/development-harness/skills/work-milestone/SKILL.md
    - Architecture spec: plan/architect-redesign-work-milestone-worktree-agents.md (Components 1-6 and Revised Workflow Diagram)
    - Feature context: plan/feature-context-redesign-work-milestone-worktree-agents.md
  acceptance-criteria: |
    - No occurrences of TeamCreate, SendMessage, or "teammate" in the rewritten SKILL.md
    - Dispatch flow uses Agent(isolation: "worktree") for item execution
    - Pre-decomposition step reads SAM plan and backlog item before agent spawn
    - Discovery relay section describes how agent outputs feed into next wave prompts
    - Worktree agent prompt template is included with all template variables documented
    - Completion report format (STATUS, BRANCH, TASKS_COMPLETED, FILES_CHANGED, COMMITS, NOTES) is specified
    - Conflict handling flow covers trivial/medium/heavy classification with resolution strategy
    - Mermaid flowchart reflects the new architecture (no TeamCreate nodes)
    - Tools Used section lists Agent(isolation: worktree) and removes TeamCreate/SendMessage
    - Error Conditions section covers PARTIAL status and agent failure scenarios
  verification-steps: |
    - grep -c "TeamCreate\|SendMessage\|teammate" SKILL.md returns 0
    - SKILL.md contains "Agent(isolation" or "isolation: worktree" or "isolation: \"worktree\""
    - SKILL.md contains "discovery relay" or "Discovery Relay" section
    - SKILL.md contains completion report format with STATUS and BRANCH fields
    - SKILL.md references worktree-worker-protocol.md (not team-member-protocol.md)
    - Mermaid flowchart renders without syntax errors (no bare colons in quoted strings, no \n in labels)
  started: '2026-03-21T22:03:32.992260+00:00'
- id: T02
  title: Rename team-member-protocol.md to worktree-worker-protocol.md and
    rewrite for worktree agent context
  status: complete
  agent: plugin-creator:contextual-ai-documentation-optimizer
  priority: 1
  complexity: high
  skills:
  - plugin-creator:claude-plugins-reference-2026
  description: |
    ## Context

    The current team-member-protocol.md defines a 12-step lifecycle (M1-M12) built around
    SendMessage, peer announcements, domain overlap detection, and design alignment. All of
    these depend on inter-agent communication that worktree agents lack.

    ## Objective

    Create worktree-worker-protocol.md as the replacement protocol for worktree agents.
    Delete team-member-protocol.md after the new file is created.

    ## Requirements

    Sections to REMOVE entirely (from architect spec 7.1):
    - M2 (Announce to Team via SendMessage)
    - M3/M3a (Domain Overlap / Initial Alignment)
    - M4a (State Broadcasts via SendMessage)
    - M4b/M4c (Peer Overlap Alert / Runtime Alignment)
    - M5/M6/M7 (Blocker reporting via SendMessage)
    - M10 (Signal Completion via SendMessage)
    - M11/M12 (Await Merge Outcome / Assign Back)
    - State Broadcast Fields section
    - Design Decision Persistence section
    - Design Alignment Protocol
    - Blocker Types table

    Sections to RETAIN (modified for worktree context):
    - M1 (Setup) — verify worktree is on correct branch, enable constant commits
    - M4 (Execute Work) — change from /work-backlog-item --auto to direct task execution
    - M8 (Item Complete) — completion check
    - M9 (Pre-Verify) — run quality gates, commit all changes
    - Constant Commits Protocol — retained as-is
    - Domain Detection — retained for informational context

    New sections to ADD:
    - Completion Report Format — structured output for orchestrator parsing (STATUS/BRANCH/etc.)
    - Blocker Handling — complete what you can, report blocked tasks in completion report
    - Skill Loading — how the agent loads required skills at startup
    - Direct Task Execution — how to read and execute SAM tasks without Agent delegation

    ## Source Files

    - Current protocol: plugins/development-harness/skills/work-milestone/references/team-member-protocol.md
    - Architecture spec: plan/architect-redesign-work-milestone-worktree-agents.md (Component 2 and 7.1)
  acceptance-criteria: |
    - worktree-worker-protocol.md exists at plugins/development-harness/skills/work-milestone/references/
    - team-member-protocol.md is deleted (git rm)
    - No occurrences of SendMessage, TeamCreate, "teammate", or "peer" in the new protocol
    - Protocol covers: setup, skill loading, direct task execution, completion report, blocker handling
    - Completion Report Format section matches the template from architect spec (STATUS/BRANCH/TASKS_COMPLETED/FILES_CHANGED/COMMITS/NOTES)
    - Constant Commits Protocol section is retained
    - Quality gates / pre-verify section is retained
    - No references to M2, M3, M4a, M4b, M4c, M5, M6, M7, M10, M11, M12 lifecycle steps
  verification-steps: |
    - File exists: plugins/development-harness/skills/work-milestone/references/worktree-worker-protocol.md
    - File deleted: plugins/development-harness/skills/work-milestone/references/team-member-protocol.md
    - grep -c "SendMessage\|TeamCreate\|teammate\|\"peer\"" worktree-worker-protocol.md returns 0
    - worktree-worker-protocol.md contains "Completion Report" section
    - worktree-worker-protocol.md contains "Skill Loading" section
    - worktree-worker-protocol.md contains "constant commit" or "Constant Commits" section
