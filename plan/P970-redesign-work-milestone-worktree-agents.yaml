  - T03
  - T04
  priority: 3
  complexity: low
  description: |
    ## Context

    .claude/rules/local-workflow.md documents the SAM pipeline (Phase 2: /implement-feature
    execution loop). The /work-milestone skill operates at a different level — it dispatches
    multiple backlog items in parallel across worktrees. A forward reference is needed to
    clarify this boundary.

    ## Objective

    Add a forward reference in the Phase 2 section of local-workflow.md clarifying the
    boundary between SAM task execution (per-item) and milestone dispatch (multi-item parallel).

    ## Requirements

    Per architect spec 7.4, add text like:

    "Note: Phase 2 describes the SAM task execution loop within a single backlog item
    (/implement-feature -> /start-task per task). Milestone-level dispatch (multiple
    backlog items in parallel across worktrees) is handled by /work-milestone, which
    uses Agent(isolation: "worktree") per item — not the SAM execution loop. See
    plugins/development-harness/skills/work-milestone/SKILL.md."

    - Place this at the end of the Phase 2 section or as a callout within it
    - Do NOT modify any existing Phase 2 content
    - Keep the addition concise

    ## Source Files

