- id: T03
  title: Update merge-queue-protocol.md for agent-return signaling instead of
    SendMessage
  status: complete
  agent: plugin-creator:contextual-ai-documentation-optimizer
  dependencies:
  - T01
  priority: 2
  complexity: medium
  skills:
  - plugin-creator:claude-plugins-reference-2026
  description: |
    ## Context

    The merge-queue-protocol.md currently references SendMessage for completion signaling,
    gate failure notifications, and assign_back procedures. With worktree agents, completion
    is signaled by Agent call return, not SendMessage.

    ## Objective

    Update merge-queue-protocol.md to reflect the new signaling model while retaining
    all conflict classification logic and quality gate commands.

    ## Requirements

    Per architect spec 7.2:
    - Add note at top: completion signaling is via Agent call return, not SendMessage COMPLETE
    - Replace "Worker signals COMPLETE" with "Agent returns"
    - Replace "SendMessage to worker" with "orchestrator processes return"
    - Replace "Gate failure sent to worker via SendMessage" with "Orchestrator spawns fix agent"
    - Retain ALL conflict classification logic unchanged (trivial/medium/heavy)
    - Modify assign_back: no PR creation (branches are local), no SendMessage to workers;
      instead create backlog item for next wave
    - Retain quality gate commands section unchanged
    - Retain integration branch landing section unchanged

    ## Source Files

    - Current protocol: plugins/development-harness/skills/work-milestone/references/merge-queue-protocol.md
    - Architecture spec: plan/architect-redesign-work-milestone-worktree-agents.md (Component 5 and 7.2)
  acceptance-criteria: |
    - No occurrences of "SendMessage" in merge-queue-protocol.md
    - Completion signaling described as Agent call return
    - Conflict classification logic (trivial/medium/heavy) is preserved
    - assign_back procedure updated: no PR creation, creates backlog item instead
    - Quality gate commands section is unchanged
    - Integration branch landing section is unchanged
    - "Orchestrator spawns fix agent" replaces "Gate failure sent to worker"
  verification-steps: |
    - grep -c "SendMessage" merge-queue-protocol.md returns 0
    - merge-queue-protocol.md contains "Agent" and "return" in proximity (agent-return signaling)
    - merge-queue-protocol.md contains "trivial" and "medium" and "heavy" (conflict classification retained)
    - merge-queue-protocol.md contains "backlog item" in assign_back context
    - merge-queue-protocol.md contains "quality gate" or "Quality Gate" section
