- id: T04
  title: Review dispatch-plan-schema.md and add worktree-agent clarifying notes
  status: complete
  agent: plugin-creator:contextual-ai-documentation-optimizer
  dependencies:
  - T01
  priority: 2
  complexity: low
  skills:
  - plugin-creator:claude-plugins-reference-2026
  description: |
    ## Context

    The architect spec (7.3) determined that NO schema changes are needed to
    dispatch-plan-schema.md. The existing wave/item fields contain everything
    the orchestrator needs. However, clarifying notes should be added to explain
    the relationship between the dispatch plan and worktree agent dispatch.

    ## Objective

    Add clarifying notes to dispatch-plan-schema.md explaining:
    - Agent isolation mode is always "worktree" — hardcoded in orchestrator logic, not in schema
    - Agent type is not configurable per item — all worktree agents use the same prompt template
    - Skills are read from the SAM task plan, not the dispatch plan
    - The dispatch plan's conflict groups handle serialization; no runtime coordination fields needed

    ## Requirements

    - Do NOT modify any existing schema fields or their definitions
    - Add a "Notes" or "Execution Model" section explaining the above points
    - Keep the addition concise (under 20 lines of content)

    ## Source Files

    - Current schema: plugins/development-harness/skills/work-milestone/references/dispatch-plan-schema.md
    - Architecture spec: plan/architect-redesign-work-milestone-worktree-agents.md (section 7.3)
  acceptance-criteria: |
    - dispatch-plan-schema.md has a new section explaining worktree agent dispatch relationship
    - No existing schema field definitions are modified
    - Notes explain that isolation mode is hardcoded, not schema-configured
    - Notes explain that skills come from SAM task plan, not dispatch plan
    - Addition is concise and does not duplicate content from SKILL.md
  verification-steps: |
    - dispatch-plan-schema.md contains "worktree" in the new section
    - dispatch-plan-schema.md contains "SAM" or "sam" reference for skills sourcing
    - No existing field definitions were removed or modified (diff shows only additions)
    - New content is under 30 lines
