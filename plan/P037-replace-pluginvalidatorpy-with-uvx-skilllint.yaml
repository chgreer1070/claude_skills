ml | wc -l\n# Expected: 0\ngrep \"skilllint\" .pre-commit-config.yaml\n# Expected: shows the new hook definition\n```\n\n---\n\n# Task 1.2: Update CI workflows\n\n**Status**: NOT STARTED\n**Priority**: 1\n**Complexity**: Low\n**Agent**: general-purpose\n**Dependencies**: Task 1.1\n\n## Description\n\nUpdate `.github/workflows/code-quality.yml`:\n- Line ~180: Update comment from `plugin_validator.py` to `skilllint`\n- Line ~209: `run: uv run prek run plugin-validator --all-files` ‚Üí use `uvx skilllint@latest check` directly (since `--all-files` doesn't exist, use `uvx skilllint@latest check plugins/` or keep prek with new hook id `skilllint`)\n- Line ~270: Update `SKIP: ...,plugin-validator,...` to `SKIP: ...,skilllint,...`\n\n**Note on line 209**: Since prek uses hook ids, if the hook id changed to `skilllint` in Task 1.1, then `uv run prek run skilllint --all-files` is the correct form. Verify the prek hook run syntax.\n\n## Acceptance Criteria\n\n- [ ] No `plugin-validator` or `plugin_validator` references remain in `.github/workflows/code-quality.yml`\n- [ ] CI uses either `uvx skilllint@latest check` directly or `uv run prek run skilllint --all-files`\n\n## Verification\n\n```bash\ngrep \"plugin.validator\\|plugin_validator\" .github/workflows/code-quality.yml | wc -l\n# Expected: 0\n```\n\n---\n\n# Task 1.3: Update project rules\n\n**Status**: NOT STARTED\n**Priority**: 1\n**Complexity**: Low\n**Agent**: general-purpose\n**Dependencies**: None\n\n## Description\n\nUpdate 3 files in `.claude/rules/`:\n\n1. `.claude/rules/delegation-format.md` line ~73: `Q{Run: uv run plugin_validator.py path<br>Exit code?}` ‚Üí `Q{Run: uvx skilllint@latest check path<br>Exit code?}`\n2. `.claude/rules/uv-run-fallback.md` line ~9: `uv run plugins/plugin-creator/scripts/plugin_validator.py <path>` ‚Üí `uvx skilllint@latest check <path>`\n3. `.claude/rules/language-conventions.md` line ~52: update `plugin-validator \\`NameFormatValidator\\`` ‚Üí `skilllint \\`NameFormatValidator\\