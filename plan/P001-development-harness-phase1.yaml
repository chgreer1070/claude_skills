  ## Overview and Project Structure

  The development-harness plugin (directory: `plugins/development-harness/`) implements a 7-stage SAM (Stateless Agent Methodology) pipeline that orchestrates feature development. Phase 1 completes five deliverables: (0) namespace rename from "development-harness" to "dh" in plugin.json and all references, (1) SDLC stage naming taxonomy document ratifying 7 stages against IEEE 12207/ISO 15288/SAFe, (2) naming audit applying taxonomy to manifests with testing-verification → testing-final-verification rename, (3) executable PoC validation guide for end-to-end dispatch, (4) agent sync from python3-development with dh namespace applied.

  **Critical invariant**: The directory `plugins/development-harness/` NEVER changes name. Only the plugin namespace (JSON name field and all /development-harness: and @development-harness: text references) changes to dh.

