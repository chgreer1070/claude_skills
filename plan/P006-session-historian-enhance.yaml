- id: T5
  title: Implement current-path command
  status: complete
  agent: python-cli-architect
  dependencies:
  - T4
  priority: 2
  complexity: low
  skills:
  - python3-development
  started: '2026-03-11T17:20:00Z'
  completed: '2026-03-11T17:25:00Z'
  description: |-
    This task adds the `current-path` command to `session_query.py`. It depends on T4 (same-file chain). Unlike other commands, this one does not accept a session ID argument — it reads `CLAUDE_SESSION_ID` from the environment and resolves the live session JSONL file path. Default output is raw (agent-facing), with `--rich` opt-in for human display.
  objective: |-
    Add `cmd_current_path` Typer command that resolves and prints the current session's JSONL file path using `CLAUDE_SESSION_ID` environment variable and encoded CWD directory naming.
  requirements: |-
    1. Register `@app.command("current-path")` with function `cmd_current_path`
    2. Accept `--rich` option (default `False`) — note: this command does NOT have `--raw`, it defaults to raw
    3. Read `CLAUDE_SESSION_ID` from `os.environ`; if empty or missing, print `"CLAUDE_SESSION_ID is not set"` to stderr, raise `typer.Exit(1)`
    4. Compute encoded CWD: `str(Path.cwd()).replace("/", "-").lstrip("-")`
    5. Construct path: `PROJECTS_DIR / encoded / f"{session_id}.jsonl"`
    6. If path exists: print absolute path string to stdout (raw default), or Rich Panel with title "Current Session Path" and green border if `--rich`
    7. If path does not exist: print diagnostic to stderr (session ID, expected path, projects dir), raise `typer.Exit(1)`
    8. No DuckDB usage in this command — pure filesystem check
  constraints: |-
    - Do not open DuckDB in this command
    - Do not accept a session_id argument — this command resolves from environment only
    - Raw output must be exactly one line: the absolute path, nothing else — agents parse this
    - Place after `cmd_irritation` function, before `if __name__ == "__main__"`
  expected-outputs: |-
    - File modified: `.claude/skills/session-historian/scripts/session_query.py`
  acceptance-criteria: |-
    1. `uv run .claude/skills/session-historian/scripts/session_query.py current-path --help` shows help text with --rich option but no session_id argument
    2. Without `CLAUDE_SESSION_ID` set: exits 1 with stderr message containing "CLAUDE_SESSION_ID"
    3. With valid `CLAUDE_SESSION_ID` pointing to existing file: prints absolute path on stdout, exits 0
    4. Raw output contains exactly one line with no Rich markup
  verification-steps: |-
    ```bash
    # Command registered
    uv run .claude/skills/session-historian/scripts/session_query.py current-path --help

    # Lint clean
    uv run ruff check .claude/skills/session-historian/scripts/session_query.py

    # Verify no DuckDB usage in function
    grep -A30 'def cmd_current_path' .claude/skills/session-historian/scripts/session_query.py | grep -c "_open_db\|duckdb"
    # Expected: 0

    # Verify CLAUDE_SESSION_ID check
    grep "CLAUDE_SESSION_ID" .claude/skills/session-historian/scripts/session_query.py
    ```
  handoff: |-
    Return: cmd_current_path function location, confirmation of no DuckDB usage, lint status.
