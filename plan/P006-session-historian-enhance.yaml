  description: |-
    This task adds the `tools` command to `session_query.py`. It depends on T2 (same-file chain). The command provides a per-tool usage breakdown with success/failure/unmatched counts, rendered as a Rich table or raw tab-separated output.
  objective: |-
    Add `cmd_tools` Typer command that lists tools used in a session with call counts and success/failure breakdown.
  requirements: |-
    1. Register `@app.command("tools")` with function `cmd_tools`
    2. Accept `session_id` argument (default `"last"`) and `--raw` option (default `False`)
    3. Use `_resolve_session()` to get session path
    4. Pass 1: collect `tool_use` entries from assistant records — store `{id, name, timestamp}` per block
    5. Pass 2: correlate `tool_result` blocks from user records — match by `tool_use_id`, classify success vs failure via `is_error`
    6. Aggregate into per-tool-name stats: total, successes, failures, unmatched (tool_use with no matching tool_result)
    7. Rich output: Rich table with columns Tool Name (cyan), Total Calls (right), Successes (green, right), Failures (red, right), Unmatched (dim, right) — sorted by total descending — using `box.MINIMAL_DOUBLE_HEAD` and `_get_table_width()` pattern
    8. Raw output: header line `tool\ttotal\tsuccesses\tfailures\tunmatched` then one tab-separated row per tool
    9. Zero tools: print `"No tool calls recorded in session <id>"` to stderr, exit 0
  constraints: |-
    - Reuse the same two-pass pattern as `cmd_errors` — do not invent a different iteration approach
    - Use existing `_get_table_width()` for table width measurement
    - Place after `cmd_errors` function, before `if __name__ == "__main__"`
  expected-outputs: |-
    - File modified: `.claude/skills/session-historian/scripts/session_query.py`
  acceptance-criteria: |-
    1. `uv run .claude/skills/session-historian/scripts/session_query.py tools --help` shows help text
    2. Rich table has exactly 5 columns: Tool Name, Total Calls, Successes, Failures, Unmatched
    3. Table sorted by Total Calls descending
    4. Raw mode outputs header + data lines, tab-separated
    5. Unmatched count tracks tool_use blocks with no corresponding tool_result
  verification-steps: |-
    ```bash
    # Command registered
    uv run .claude/skills/session-historian/scripts/session_query.py tools --help

    # Lint clean
    uv run ruff check .claude/skills/session-historian/scripts/session_query.py

    # Verify function and table columns
    grep -A5 '@app.command("tools")' .claude/skills/session-historian/scripts/session_query.py
    grep "Total Calls\|Successes\|Failures\|Unmatched" .claude/skills/session-historian/scripts/session_query.py
    ```

    - Key claims to verify:
      - `tool_use` blocks appear in assistant-role records inside `message.content[]`
      - `tool_result` blocks appear in user-role records inside `message.content[]`
      - Unmatched = tool_use IDs not found in any tool_result block
    - Verification questions:
      1. Does architecture spec section 5.1 confirm tool_use is inside assistant records' message.content?
      2. Is `block["id"]` the correct field for tool_use ID (not `block["tool_use_id"]`)?
      3. Can a tool_use have zero matching tool_results (e.g., if session was interrupted)?
    - Evidence to collect:
