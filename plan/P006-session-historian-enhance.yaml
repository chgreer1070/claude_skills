  description: |-
    This task adds the `errors` command to `session_query.py`. It depends on T1 which provides `_resolve_session()`. The command extracts tool error records from JSONL session data — specifically `tool_result` blocks where `is_error` is `True`.

    Merged note: This task writes to `session_query.py` which is also modified by T3, T4, T5. Tasks are chained sequentially to avoid edit conflicts.
  objective: |-
    Add `cmd_errors` Typer command that lists tool errors from a session with timestamps, tool names, and error content, supporting both Rich and raw output modes.
  requirements: |-
    1. Register `@app.command("errors")` with function `cmd_errors`
    2. Accept `session_id` argument (default `"last"`) and `--raw` option (default `False`)
    3. Use `_resolve_session()` to get session path
    4. Build `tool_use_id -> tool_name` map from assistant records (pass 1 over `_iter_records` output)
    5. Iterate user-role records, find `tool_result` blocks where `is_error is True` (pass 2)
    6. For each error: extract timestamp, resolve tool name via map, extract error content via `_extract_text()`
    7. Rich output: header with session ID and error count, then per-error display with timestamp, tool name, and content
    8. Raw output: tab-separated `timestamp\ttool_name\terror_content_single_line` (newlines in content replaced with space)
    9. Zero errors: print `"No tool errors in session <id>"` to stderr, exit 0
    10. Session not found: exit 1 (handled by `_resolve_session`)
  constraints: |-
    - Do not truncate error content in raw mode — output full content with newlines replaced by spaces
    - In Rich mode, use `_extract_text()` for content normalization — do not implement custom extraction
    - Place the command function after existing commands, before `if __name__ == "__main__"`
  expected-outputs: |-
    - File modified: `.claude/skills/session-historian/scripts/session_query.py`
  acceptance-criteria: |-
