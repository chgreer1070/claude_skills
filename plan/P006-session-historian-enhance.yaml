    uv run .claude/skills/session-historian/scripts/session_query.py errors --help

    # Lint clean
    uv run ruff check .claude/skills/session-historian/scripts/session_query.py

    # Verify function exists with correct decorator
    grep -A2 '@app.command("errors")' .claude/skills/session-historian/scripts/session_query.py
