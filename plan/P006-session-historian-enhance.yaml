    2. The command handles the `"last"` alias via `_resolve_session`
    3. Tool name resolution uses `tool_use_id` cross-reference from assistant records
    4. Raw mode outputs tab-separated lines with no Rich markup
    5. Zero-error case prints to stderr and exits 0
  verification-steps: |-
