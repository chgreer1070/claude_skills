    3. `Task(id="T0", title="baseline", status="not-started", dependencies=[], priority=1, complexity="low", is_bookend=True, bookend_type="t0-baseline")` constructs without error
    4. `AcceptanceCriterion(criterion_id="AC-1", check_command="uv run pytest -v")` constructs with alias support
    5. Existing tests in `packages/sam_schema/tests/` continue to pass (no regressions)
  verification-steps: |-
