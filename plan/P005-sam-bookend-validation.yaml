  description: |-
    The SAM schema package has a `DependencyGraph` class in `packages/sam_schema/sam_schema/core/dependencies.py` that validates task dependencies and computes ready tasks. This task adds a `BookendValidator` class alongside it. The architecture spec section 4.2 defines the interface.
  objective: |-
    Implement `BookendValidator` class that validates structural constraints on bookend tasks within a plan.
  requirements: |-
    1. Add `BookendValidator` class that accepts a `Plan` instance
    2. Implement `validate() -> list[str]` returning validation error strings (empty = valid)
    3. Enforce: at most one T0 (`bookend_type == "t0-baseline"`) per plan
    4. Enforce: at most one TN (`bookend_type == "tn-verification"`) per plan
    5. Enforce: T0 must have `dependencies: []`
    6. Enforce: TN must depend on all non-bookend task IDs
    7. Enforce: if `acceptance_criteria_structured` is non-empty, both T0 and TN must exist
    8. Implement `get_t0_task() -> Task | None`
    9. Implement `get_tn_task() -> Task | None`
    10. Implement `get_implementation_task_ids() -> list[str]` returning IDs of non-bookend tasks
    11. Export `BookendValidator` from `__init__.py`
  constraints: |-
    - Do not modify the existing `DependencyGraph` class behavior
    - Plans without structured criteria and without bookend tasks must pass validation (backward compatible)
    - Use the `bookend_type` field for identification, not task ID conventions
  expected-outputs: |-
    - `packages/sam_schema/sam_schema/core/dependencies.py` (modified)
    - `packages/sam_schema/sam_schema/__init__.py` (modified if needed)
  acceptance-criteria: |-
    1. `BookendValidator(plan_with_valid_bookends).validate()` returns `[]`
    2. `BookendValidator(plan_with_t0_only).validate()` returns error about missing TN
    3. `BookendValidator(plan_without_criteria_or_bookends).validate()` returns `[]`
    4. `get_t0_task()` returns the T0 task or None
    5. `get_implementation_task_ids()` excludes bookend tasks
  verification-steps: |-
    1. `cd packages/sam_schema && uv run python -c "from sam_schema import BookendValidator; print('OK')"`
    2. `cd packages/sam_schema && uv run ruff check sam_schema/core/dependencies.py`
    3. `cd packages/sam_schema && uv run basedpyright sam_schema/core/dependencies.py`

    - Key claims to verify:
      - The existing `DependencyGraph.__init__` takes `list[Task]`, not `Plan`
      - `BookendValidator` takes `Plan` (different signature from `DependencyGraph`)
    - Verification questions:
      1. What is the exact `__init__` signature of `DependencyGraph`? Read `dependencies.py` to confirm.
      2. Does `dependencies.py` already import `Plan`? If not, add the import.
    - Evidence to collect:
      - Read `dependencies.py` class signatures and imports
    - Revision rule:
      - If `DependencyGraph` already takes `Plan`, consider whether `BookendValidator` should be integrated into it or remain separate. Prefer separate per architect spec.
  handoff: |-
    Report created class, validation rules implemented, any edge cases discovered
