    2. `cd packages/sam_schema && uv run python -c "from sam_schema.core.models import Plan; p = Plan(feature='x', tasks=[]); assert p.acceptance_criteria_structured == []"`
    3. `cd packages/sam_schema && uv run pytest tests/ -x --timeout=60`
    4. `cd packages/sam_schema && uv run ruff check sam_schema/`

    - Key claims to verify:
