goal: |-
  Implement dispatch_schema/ module with Pydantic models, YAML I/O, validation, conflict analysis, and MCP tool exposure for milestone dispatch plans
context: |-
  Story issue #920. dispatch_schema/ module in plugins/development-harness/. See Context Manifest section below.
acceptance-criteria: |-
  AC1: dispatch_schema/ package is importable and exports all public symbols listed in architect spec section 4.6
  AC2: read_dispatch_plan() round-trips a valid YAML file through write_dispatch_plan() and produces identical DispatchPlan models
  AC3: validate_plan_integrity() detects all five integrity violation types specified in architect spec section 4.4
  AC4: detect_stale_plan() correctly identifies added and removed issues
  AC5: analyze_impact_radius_conflicts() produces correct conflict groups using union-find for transitive overlap
  AC6: All tests pass with 80%+ overall coverage, 95%+ on validator and conflict analysis
  AC7: Four MCP tools (dispatch_read, dispatch_validate, dispatch_stale_check, dispatch_conflicts) registered on backlog server
