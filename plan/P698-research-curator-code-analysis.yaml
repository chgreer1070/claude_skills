context: |-
  Generated by context-gathering agent on 2026-03-21

  ### How This Currently Works: subprocess Timeout in run_quality_gates()

  When a caller invokes `run_quality_gates(commands, mode=..., cwd=..., timeout=...)` from `plugins/development-harness/dispatch_schema/gates.py`, the function executes each command string in sequence through this flow:

  1. **Tokenization**: Each command string is split via `shlex.split()` into tokens
  2. **Executable Resolution**: The first token (binary name) is resolved via the cached `_resolve_executable()` helper, which calls `shutil.which()`. This returns an absolute path or None.
  3. **Command-Not-Found Handling**: If the binary is not found (None result), a `CommandResult` with `exit_code=127` and stderr message is created without raising an exception. This follows the established pattern at lines 71-72.
  4. **Subprocess Execution**: If the binary is found, the code constructs `resolved_tokens` by concatenating the absolute path with the remaining arguments, then calls `subprocess.run()` at line 75 with `capture_output=True, text=True, cwd=cwd, check=False`. **Currently missing: the `timeout` parameter is not passed.**
  5. **Result Capture**: The completed process is converted to a `CommandResult` with `exit_code=completed.returncode`, `stdout=completed.stdout`, `stderr=completed.stderr`
  6. **Mode-Based Collection**: The result is appended to the results list. If mode is `FAIL_FAST` and the command failed, the loop breaks; otherwise, it continues to the next command.
  7. **Return**: A `GateResult` is returned with `passed=all(r.passed for r in results)`, the collected results list, and the mode.

  **The Bug at Line 75**: The `subprocess.run()` call lacks the `timeout` parameter. When a gate command hangs (never completes), the entire `run_quality_gates()` call blocks indefinitely, preventing the caller from enforcing time budgets or failing fast on stuck processes. This breaks dispatch plans in scenarios where a quality gate command (e.g., a linter, test suite, or build tool) misbehaves or enters an infinite loop.

  **Current State of Exception Handling**: Lines 71-72 handle the specific case where `shutil.which()` returns None. However, there is no handler for `subprocess.TimeoutExpired`, which is raised by `subprocess.run()` when a timeout is exceeded. The architecture spec defines this should be caught and converted to a `CommandResult` with `exit_code=124` (Unix `timeout(1)` convention), matching the pattern of the command-not-found handler.

  ### For New Feature Implementation: What Needs to Connect

  **Files to Modify**:
  - **Production code**: `plugins/development-harness/dispatch_schema/gates.py` — Add `timeout: float = 300.0` parameter to `run_quality_gates()` signature (line 38-40), add `timeout=timeout` to the `subprocess.run()` call (line 75), and wrap the subprocess.run block (lines 74-78) in a try-except to catch `subprocess.TimeoutExpired`.
  - **Test code**: `plugins/development-harness/tests/test_dispatch_schema/test_gates.py` — Add a new `TestSubprocessTimeoutContract` class following the existing class-based pattern (e.g., `TestSinglePassingCommand`, `TestEmptyCommandList`). Must use AAA structure with pytest-mock's `MockerFixture`.

  **Patterns to Follow**:
  - **Exception Handling**: Mirror the lines 71-72 pattern: catch the exception, construct a `CommandResult` with the appropriate exit code and message, and append to results (do not re-raise).
  - **Mock Target**: Use `mocker.patch("dispatch_schema.gates.subprocess.run", ...)` — this is the established string used by all existing tests.
  - **Cache Clearing**: The `_clear_resolve_executable_cache` autouse fixture clears the `@cache` decorator on `_resolve_executable()` before each test, ensuring mocked `shutil.which()` is not bypassed by cached results.
  - **Helper Function**: Reuse `_make_completed_process()` to construct mock return values for `subprocess.run()`. For timeout tests, use `side_effect=subprocess.TimeoutExpired(cmd=..., timeout=...)` instead of `return_value=...`.
  - **Mode Testing**: Existing tests verify that `FAIL_FAST` stops after first failure and `RUN_ALL` continues. Timeout tests must verify the same behavior: a timeout in the first command should stop in FAIL_FAST mode, but a timeout in the first command followed by a passing second command should return two results in RUN_ALL mode.
  - **shutil.which Mocking**: Every test that calls `run_quality_gates()` must patch `dispatch_schema.gates.shutil.which` to return a non-None path (e.g., `"/usr/bin/somecmd"`) to bypass the command-not-found handler and exercise the subprocess code path.

  **Constraints**:
  - No new dependencies — `subprocess.TimeoutExpired` is part of the standard `subprocess` module.
  - Exit code must be 124 (Unix convention), not arbitrary values.
  - Timeout parameter must be keyword-only and have a sensible default (300.0 seconds per architecture spec ADR-001).
  - The stderr field in the timeout `CommandResult` should contain a human-readable message mentioning the timeout duration, enabling callers to distinguish timeout failures from other exit codes in logs.

  **Integration Points**:
  - `GateRunMode` enum (already imported) — no changes needed
  - `CommandResult` and `GateResult` models (already imported from `dispatch_schema.core.models`) — no schema changes needed
  - The `_resolve_executable()` cache — timeout tests should still use the `_clear_resolve_executable_cache` fixture to ensure shutil.which mocking is not bypassed

  ### Technical Reference Details

  **Function Signature (Updated)**:
  ```python
  def run_quality_gates(
      commands: list[str], *, mode: GateRunMode = GateRunMode.FAIL_FAST, cwd: Path | None = None, timeout: float = 300.0
  ) -> GateResult:
  ```

  **Subprocess Call Site (Updated)**:
  ```python
  try:
      completed = subprocess.run(resolved_tokens, capture_output=True, text=True, cwd=cwd, check=False, timeout=timeout)
      result = CommandResult(
          command=command, exit_code=completed.returncode, stdout=completed.stdout, stderr=completed.stderr
      )
  except subprocess.TimeoutExpired:
      result = CommandResult(command=command, exit_code=124, stdout="", stderr=f"command timed out after {timeout}s")
  ```

  **Test Class Template (Minimum Coverage)**:
  ```python
  class TestSubprocessTimeoutContract:
      def test_timeout_produces_exit_code_124(self, mocker: MockerFixture) -> None:
          mocker.patch("dispatch_schema.gates.shutil.which", return_value="/usr/bin/cmd")
          mocker.patch("dispatch_schema.gates.subprocess.run", side_effect=subprocess.TimeoutExpired(cmd=["cmd"], timeout=300.0))
          result = run_quality_gates(["cmd"], timeout=300.0)
          assert result.results[0].exit_code == 124

      def test_timeout_stderr_contains_duration(self, mocker: MockerFixture) -> None:
          mocker.patch("dispatch_schema.gates.shutil.which", return_value="/usr/bin/cmd")
          mocker.patch("dispatch_schema.gates.subprocess.run", side_effect=subprocess.TimeoutExpired(cmd=["cmd"], timeout=300.0))
          result = run_quality_gates(["cmd"], timeout=300.0)
          assert "300.0s" in result.results[0].stderr

      def test_custom_timeout_forwarded(self, mocker: MockerFixture) -> None:
          mocker.patch("dispatch_schema.gates.shutil.which", return_value="/usr/bin/cmd")
          mock_run = mocker.patch("dispatch_schema.gates.subprocess.run", return_value=_make_completed_process())
          run_quality_gates(["cmd"], timeout=5.0)
          assert mock_run.call_args[1]["timeout"] == 5.0
  ```

  **Existing Data Models (No Changes)**:
  - `CommandResult(command: str, exit_code: int, stdout: str, stderr: str, passed: bool = False)`
  - `GateResult(passed: bool, results: list[CommandResult], mode: GateRunMode)`
  - `GateRunMode.FAIL_FAST | GateRunMode.RUN_ALL`

  **File Paths for Implementation**:
  - Production: `/home/ubuntulinuxqa2/repos/claude_skills/plugins/development-harness/dispatch_schema/gates.py`
  - Tests: `/home/ubuntulinuxqa2/repos/claude_skills/plugins/development-harness/tests/test_dispatch_schema/test_gates.py`
  - Architecture Spec: `/home/ubuntulinuxqa2/repos/claude_skills/plan/architect-gates-subprocess-timeout.md`
  - Feature Context: `/home/ubuntulinuxqa2/repos/claude_skills/plan/feature-context-gates-subprocess-timeout.md`
