tasks:
- id: T01
  title: Add issue set-milestone subcommand to github_project_setup.py
  status: complete
  agent: python3-development:python-cli-architect
  priority: 1
  complexity: medium
  description: |
    ## Context

    `.claude/skills/gh/scripts/github_project_setup.py` is a PEP 723 standalone Typer CLI script
    with an existing `issue_app` subcommand group containing `issue create` and `issue list`.
    The architecture spec (plan/architect-migrate-milestone-skills-gh-cli.md section 4.1) defines
    the interface and behavior for a new `issue set-milestone` subcommand.

    ## Objective

    Add `issue set-milestone` subcommand to the `issue_app` Typer group. This subcommand assigns
    an issue to a milestone using PyGithub. It is called by milestone skills via
    `uv run .claude/skills/gh/scripts/github_project_setup.py issue set-milestone --issue N --milestone M`.

    ## Requirements

    - Follow the interface defined in architect spec section 4.1 exactly
    - Use `Annotated` syntax consistent with existing subcommands in the script
    - Fetch issue via `repository.get_issue(issue)`, fetch milestone via `repository.get_milestone(milestone)`
    - Call `issue.edit(milestone=milestone_obj)` to assign
    - Print confirmation: `Issue #N assigned to milestone #M "title"`
    - Error cases: issue not found (exit 1), milestone not found (exit 1), API error on edit (exit 1)
    - Add unit tests in `.claude/skills/gh/tests/test_github_project_setup.py` (create if absent, extend if present)
    - Tests must mock PyGithub calls, no live API calls
    - Test cases: success, issue not found (exit 1), milestone not found (exit 1)

    ## Key files

    - `.claude/skills/gh/scripts/github_project_setup.py` — target script
    - `plan/architect-migrate-milestone-skills-gh-cli.md` — section 4.1 for interface spec
  acceptance-criteria: |
    1. `uv run .claude/skills/gh/scripts/github_project_setup.py issue set-milestone --help` exits 0 and shows --issue and --milestone options
    2. `uv run .claude/skills/gh/scripts/github_project_setup.py issue set-milestone --issue 1 --milestone 1` calls `issue.edit(milestone=...)` via PyGithub (verified by unit test mock)
    3. Unit tests for success, issue-not-found, and milestone-not-found cases all pass
  verification-steps: |
    1. Run: `uv run .claude/skills/gh/scripts/github_project_setup.py issue set-milestone --help` — exits 0
    2. Run: `cd /home/ubuntulinuxqa2/repos/claude_skills && uv run pytest .claude/skills/gh/tests/test_github_project_setup.py -k set_milestone -v` — all pass
    3. Run: `uv run ruff check .claude/skills/gh/scripts/github_project_setup.py` — no errors
  started: '2026-03-21T23:21:31.072553+00:00'
