    gh CLI call to its replacement.

    ## Objective

    Rewrite SKILL.md so that all GitHub operations use backlog MCP tools or PyGithub subcommands.
    Zero gh CLI references must remain after the rewrite.

    ## Requirements

    - Replace Step 2 duplicate check (`gh api repos/.../milestones --jq`) with
      `backlog_list_milestones(state="open")` — check returned list for matching title
    - Keep Step 3 unchanged (already uses `github_project_setup.py milestone create`)
    - Remove the entire "gh not installed" error handling block
    - Remove any references to `setup_gh.py` or `setup_gh`
    - Preserve all non-gh workflow logic, frontmatter, and skill structure
    - Do NOT add any gh CLI fallback paths — MCP/PyGithub are the only paths
    - Follow skill content standards: no tables for workflow steps, use mermaid for decision flows

    ## Replacement mapping (from architect spec section 4.4)

    - `gh api repos/{owner}/{repo}/milestones --jq '...'` -> `backlog_list_milestones(state="open")`
    - "gh not installed" error block -> Remove entirely
    - `setup_gh` references -> Remove entirely

    ## Key files

    - `.claude/skills/create-milestone/SKILL.md` — file to rewrite
    - `plan/architect-migrate-milestone-skills-gh-cli.md` — section 4.4 for replacement mapping
