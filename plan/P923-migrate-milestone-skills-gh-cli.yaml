    2. `grep -r 'setup_gh' .claude/skills/complete-milestone/` returns 0 matches
    3. Skill references all three new subcommands: `issue set-milestone`, `issue remove-milestone`, `issue close`
    4. Skill uses `backlog_list_milestones`, `backlog_list_issues`, and `backlog_create_milestone` MCP tools
