- id: T03
  title: Add issue close subcommand to github_project_setup.py
  status: complete
  agent: python3-development:python-cli-architect
  priority: 1
  complexity: medium
  description: |
    ## Context

    `.claude/skills/gh/scripts/github_project_setup.py` is a PEP 723 standalone Typer CLI script.
    The architecture spec (plan/architect-migrate-milestone-skills-gh-cli.md section 4.3) defines
    the interface and behavior for a new `issue close` subcommand.

    ## Objective

    Add `issue close` subcommand to the `issue_app` Typer group. This subcommand closes an issue
    with an optional comment using PyGithub. It is called by `/complete-milestone` via
    `uv run .claude/skills/gh/scripts/github_project_setup.py issue close --number N --comment "..."`.

    ## Requirements

    - Follow the interface defined in architect spec section 4.3 exactly
    - Use `Annotated` syntax consistent with existing subcommands
    - Fetch issue via `repository.get_issue(number)`
    - If comment is non-empty, call `issue.create_comment(comment)` BEFORE closing
    - Call `issue.edit(state="closed")` to close
    - Idempotent: if issue already closed, print warning and exit 0
    - Print confirmation: `Issue #N closed`
    - Error cases: issue not found (exit 1), comment creation fails (exit 1, do NOT close issue)
    - Add unit tests in `.claude/skills/gh/tests/test_github_project_setup.py`
    - Test cases: success without comment, success with comment (verify comment created before close),
      issue not found (exit 1), issue already closed (exit 0 + warning), comment creation fails (exit 1, issue NOT closed)

    ## Key files

    - `.claude/skills/gh/scripts/github_project_setup.py` — target script
    - `plan/architect-migrate-milestone-skills-gh-cli.md` — section 4.3 for interface spec
  acceptance-criteria: |
    1. `uv run .claude/skills/gh/scripts/github_project_setup.py issue close --help` exits 0 and shows --number and --comment options
    2. When --comment is provided, comment is created before the issue is closed (verified by unit test mock call order)
    3. Unit tests for all 5 cases (success no comment, success with comment, not found, already closed, comment fails) all pass
  verification-steps: |
    1. Run: `uv run .claude/skills/gh/scripts/github_project_setup.py issue close --help` — exits 0
    2. Run: `cd /home/ubuntulinuxqa2/repos/claude_skills && uv run pytest .claude/skills/gh/tests/test_github_project_setup.py -k issue_close -v` — all pass
    3. Run: `uv run ruff check .claude/skills/gh/scripts/github_project_setup.py` — no errors
