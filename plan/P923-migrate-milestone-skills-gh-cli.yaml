    - Add unit tests in `.claude/skills/gh/tests/test_github_project_setup.py`
    - Test cases: success, issue not found (exit 1), issue has no milestone (exit 0 + warning)

    ## Key files

    - `.claude/skills/gh/scripts/github_project_setup.py` — target script
    - `plan/architect-migrate-milestone-skills-gh-cli.md` — section 4.2 for interface spec
