  description: |
    ## Context

    `.claude/skills/complete-milestone/SKILL.md` is the most complex skill with 10+ gh CLI calls
    covering discovery, issue reassignment, issue close, and next-milestone creation. The architect
    spec section 4.4 maps each gh CLI call to its replacement. This task depends on all three new
    subcommands (T01: set-milestone, T02: remove-milestone, T03: close).

    ## Objective

    Rewrite SKILL.md so that all GitHub operations use backlog MCP tools or PyGithub subcommands.
    Zero gh CLI references must remain after the rewrite.

    ## Requirements

    - Replace milestone resolution with `backlog_list_milestones(state="open")` + filter by number
    - Replace issue listing (open + closed) with `backlog_list_issues(milestone=, state=)`
    - Replace next-milestone creation (`gh api POST`) with `backlog_create_milestone(title=, due_on=, description=)`
    - Replace issue reassignment (`gh api PATCH .../issues/N` with milestone body) with
      `uv run .claude/skills/gh/scripts/github_project_setup.py issue set-milestone --issue N --milestone M`
    - Replace milestone unassignment (`gh api PATCH` with null milestone) with
      `uv run .claude/skills/gh/scripts/github_project_setup.py issue remove-milestone --issue N`
    - Replace issue close (`gh issue close N --comment`) with
      `uv run .claude/skills/gh/scripts/github_project_setup.py issue close --number N --comment "..."`
    - Remove gh fallback in Step 4 — PyGithub script (`milestone close`) is the only path
    - Replace Project V2 references with `github_project_setup.py project update-status`
    - Remove the entire "gh not installed" error handling block and all `setup_gh` references
    - Preserve all non-gh workflow logic, frontmatter, and skill structure
    - Do NOT add any gh CLI fallback paths

