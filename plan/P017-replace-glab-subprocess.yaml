tasks:
- id: '1'
  title: Implement env-var-only token resolution in fetch_gitlab_mr.py
  status: not-started
  priority: 3
  complexity: medium
  description: |-
    `_resolve_token()` in `.claude/skills/create-merge-request-changelog/scripts/fetch_gitlab_mr.py` currently shells out to the `glab` binary as a token fallback after checking env vars. The subprocess block (lines 105-115) creates a binary dependency, a split auth path, and a ruff S607 linting violation. The fix is a deletion: remove the subprocess block and the two now-unused imports. Update the function docstring and one error message string. No new logic is introduced. The reference implementation exists at `plugins/gitlab-skill/skills/gitlab-skill/scripts/gitlab_context.py` line 107.
  objective: |-
    Remove the glab subprocess fallback from `_resolve_token()`, delete the unused `shutil` and `subprocess` imports, update the function docstring, and update the caller error message — leaving `fetch_gitlab_mr.py` with env-var-only token resolution matching the `gitlab_context.py` pattern.
  constraints: |-
    - Do not modify any function other than `_resolve_token()` and the single string literal in `get_gitlab_client()`.
    - Do not add any new imports.
    - Do not remove the `os` import — it is used by `_resolve_token()` and `_parse_git_origin()`.
    - Do not touch `plugins/gitlab-skill/skills/gitlab-skill/scripts/get_gitlab_context.py` — that file is explicitly out of scope per the architecture spec.
    - Do not add tests — test coverage is a separate backlog item.
    - Do not change the PEP 723 metadata block (lines 2-5).
    - Do not change `_resolve_token()` return type annotation (`str | None`).
  expected-outputs: |-
    - `.claude/skills/create-merge-request-changelog/scripts/fetch_gitlab_mr.py` — modified in place with the five changes listed in Requirements.
  acceptance-criteria: |-
    1. `import shutil` does not appear anywhere in the file.
    2. `import subprocess` does not appear anywhere in the file.
    3. `_resolve_token()` body is a single `return` statement with no `subprocess.run`, `shutil.which`, or `_get_gitlab_host()` calls.
    4. `_resolve_token()` docstring contains no mention of "glab".
    5. The error message in `get_gitlab_client()` reads exactly: `"No GitLab token found. Set GITLAB_TOKEN or GITLAB_PRIVATE_TOKEN env var."`
    6. All other functions in the file are byte-for-byte unchanged.
  verification-steps: |-
    1. Read the modified file and confirm `import shutil` and `import subprocess` are absent:

    ```bash
    grep -n "shutil\|subprocess" .claude/skills/create-merge-request-changelog/scripts/fetch_gitlab_mr.py
    ```

    Must produce no output.

    2. Read `_resolve_token()` (approximately lines 91-105 after edits) and confirm it is a docstring followed by a single `return` line.

    3. Read the error message line in `get_gitlab_client()` and confirm it matches the required string exactly.

    4. Confirm `--help` exits 0 (script loads without import errors):

    ```bash
    GITLAB_TOKEN=test uv run .claude/skills/create-merge-request-changelog/scripts/fetch_gitlab_mr.py --help
    ```

    Exit code must be 0.
  handoff: |-
    Return:

    - Summary of each edit: which lines were removed, which strings were replaced (before/after content).
    - Output of the `grep` command from Verification Step 1 (must be empty).
    - Exit code of the `--help` command from Verification Step 4.
    - Any unexpected findings (e.g., additional `shutil` or `subprocess` usages discovered).

    ---
