- id: T06
  title: Write bulk migration script to convert .md files to .yaml
  status: not-started
  agent: python-cli-architect
  dependencies:
  - T02
  - T04
  priority: 4
  complexity: medium
  skills:
  - python3-development
  context-notes: |
    ## Objective

    Write the bulk migration script that converts all existing .md backlog files in .claude/backlog/ to .yaml format in a single atomic operation. The script must verify round-trip fidelity for each file before deleting the original and produce a migration report.

    ## Requirements

    New file: plugins/development-harness/scripts/migrate_backlog_to_yaml.py

    PEP 723 standalone script:
    - Shebang: #!/usr/bin/env -S uv --quiet run --active --script
    - Inline dependencies: ruamel.yaml, pydantic
    - Set executable permissions (chmod +x)

    Implement:

    def migrate_file(md_path: Path) -> Path
      1. Read md_path text
      2. Parse via existing parse_item_file(text, md_path) -> BacklogItem (old model, legacy path)
      3. Extract sections from raw_body via extract_sections()
      4. For each section, parse entries via parse_entries()
      5. Extract groomed subsections via extract_groomed_section()
      6. Construct new BacklogItem (new model) with structured sections
      7. Save as .yaml via yaml_io.save_item() to same directory with .yaml extension
      8. Verify round-trip: load .yaml back, compare entry count, entry ids, groomed subsection keys against original parse
      9. If verification passes and not dry_run: delete md_path
      10. Return new .yaml path

    def migrate_all(backlog_dir: Path, *, dry_run: bool = False) -> MigrationReport
      1. Glob *.md files in backlog_dir (exclude README.md or other non-item files by checking for frontmatter)
      2. For each: call migrate_file()
      3. Collect results: migrated count, error count, skipped count, list of errors with file paths
      4. Return MigrationReport dataclass with these fields

    CLI entry point: --backlog-dir (default .claude/backlog), --dry-run flag, prints report to stdout

    Reference pattern: sam migrate --all (in plugins/development-harness/scripts/) for script structure conventions

    Format-detecting backward-compat reader: yaml_io.load_item() already handles .md files during transition — no additional code needed in operations.py for transition period.

    ## Acceptance Criteria

    - [ ] Script exists at plugins/development-harness/scripts/migrate_backlog_to_yaml.py with executable bit set
    - [ ] PEP 723 inline metadata block present with ruamel.yaml and pydantic declared as dependencies
    - [ ] --dry-run flag runs full migration logic (parse, construct, verify) but does not write .yaml files or delete .md files
    - [ ] Each .md file that migrates successfully produces a .yaml file loadable by yaml_io.load_item()
    - [ ] Round-trip verification catches data loss: a deliberately truncated .yaml write causes the file to be skipped and an error logged (not silently accepted)
    - [ ] Migration report shows: total .md files found, successfully migrated, errors with file path and error message, skipped
    - [ ] Script does not migrate README.md or non-item .md files (must have YAML frontmatter to qualify)

    ## Verification Steps

    1. Run: uv run scripts/migrate_backlog_to_yaml.py --dry-run and confirm it prints a migration report without modifying any files
    2. Run on a copy of .claude/backlog/ (not the live directory) and verify .yaml files are produced and .md originals are removed
    3. Confirm each produced .yaml file passes: python -c 'from backlog_core.yaml_io import load_item; from pathlib import Path; item = load_item(Path("FILE")); print(item.title)'
