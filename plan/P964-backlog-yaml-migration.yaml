feature: backlog-yaml-migration
version: '1.0'
description: ''
goal: |-
  Convert .claude/backlog/ files from hybrid YAML-frontmatter+markdown to pure YAML structured data, eliminating dual-parser architecture (python-frontmatter + regex) in favor of single ruamel.yaml load/dump cycle with typed Pydantic models
issue: '964'
tasks:
- id: T01
  title: Update Pydantic data models for pure YAML structure
  status: not-started
  agent: python-cli-architect
  priority: 1
  complexity: medium
  skills:
  - python3-development
  context-notes: |
    ## Objective

    Add four new Pydantic models to models.py and update BacklogItem to replace the raw_body string field with typed section fields. The result is a data layer that maps 1:1 to the new pure-YAML file format, eliminating the need for regex-based body parsing.

    ## Requirements

    File: plugins/development-harness/.claude/skills/backlog/backlog_core/models.py

    Add these four models before BacklogItem:
    - Entry: id str, content str, struck bool=False, struck_reason str, struck_at str. Drop the existing raw field. Add validator: struck=True only when struck_at is non-empty.
    - GroomedData: date str, subsections dict[str, str] with default_factory=dict. Known keys: priority, impact, benefits, expected_behavior, desired_structure, acceptance_criteria, resources, dependencies, effort.
    - Section: entries list[Entry] with default_factory=list.
    - BacklogItemMetadata: source str, added str, priority str, type str, status str, issue str, last_synced str, groomed str, plan str, topic str, research_first str, files str, suggested_location str. Validators for priority (P0/P1/P2/Ideas/completed), type (Feature/Bug/Refactor/Docs/Chore), status (open/done/in-progress/needs-grooming), and added (YYYY-MM-DD format).

    Update BacklogItem:
    - Add metadata: BacklogItemMetadata = Field(default_factory=BacklogItemMetadata)
    - Add sections: dict[str, Section | GroomedData] = Field(default_factory=dict)
    - Remove raw_body: str field
    - Keep file_path and skip as before (not persisted to YAML)
    - Add @property accessors on BacklogItem delegating to metadata: priority, issue, source, added, status, plan, item_type, groomed, last_synced (for backward compatibility with callers that read item.priority etc.)
    - section: str field (the priority section like P0) maps to metadata.priority
    - model_config must exclude file_path and skip from YAML serialization

    ## Acceptance Criteria

    - [ ] Entry model has id, content, struck, struck_reason, struck_at fields; raw field is absent
    - [ ] Entry Pydantic validator raises ValidationError when struck=True and struck_at is empty
    - [ ] GroomedData has date and subsections fields; model_validate() succeeds on empty subsections dict
    - [ ] Section has entries list; model_validate() succeeds on empty list
    - [ ] BacklogItemMetadata validators reject invalid priority values (e.g. 'P3') and invalid status values (e.g. 'unknown')
    - [ ] BacklogItem.model_validate() succeeds on a full YAML dict with all section types populated
    - [ ] BacklogItem.priority property returns metadata.priority; item.priority == item.metadata.priority
    - [ ] file_path and skip fields are excluded from model_dump(exclude_none=False) serialization output
    - [ ] uv run ruff check passes on models.py with no new errors
    - [ ] uv run ty check passes on models.py with no type errors

    ## Verification Steps

    1. Run: uv run pytest plugins/development-harness/tests/test_models.py -x and confirm all model validation tests pass
    2. Run: python -c 'from backlog_core.models import BacklogItem, Entry, GroomedData, Section, BacklogItemMetadata; print("imports OK")' from the backlog_core package directory
    3. Confirm that BacklogItem.model_dump() output does not contain file_path or skip keys
- id: T02
  title: Create yaml_io module for pure YAML file I/O
  status: not-started
  agent: python-cli-architect
  dependencies:
  - T01
  priority: 2
  complexity: high
  skills:
  - python3-development
  context-notes: |
    ## Objective

    Create yaml_io.py as the new primary I/O module for backlog items. It replaces frontmatter_utils.py in the backlog read/write path, using ruamel.yaml directly to load and save pure YAML files. It also provides a format-detecting reader that handles legacy .md files during the transition period.

    ## Requirements

    New file: plugins/development-harness/.claude/skills/backlog/backlog_core/yaml_io.py

    Implement these four functions:

    def load_item(path: Path) -> BacklogItem
      - Call detect_format(path) first
      - If yaml: open file, load with ruamel.yaml (typ='safe'), call BacklogItem.model_validate(data), set item.file_path = str(path), return item
      - If legacy_md: read text, delegate to existing parse_item_file() from parsing.py, log deprecation warning, return item
      - Raise ValueError for any other extension

    def save_item(item: BacklogItem, path: Path) -> None
      - Serialize item via item.model_dump(exclude={'file_path', 'skip'})
      - Write with ruamel.yaml (typ='rt' or compatible) with width=2147483647 to prevent line wrapping
      - Always writes .yaml format regardless of original extension

    def load_item_text(text: str, path: Path) -> BacklogItem
      - Load from a string (for testing without disk I/O)
      - Uses same detection logic based on path extension

    def detect_format(path: Path) -> Literal['yaml', 'legacy_md']
      - Returns 'yaml' if path.suffix == '.yaml'
      - Returns 'legacy_md' if path.suffix == '.md'
      - Raises ValueError otherwise

    Dependencies: ruamel.yaml, models.py (BacklogItem), parsing.py (parse_item_file for legacy path only)
    Security: use typ='safe' for loading (not 'rt' or 'unsafe') per arch spec section 8

    ## Acceptance Criteria

    - [ ] load_item() on a valid .yaml file returns BacklogItem with file_path set to the absolute path
    - [ ] load_item() on a .md file returns BacklogItem (via legacy parse_item_file) and emits a deprecation warning
    - [ ] load_item() on a .txt file raises ValueError
    - [ ] save_item() writes valid YAML that ruamel.yaml can reload; the reloaded dict passes BacklogItem.model_validate()
    - [ ] save_item() output does not contain file_path or skip keys
    - [ ] round-trip: load_item(path) -> save_item(item, path2) -> load_item(path2) produces equal BacklogItem fields
    - [ ] ruamel.yaml is used with typ='safe' for loading (verify no yaml.unsafe_load calls)
    - [ ] Long string values (>200 chars) are not wrapped across lines in the saved YAML output

    ## Verification Steps

    1. Confirm yaml_io.py exists at plugins/development-harness/.claude/skills/backlog/backlog_core/yaml_io.py
    2. Run the test suite for yaml_io: uv run pytest plugins/development-harness/tests/test_yaml_io.py -x and confirm all tests pass
    3. Confirm no call to yaml.load() without explicit Loader argument appears in yaml_io.py (use grep or ruff)
- id: T03
  title: Create GitHub sync adapter for YAML-to-markdown conversion
  status: not-started
  agent: python-cli-architect
  dependencies:
  - T01
  priority: 2
  complexity: high
  skills:
  - python3-development
  context-notes: |
    ## Objective

    Create github_sync.py as a new module extracted from github.py. It owns the conversion boundary between local YAML BacklogItem representation and GitHub issue body markdown. Operations.py and the MCP server never write raw markdown body strings directly — they go through this adapter.

    ## Requirements

    New file: plugins/development-harness/.claude/skills/backlog/backlog_core/github_sync.py

    Implement these three functions:

    def render_issue_body(item: BacklogItem) -> str
      - Embed metadata as HTML comment block: <!-- backlog-metadata:\npriority: ...\ntype: ...\nstatus: ...\nadded: ...\n-->
      - Render item.description as ## Description section
      - For sections['groomed'] (GroomedData): render as ## Groomed ({date}) with ### {Subsection} children in canonical order (priority, impact, benefits, expected_behavior, desired_structure, acceptance_criteria, resources, dependencies, effort)
      - For sections['fact_check'], sections['rt_ica'], sections['issue_classification'] (Section): render entries as <div><sub>{entry.id}</sub> blocks; struck entries wrapped in <details><summary>struck: {struck_at} — {struck_reason}</summary>
      - Section name mapping: fact_check -> Fact-Check, rt_ica -> RT-ICA, issue_classification -> Issue Classification

    def parse_issue_body(body: str, existing: BacklogItem | None = None) -> BacklogItem
      - Extract metadata from <!-- backlog-metadata: ... --> HTML comment
      - Extract ## Section blocks using extract_sections() from parsing.py
      - For ## Groomed sections: extract ### Subsection children into GroomedData.subsections
      - For entry-bearing sections: use parse_entries() from entry_blocks.py to parse <div><sub> blocks into list[Entry]
      - Construct and return BacklogItem with parsed sections

    def merge_item(local: BacklogItem, remote: BacklogItem) -> BacklogItem
      - For GroomedData: per subsection, keep longer content
      - For Section entries: match by id; struck wins over active; if both active, longer content wins; unique entries from either side are preserved; order chronologically by id

    Dependencies: models.py, parsing.py (extract_sections, extract_groomed_section), entry_blocks.py (parse_entries, wrap_entry)

    ## Acceptance Criteria

    - [ ] render_issue_body() output contains <!-- backlog-metadata: ... --> HTML comment with priority, type, status, added fields
    - [ ] render_issue_body() renders GroomedData subsections as ### headings under ## Groomed ({date})
    - [ ] render_issue_body() renders struck entries with <details><summary>struck: ... </summary> wrapper
    - [ ] parse_issue_body(render_issue_body(item)) round-trips: entry count, entry ids, and groomed subsection keys are equal on input and output
    - [ ] merge_item(): when local has struck entry and remote has same id as active, merged result has entry as struck
    - [ ] merge_item(): entry unique to remote is present in merged result
    - [ ] merge_item(): groomed subsection with longer remote content is kept in merged result
    - [ ] github_sync.py imports do not create a circular dependency (models <- parsing <- github_sync, not the reverse)

    ## Verification Steps

    1. Confirm github_sync.py exists at plugins/development-harness/.claude/skills/backlog/backlog_core/github_sync.py
    2. Confirm the three public functions are importable: from backlog_core.github_sync import render_issue_body, parse_issue_body, merge_item
    3. Run the github_sync test suite: uv run pytest plugins/development-harness/tests/test_github_sync.py -x and confirm all tests pass
