  - Other reference docs in backlog_core/references/ — similar pattern

  Utility Scripts (.claude/scripts/):
  - sync_issues_to_project.py — replace hardcoded repo
  - rebuild_issue_bodies.py — replace hardcoded repo
  - repair_from_original_register.py — replace hardcoded repo

  Project Instructions (User-Facing):
  - .claude/CLAUDE.md § gh_cli_usage — update example commands to show dynamic discovery
  - Agent instruction files — review and update if they reference hardcoded repo

  **Scope Decisions (Resolved):**
  All files in Architecture Appendix A Migration Checklist are IN SCOPE per user resolution. MCP server (FastMCP in backlog_core) already uses DEFAULT_REPO via import, so it will automatically resolve dynamically when the constant is updated.

  ## Technical Reference Details

  **Function Signature and Location:**
  plugins/development-harness/backlog_core/models.py — add discover_repo() function. Decorate with @lru_cache(maxsize=1). Return type: str. Priority chain implementation: env var check → subprocess gh CLI → subprocess git remote parsing → RepoDiscoveryError.

  **Error Model:**
  RepoDiscoveryError exception class with actionable messages for each failure mode. Must not silently fall back to hardcoded value (ADR-005).

  **Validation Regex:**
  Pattern validates owner and repo names per GitHub URL conventions: ^[a-zA-Z0-9][a-zA-Z0-9._-]*/[a-zA-Z0-9][a-zA-Z0-9._-]*$

  **Backlog Item Reference:**
  Issue #852 (GitHub issue) — local cache at .claude/backlog/p1-make-backlog-and-github-skills-repo-agnostic.md

  **Plan Artifacts:**
  - plan/feature-context-repo-agnostic-backlog-github-skills.md — problem statement, use scenarios, gap analysis
  - plan/codebase/REPO_DISCOVERY_PATTERNS.md — patterns for current hardcoding, discovery methods, proposed hierarchy
  - plan/architect-repo-agnostic-backlog-github-skills.md — C4 diagrams, component design, ADRs 1-5, migration checklist, testing strategy

  **Key Architectural Decisions:**
  - ADR-001: gh CLI before GitPython — gh is already required for skills; GitPython adds dependency only for parsing
  - ADR-002: @lru_cache(maxsize=1) instead of eager discovery — enables runtime re-initialization for plugin cache use case
  - ADR-003: Agent discovery preamble in SKILL.md — avoids env var limitation and hardcoded references
  - ADR-004: Inline discovery in PEP 723 scripts — scripts run in isolated environments where backlog_core import may not work
  - ADR-005: No hardcoded fallback — fail loudly if discovery fails; prevents silent misconfigurations
