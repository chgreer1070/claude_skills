description: |-
  The architecture spec defines four format-specific readers and a format detection module. Existing parsing logic is spread across `implementation_manager.py` (lines 403-575), `task_format.py` (lines 103-171), and `task_status_hook.py` (lines 245-370). The codebase analysis in `plan/codebase/sam-task-parsing-patterns.md` documents all current parsing patterns, field extraction logic, and edge cases (multi-YAML-fence issue in section 10.4). This task creates the complete reader pipeline.
objective: |-
  Implement format detection (`detect.py`) and all four format-specific readers (`yaml_reader.py`, `frontmatter_reader.py`, `legacy_reader.py`, `manifest_reader.py`) that convert task files into raw dicts for normalization.
requirements: |-
  1. Implement `readers/detect.py` with `FormatType` enum (`PURE_YAML`, `YAML_FRONTMATTER`, `LEGACY_MARKDOWN`, `GLOBAL_MANIFEST`, `DIRECTORY`) and `detect_format(path: Path) -> FormatType` function following the detection flowchart in architecture spec section 5 "Reader Pipeline".
  2. Implement `readers/yaml_reader.py` — reads pure `.yaml` files (single file with `tasks:` list or directory with `plan.yaml` + `task-*.yaml`). Returns `(plan_metadata_dict, list_of_task_dicts, FormatType.PURE_YAML)`.
  3. Implement `readers/frontmatter_reader.py` — reads `.md` files with `---` delimited YAML frontmatter per task. Handles both single-task (has `task:` field) and multi-task (body split on `\n---+\n`). Must handle the multi-YAML-fence edge case (code fences containing `---` must not be treated as segment delimiters).
  4. Implement `readers/legacy_reader.py` — reads legacy markdown with `## Task N:` headings and `**Field**: Value` markers. Extracts fields per the mapping in codebase analysis section 3.1.
  5. Implement `readers/manifest_reader.py` — reads global-manifest format (has `feature:` + `tasks:` list in frontmatter, prose sections in body with `### T{N}:` headings). This is the format that triggered #715.
  6. Implement `read_plan(path: Path) -> tuple[dict, list[dict], FormatType]` in `detect.py` that routes to the correct reader based on `detect_format()`.
  7. All readers must use `ruamel.yaml` (round-trip mode `typ='rt'`) for YAML parsing.
  8. `detect_format()` must raise `FormatDetectionError` (custom exception) with the file path and first 20 lines when no format matches.
  9. Directory format detection: if `path.is_dir()`, check for `plan.yaml` or `*.yaml`/`*.md` task files.
constraints: |-
  - Do not perform normalization to Pydantic models in readers — return raw dicts only (T5 handles normalization)
  - Do not validate field values — that is the normalizer's job
  - Use `ruamel.yaml` not `pyyaml`
  - Do not import from existing `task_format.py` or `implementation_manager.py` — this is a clean implementation
expected-outputs: |-
  - `packages/sam_schema/readers/detect.py`
  - `packages/sam_schema/readers/yaml_reader.py`
  - `packages/sam_schema/readers/frontmatter_reader.py`
  - `packages/sam_schema/readers/legacy_reader.py`
  - `packages/sam_schema/readers/manifest_reader.py`
acceptance-criteria: |-
  1. `detect_format()` correctly identifies all five format types when given representative files
  2. `yaml_reader` parses the canonical single-file YAML format from architecture spec section 5 and returns correct plan metadata and task dicts
  3. `frontmatter_reader` parses multi-task `.md` files with embedded YAML blocks and does NOT split on `---` inside code fences
  4. `legacy_reader` extracts `task`, `title`, `status`, `dependencies`, `agent`, `priority`, `complexity` from `## Task N:` format
  5. `manifest_reader` parses the global-manifest format (the format that returns zero tasks in current implementation) and returns task dicts
  6. All readers return consistent tuple shape: `(plan_meta: dict, tasks: list[dict], format_type: FormatType)`
verification-steps: |-
  1. Write a quick validation script that calls `detect_format()` on sample files of each type and asserts correct detection
  2. `uv run ty check packages/sam_schema/readers/` — zero errors
  3. `uv run ruff check packages/sam_schema/readers/` — zero errors
  4. Test frontmatter reader with a file containing YAML code fences — must not produce spurious task splits

  - Key claims to verify:
    - `ruamel.yaml` round-trip mode preserves comments and field order
    - Regex `\n---+\n` splitting is the current approach; the new implementation must handle code fences
  - Verification questions:
    1. Does `ruamel.yaml.YAML(typ='rt')` handle multi-document YAML files (multiple `---` separated docs)?
    2. What is the correct way to detect code fences before splitting on `---`?
  - Evidence to collect:
    - Read existing test fixtures in `plugins/python3-development/skills/implementation-manager/tests/` for format examples
    - Read `plan/tasks-1-backlog-state-reconciliation.md` to see the actual failing format
  - Revision rule:
    - If ruamel.yaml multi-document support works differently than assumed, revise the reader approach
