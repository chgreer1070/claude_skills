acceptance-criteria: |-
  1. `uv run python -c "from sam_schema.core.models import Task, Plan, TaskStatus, SchemaGap, ReadResult, PlanStatus; print('OK')"` exits 0
  2. `Task(id="T1", title="Test", status="not-started")` creates a valid model instance
  3. `Task(id="invalid!", title="Test", status="not-started")` raises `ValidationError` (invalid ID pattern)
  4. `Task(id="T1", title="Test", status="not-started", **{"blocked-by": ["T0"]})` works via alias (populate_by_name)
  5. All enums have correct values: `TaskStatus.NOT_STARTED.value == "not-started"`, `Priority.CRITICAL.value == 1`, `Complexity.LOW.value == "low"`
  6. `STATUS_MAP` contains all mappings from codebase analysis section 2.4 (including emoji variations)
  7. `uv run ty check packages/sam_schema/core/models.py` exits with zero errors
verification-steps: |-
  1. `uv run python -c "from sam_schema.core.models import Task, Plan, TaskStatus; t = Task(id='T1', title='Test', status='not-started'); print(t.model_dump())"` — prints valid dict
  2. `uv run python -c "from sam_schema.core.models import Task; Task(id='bad!', title='X', status='not-started')"` — raises ValidationError
  3. `uv run ty check packages/sam_schema/core/models.py` — zero errors
  4. `uv run ruff check packages/sam_schema/` — zero errors

  - Key claims to verify:
    - Pydantic `Field(alias=...)` with `populate_by_name=True` allows both snake_case and kebab-case
    - `StrEnum` and `IntEnum` work with Pydantic v2's `use_enum_values=True`
    - `field_validator` with `@classmethod` is the correct Pydantic v2 decorator pattern
  - Verification questions:
    1. Does Pydantic v2 `populate_by_name=True` accept both alias and field name in `__init__`?
    2. Does `use_enum_values=True` store the enum value (string/int) instead of the enum member?
    3. Is `@field_validator("field")` with `@classmethod` the correct v2 pattern, or is `mode="before"` needed?
  - Evidence to collect:
    - Run `uv run python -c "import pydantic; print(pydantic.__version__)"` to confirm v2
    - Test alias creation with a minimal model before writing full Task model
  - Revision rule:
    - If any check fails, revise model_config and validator patterns based on actual Pydantic v2 behavior
