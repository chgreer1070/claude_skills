description: |-
  The architecture spec (section 4, `core/dependencies.py`) defines a `DependencyGraph` class with cycle detection and readiness queries. The existing implementation in `implementation_manager.py:799-819` (`get_ready_tasks()`) has no cycle detection — circular dependencies create silent deadlocks (codebase analysis section 6.2). The new implementation adds cycle detection and blocked-task reporting.
objective: |-
  Implement `DependencyGraph` class with cycle detection, readiness queries, and blocked-task reporting per the architecture spec interfaces.
requirements: |-
  1. Implement `DependencyGraph.__init__(tasks: list[Task])` — builds adjacency list from task dependencies.
  2. Implement `get_ready_tasks() -> list[Task]` — returns tasks with `status == not-started` and all dependencies in `TERMINAL_STATUSES`.
  3. Implement `has_cycles() -> bool` — detects cycles using DFS-based algorithm (Kahn's algorithm or tarjan's SCC).
  4. Implement `get_cycles() -> list[list[str]]` — returns list of cycles as lists of task IDs.
  5. Implement `get_blocked_tasks() -> list[tuple[Task, list[str]]]` — returns tasks blocked by unsatisfied dependencies with the missing dep IDs.
  6. Define `TERMINAL_STATUSES: frozenset[TaskStatus] = frozenset({TaskStatus.COMPLETE, TaskStatus.DEFERRED, TaskStatus.SKIPPED})` at module level.
  7. Handle edge cases: tasks referencing non-existent dependency IDs (treat as unsatisfied), empty task list, single task with no deps.
constraints: |-
  - No external graph libraries — use stdlib only for the graph algorithm
  - Import `Task` and `TaskStatus` from `sam_schema.core.models` only
  - Do not perform file I/O — this is a pure in-memory computation module
expected-outputs: |-
  - `packages/sam_schema/core/dependencies.py` (replaces stub from T1)
acceptance-criteria: |-
  1. `get_ready_tasks()` returns correct tasks for a dependency chain: T1 (no deps, complete) -> T2 (depends T1, not-started) -> T3 (depends T2, not-started) returns only T2
  2. `has_cycles()` detects a cycle: T1 depends T2, T2 depends T1
  3. `get_cycles()` returns the cycle path for circular dependencies
  4. `get_blocked_tasks()` returns T3 with missing dep T2 when T2 is `in-progress`
  5. Tasks referencing non-existent IDs are reported as blocked (not silently skipped)
verification-steps: |-
  1. `uv run python -c "from sam_schema.core.dependencies import DependencyGraph, TERMINAL_STATUSES; print('OK')"` — imports succeed
  2. `uv run ty check packages/sam_schema/core/dependencies.py` — zero errors
  3. `uv run ruff check packages/sam_schema/core/dependencies.py` — zero errors
