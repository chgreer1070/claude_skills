description: |-
  The architecture spec (section 4, `server.py`) defines a FastMCP server with tools: `sam_read`, `sam_state`, `sam_ready`, `sam_status`. ADR-002 specifies this as a standalone MCP server separate from the backlog server. The existing backlog MCP server pattern is in `.claude/skills/backlog/backlog_core/server.py`. The architecture spec section 8 defines MCP server registration config.
objective: |-
  Implement `server.py` with FastMCP tools that delegate to the query layer, matching the CLI's functionality.
requirements: |-
  1. Implement `mcp = FastMCP("sam")` server.
  2. Implement `sam_read` tool: accepts `plan` (address), `task` (ID), optional `plan_dir`. Returns task dict via `get_task()`.
  3. Implement `sam_state` tool: accepts `plan`, `task`, `status`, optional `plan_dir`. Updates status via `update_status()`. Returns updated task dict.
  4. Implement `sam_ready` tool: accepts `plan`, optional `plan_dir`. Returns ready tasks list via `get_ready_tasks()`.
  5. Implement `sam_status` tool: accepts `plan`, optional `plan_dir`. Returns plan status dict via `get_plan_status()`.
  6. All tools use `Annotated[str, Field(description=...)]` for parameter documentation.
  7. MCP tools are async signatures (required by FastMCP) but delegate to synchronous query functions.
  8. Error handling: catch exceptions from query layer and return structured error dicts with `error` key.
  9. Add `__main__.py` module so server can be run with `python -m sam_schema.server`.
constraints: |-
  - All logic in query layer — server is a thin wrapper (same as CLI)
  - Do not use `asyncio.to_thread()` — file I/O is sub-millisecond
  - Return Pydantic model dicts via `model_dump(mode="json")`, not model instances
expected-outputs: |-
  - `packages/sam_schema/server.py` (replaces stub)
  - `packages/sam_schema/__main__.py` (new — for `python -m sam_schema.server`)
acceptance-criteria: |-
  1. `uv run python -c "from sam_schema.server import mcp; print(mcp.name)"` prints `"sam"`
  2. Server exposes exactly four tools: `sam_read`, `sam_state`, `sam_ready`, `sam_status`
  3. Each tool has parameter descriptions via `Field(description=...)`
  4. Error responses include `error` key with descriptive message
  5. `python -m sam_schema.server` starts the MCP server without errors
verification-steps: |-
  1. `uv run python -c "from sam_schema.server import mcp; print([t.name for t in mcp._tool_manager._tools.values()])"` — lists all four tools
  2. `uv run ty check packages/sam_schema/server.py` — zero errors
  3. `uv run ruff check packages/sam_schema/server.py` — zero errors

  - Key claims to verify:
    - FastMCP tool registration pattern with `@mcp.tool()` decorator
    - FastMCP `_tool_manager._tools` access pattern for listing tools (may differ across versions)
  - Verification questions:
    1. What is the correct FastMCP API for listing registered tools?
    2. Does FastMCP require `async def` for tool handlers, or can they be synchronous?
  - Evidence to collect:
    - Read existing backlog MCP server at `.claude/skills/backlog/backlog_core/server.py` for the project's FastMCP patterns
    - Check `fastmcp` version in project dependencies
  - Revision rule:
    - If FastMCP API differs from assumed patterns, adjust to match actual API
