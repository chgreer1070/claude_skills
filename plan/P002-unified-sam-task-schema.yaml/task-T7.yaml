description: |-
  The architecture spec (section 4) defines `core/query.py` as the central API that wires readers, normalizer, dependency graph, and writer together. It also defines `core/addressing.py` for `P{N}/T{task}` address resolution (ADR-003). All CLI and MCP operations delegate to query.py. The existing `implementation_manager.py` has `parse_task_file()`, `get_ready_tasks()`, `get_status_summary()`, and `claim_task()` — these are the operations being replaced.

  Merged scope: This task implements both `query.py` and `addressing.py` since `query.py` depends on addressing for all operations and both write to the `core/` package.
objective: |-
  Implement `core/query.py` with all query/mutation functions and `core/addressing.py` with plan address resolution, plus comprehensive tests for both modules.
constraints: |-
  - All file I/O goes through readers and writers — no direct file parsing in query.py
  - `update_status` must use `yaml_writer.update_field()` for atomic updates, not full re-serialization
  - Custom exceptions: `TaskNotFoundError`, `ClaimError`, `AddressingError` — define in `core/query.py` or a shared `exceptions.py`
expected-outputs: |-
  - `packages/sam_schema/core/query.py` (replaces stub)
  - `packages/sam_schema/core/addressing.py` (replaces stub)
  - `packages/sam_schema/tests/test_query.py`
  - `packages/sam_schema/tests/test_dependencies.py`
acceptance-criteria: |-
  1. `load_plan()` successfully loads plans from all five format types using test fixtures
  2. `get_ready_tasks()` returns correct tasks for a dependency chain with mixed statuses
  3. `update_status()` modifies the YAML file on disk and returns the updated task with correct status
  4. `claim_task()` raises `ClaimError` when task status is not `not-started`
  5. `get_plan_status()` returns correct counts, completion percentage, and detects cycles
  6. `parse_address("P1/T3")` returns `("1", "3")`; `resolve_plan_address("P1", plan_dir)` finds `tasks-1-*.yaml`
  7. All tests pass: `uv run pytest packages/sam_schema/tests/test_query.py packages/sam_schema/tests/test_dependencies.py -v`
verification-steps: |-
  1. `uv run pytest packages/sam_schema/tests/test_query.py -v` — all tests pass
  2. `uv run pytest packages/sam_schema/tests/test_dependencies.py -v` — all tests pass
  3. `uv run ty check packages/sam_schema/core/query.py packages/sam_schema/core/addressing.py` — zero errors
  4. `uv run ruff check packages/sam_schema/core/` — zero errors

  - Key claims to verify:
    - `yaml_writer.update_field()` can update a field in a multi-task YAML file by task ID
    - ruamel.yaml round-trip preserves other tasks when updating one task's field
  - Verification questions:
    1. When `update_field()` modifies one task in a multi-task YAML file, are other tasks preserved exactly?
    2. Does `resolve_plan_address` handle both `.yaml` and `.md` extensions correctly?
  - Evidence to collect:
    - Run round-trip test: write plan, update one task's status, read back, verify all tasks intact
  - Revision rule:
    - If `update_field()` cannot target a specific task in a multi-task file, implement task-level addressing in the writer
