  ### CoVe Checks

  - Key claims to verify:
    - The inlined mapping in Requirement 3 is semantically identical to `_legacy_field_to_yaml`.
      Any deviation (missing entry, wrong snake_case value, absent fallback) silently changes
      the behavior of `update_yaml_field` for all timestamp writes.
    - `import re` may or may not still be needed after deleting both legacy blocks. The legacy
      `update_task_status` block used `re.match(status_pattern, line)`. If no other function
      in the file calls `re.`, the import becomes unused (ruff F401).
  - Verification questions:
    1. Before editing: read `_legacy_field_to_yaml`'s body verbatim from the file. Does it
       match the four-entry dict shown in Requirement 2? Are there any additional entries or
       a different fallback?
    2. After deleting the `update_task_status` legacy block: does `re\.` appear anywhere else
       in `task_status_hook.py` (excluding comments and the import line itself)?
    3. Does `add_timestamp_to_task` have any callers that pass PascalCase field names
       (`"LastActivity"`, `"Started"`, `"Completed"`)? If so, the inlined map must preserve
       those mappings exactly.
  - Evidence to collect:
