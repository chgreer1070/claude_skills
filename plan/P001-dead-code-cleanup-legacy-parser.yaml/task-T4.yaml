  ### Context

  This task was not split; it is step 4 of the serial chain. This is the most accuracy-sensitive
  task: `_legacy_field_to_yaml` is called from the **live** YAML branch of `add_timestamp_to_task`,
  not from a dead branch. It must be inlined before the function is deleted, and the inline must
  be semantically identical to the original.

  Architecture source: `plan/architect-dead-code-cleanup-legacy-parser.md` — Decisions 4, 5, 6.
  Scope confirmation: `plan/codebase/dead-code-scope.md` — Q3, Q4, Summary Table.

  ### Objective

  Inline `_legacy_field_to_yaml`'s field mapping into `add_timestamp_to_task`'s YAML branch,
  then delete `_legacy_field_to_yaml`; delete `_update_legacy_timestamp`,
  `_LEGACY_INSERT_AFTER_FIELDS`, the dead legacy branch of `add_timestamp_to_task`, and the dead
  legacy branch of `update_task_status`; update affected docstrings; and remove `import re` if
  it has no remaining call sites.

  ### Required Inputs

  - `plugins/python3-development/skills/implementation-manager/scripts/task_status_hook.py`
    — read in full before acting
  - `plan/architect-dead-code-cleanup-legacy-parser.md` — Decisions 4, 5, 6
  - `plan/codebase/dead-code-scope.md` — Q3, Q4 confirming the live/dead split and the inline
    requirement

  ### Requirements

  1. Read `task_status_hook.py` in full before any edit.
  2. Locate `_legacy_field_to_yaml` (approximately lines 357–372). Read its body to extract the
     exact field map:
     ```python
     field_map = {
         "LastActivity": "last_activity",
         "Started": "started",
         "Completed": "completed",
         "Status": "status",
     }
     return field_map.get(field_name, field_name.lower())
     ```
  3. In `add_timestamp_to_task`'s YAML branch (approximately line 344), replace the call
     `yaml_field = _legacy_field_to_yaml(field_name)` with the inlined mapping:
     ```python
     _field_map = {
         "LastActivity": "last_activity",
         "Started": "started",
         "Completed": "completed",
         "Status": "status",
     }
     yaml_field = _field_map.get(field_name, field_name.lower())
     ```
     The result assigned to `yaml_field` must be identical to what `_legacy_field_to_yaml`
     returned. The subsequent `update_yaml_field(content, yaml_field, timestamp)` call is
     unchanged.
  4. Delete `_legacy_field_to_yaml` function (approximately lines 357–372).
  5. Delete `_LEGACY_INSERT_AFTER_FIELDS` constant (approximately line 282).
  6. Delete `_update_legacy_timestamp` function (approximately lines 285–316).
  7. Delete the dead legacy markdown fallback block from `add_timestamp_to_task`
     (approximately lines 347–354): the `# --- Legacy markdown format ---` comment, the
     `find_task_section` call, `start_idx`/`end_idx` unpacking, `lines = content.split(...)`,
     and the `_update_legacy_timestamp` call. The `if has_yaml_frontmatter(content):` guard
