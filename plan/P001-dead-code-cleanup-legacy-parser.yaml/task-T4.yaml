  11. Run `uv run ruff check` and `uv run ruff format --check`. Fix any issues.
  12. Run `uv run pytest` and confirm zero failures.

  ### Constraints

  - The inlined field mapping must be semantically identical to `_legacy_field_to_yaml`: same
    four explicit entries, same `.lower()` fallback. Do not change the mapping values.
  - Retain both `if has_yaml_frontmatter(content):` guards (in `add_timestamp_to_task` and
    `update_task_status`) as defensive checks. Do not convert them to `assert`.
  - Do not modify `task_format.py` or `implementation_manager.py` in this task.
  - No new abstractions. The inline is a local dict, not a module-level constant.
  - Do not change the calling signature of `add_timestamp_to_task` or `update_task_status`.

