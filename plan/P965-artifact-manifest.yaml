context: |-
  ## Context Manifest

  ### How This Currently Works: Plan Artifact System and Discovery

  The current SAM (Structured Agent-Managed) workflow produces 3–6 artifacts per feature: feature-context docs, architect specs, task plans, T0/TN baselines, and optional codebase analysis. These artifacts are local files stored in the `plan/` directory at the repository root, following naming conventions like `plan/feature-context-{slug}.md`, `plan/architect-{slug}.md`, and `plan/tasks-{N}-{slug}.yaml`.

  The workflow has no centralized inventory of what artifacts exist for a given GitHub Issue. Discovery is ad-hoc: agents rely on filesystem globbing by slug name, naming conventions, or explicit paths passed in delegation prompts. When a `/work-milestone` skill dispatches an agent into an isolated git worktree, that agent cannot access uncommitted plan files from the root worktree because the worktree has a different working directory. Plan artifacts are invisible to worktree-isolated agents unless they have been committed to the branch the worktree checks out.

  GitHub Issues (via the `issue` field in task plan frontmatter) have a one-way link to plan files through the SAM task number, but the reverse link—finding all artifacts for a given issue—requires scanning the filesystem or querying GitHub for task sub-issues and back-dereferencing to their plan numbers. There is no single authoritative registry stored on GitHub showing which artifacts belong to which issue.

  The artifact manifest system solves this by making the GitHub Issue body the source of truth for artifact inventory: a structured Artifact Manifest section lists all plan artifacts (type, path, status, creation timestamp, producing agent) for that feature. Producer agents (feature-researcher, python-cli-design-spec, swarm-task-planner, t0-baseline-capture, tn-verification-gate, codebase-analyzer) register artifacts after writing them; consumer agents (start-task, code-reviewer, feature-verifier, context-refinement, and worktree-isolated agents) discover artifacts by querying the manifest via MCP tools.

  This architecture inverts the current model: local files are the cache, GitHub Issues are the registry. Worktree-isolated agents can now query the manifest without filesystem access because the MCP tools read from GitHub, not the local disk.

  ### For Implementation: Integration Points and Provider Abstraction

  The implementation extends the existing `backlog_core` package (located in `plugins/development-harness/backlog_core/`) with three new modules:

  1. **`backlog_core/models.py` (T1 — Pydantic models)**: Adds ArtifactType and ArtifactStatus enums, plus ArtifactEntry and ArtifactManifest models using Pydantic's AliasChoices for kebab-case/snake_case field interop. RegisterResult and ArtifactContent response models define shapes for MCP tool outputs.

  2. **`backlog_core/artifact_provider.py` (T2 — Backend protocol and GitHub provider)**: Defines an ArtifactBackend Protocol with three methods (get_manifest, set_manifest, read_artifact_content) for backend abstraction. GitHubArtifactProvider implements this protocol using the existing PyGithub + GraphQL helpers in `backlog_core.github` for querying and mutating issue bodies. The manifest is stored as a markdown section delimited by HTML comments `<!-- artifact-manifest:begin/end -->` within the issue body. Path traversal prevention ensures artifact_read cannot escape the repository root or access outside `plan/`.

  3. **`backlog_core/artifact_registry.py` (T3 — Business logic)**: A stateless ArtifactRegistry class with four core methods: register (idempotent upsert by type+path), remove, get_by_type, and update_status. Module-level functions parse_manifest_section and render_manifest_section convert between issue body markdown and ArtifactManifest objects. replace_manifest_in_body updates or appends the manifest section in an issue body.

  These modules are then exposed as four MCP tools on the existing backlog MCP server (T4 — `backlog_core/server.py`): artifact_register (upsert an entry), artifact_list (query all artifacts for an issue, optionally filtered by type), artifact_get (retrieve metadata for a specific type), and artifact_read (fetch file content from root worktree).

  Integration points T7–T10 wire the new artifact tools into existing workflows: sam_create auto-registers task-plan artifacts when a plan has an issue field; backlog_update auto-registers when the plan parameter is set; /add-new-feature skill includes artifact_register calls in each producer phase delegation prompt; /work-milestone, /start-task, and /implement-feature skills use artifact_list and artifact_read for discovery and registration.

  ### Technical Reference Details

  #### Models and Enums (T1)

  All models use Pydantic 2.x BaseModel with AliasChoices for kebab/snake case compatibility:

  - **ArtifactType** StrEnum: feature-context, architect, task-plan, T0-baseline, TN-verification, codebase-analysis
  - **ArtifactStatus** StrEnum: draft, current, superseded, archived
  - **ArtifactEntry** fields: artifact_type (aliased to both "artifact-type" and "artifact_type"), path, status, created_at (timestamp), agent
  - **ArtifactManifest** fields: issue_number (int), artifacts (list[ArtifactEntry]), last_updated (timestamp)
  - **RegisterResult** response: registered (bool), artifact_count (int), action (str: "added" | "updated")
  - **ArtifactContent** response: artifact_type, path, content (str), status

  Type checking via basedpyright; no errors allowed.

  #### Backend Protocol and GitHub Provider (T2)

  **ArtifactBackend Protocol** (abstract):
  ```python
  @runtime_checkable
  class ArtifactBackend(Protocol):
      def get_manifest(self, issue_number: int) -> ArtifactManifest: ...
      def set_manifest(self, issue_number: int, manifest: ArtifactManifest) -> None: ...
      def read_artifact_content(self, path: str) -> str: ...
  ```

  **GitHubArtifactProvider** initialization takes repo (str, format: "owner/name") and root_worktree (Path). Reuses existing backlog_core.github.GraphQLHelper for issue body queries/mutations. Missing manifest sections return empty ArtifactManifest (not an error). Path validation: must be under repo root and start with "plan/".

  Manifest section delimiters in issue body:
  ```
  <!-- artifact-manifest:begin -->
  | Type | Path | Status |
  | ... | ... | ... |
  <!-- artifact-manifest:end -->
  ```

  #### Registry Business Logic (T3)

  ArtifactRegistry is entirely stateless. The register method implements idempotent upsert: if an entry with matching type and path exists, update its status/agent/timestamp; if only type matches but paths differ, add a new row. remove, update_status, and get_by_type operate on passed-in Manifest objects. parse_manifest_section extracts markdown table rows from the delimited section; render_manifest_section produces the full markdown including heading and delimiters; replace_manifest_in_body replaces an existing section in-place or appends if absent, preserving surrounding content.

  #### MCP Tools (T4)

  Four new tools added to existing backlog MCP server (not a new server):

  - **artifact_register** (issue_number: int, artifact_type: str, path: str, status: str = "current", agent: str = ""): Returns RegisterResult
  - **artifact_list** (issue_number: int, artifact_type: str | None = None): Returns {artifacts: list[dict], count: int}
  - **artifact_get** (issue_number: int, artifact_type: str): Returns {artifacts: list[dict]} or error if type not found
  - **artifact_read** (issue_number: int, artifact_type: str): Returns ArtifactContent with file content read from root worktree

  All tools use artifact_ prefix for namespace clarity.

  #### File Locations

  **Core implementation modules**:
  - `plugins/development-harness/backlog_core/models.py` (T1 — extend existing)
  - `plugins/development-harness/backlog_core/artifact_provider.py` (T2 — new)
  - `plugins/development-harness/backlog_core/artifact_registry.py` (T3 — new)
  - `plugins/development-harness/backlog_core/server.py` (T4 — extend existing)

  **Tests**:
  - `plugins/development-harness/tests_backlog/test_artifact_registry.py` (T5)
  - `plugins/development-harness/tests_backlog/test_artifact_provider.py` (T5)

  **Skill modifications**:
  - `.claude/skills/add-new-feature/SKILL.md` (T6 — add artifact_register to phase delegations)
  - `plugins/development-harness/skills/work-milestone/SKILL.md` (T9 — add artifact_list/artifact_read instructions)
  - `.claude/skills/start-task/SKILL.md` (T10 — add artifact discovery)
  - `.claude/skills/implement-feature/SKILL.md` (T10 — add T0/TN registration)

  **SAM integration**:
  - `plugins/development-harness/sam_schema/server.py` (T7 — extend sam_create for auto-registration)
  - `plugins/development-harness/backlog_core/operations.py` (T8 — extend backlog_update for auto-registration)

  **Documentation updates**:
  - `.claude/rules/local-workflow.md` (T11 — add Artifact Manifest section and update Phase 1/2 descriptions)
  - `.claude/docs/plan-artifact-lifecycle.md` (T11 — document manifest as registry)
  - `plugins/development-harness/docs/workflow-architecture-diagram.md` (T11 — add artifact registration/discovery arrows)

  #### Configuration and Runtime

  All tools use the same GitHub authentication (GITHUB_TOKEN, PyGithub client) as existing backlog tools. No new environment variables required. Backward compatibility: existing plan artifacts and workflows continue to function. The manifest is additive—agents can register artifacts at their own pace; consumers with artifact_list returning empty manifest fall back to filesystem paths.

  #### MCP Tools and Related Systems

  The implementation depends on:
  - FastMCP 3.x server framework (existing — backlog MCP server already uses it)
  - PyGithub GraphQL client (existing in backlog_core.github)
  - Pydantic 2.x (project standard)
  - SAM MCP server hooks for auto-registration at plan creation (T7)
  - Backlog MCP server operation hooks for auto-registration at backlog_update (T8)

  #### External References and GitHub Issue

  GitHub Issue #965 documents the problem space, desired outcomes, constraints, and artifact taxonomy. The feature-context, architect spec, and codebase analysis artifacts provide additional context on design decisions and industry research (Linear, Jira, Monday.com patterns for artifact management).

  Plan artifacts referenced by this task:
  - `plan/feature-context-artifact-manifest.md` — problem space, desired outcomes, personas, constraints
  - `plan/architect-artifact-manifest.md` — full architecture spec, C4 diagrams, data flows, component interfaces
  - `plan/codebase/artifact-manifest-patterns.md` — current artifact creation patterns, storage structure, naming conventions, integration points

discovered-during-implementation: |-
  ## Date: 2026-03-22

  ### Manifest Section Format Validation: Silent Row Skipping

  The implementation enforces a strict 5-column markdown table format within HTML comment delimiters (artifact-manifest:begin/end). If rows have fewer than 5 columns, they are silently skipped without warning. This graceful-degradation approach means a malformed manifest loses entries silently—a subtle bug where an agent thinks a manifest is empty when it contains unparseable rows.

  ### ArtifactEntry Alias Choices: Confusing Validation Messages

  The T1 models use Pydantic's AliasChoices for kebab-case and snake_case interop. During validation errors, both alias names appear in error messages, which can confuse end users who may not understand why both forms are mentioned.

  ### Test Coverage Gap: No Worktree Safety Integration Tests

  T5 tests verify parse/render/replace logic but lack integration tests for artifact_read path traversal prevention when called from a worktree agent with an alternative root_worktree parameter. The implementation is straightforward (direct path comparison against root), but future worktree-isolation issues will need this coverage.

  ### Skill Tool Availability Assumption: Silent Failure Mode

  T6 (add-new-feature skill) and T9/T10 (other skill updates) assume artifact_register and artifact_list MCP tools are available when agents call them. No validation or retry logic was added. If the backlog MCP plugin fails to load in a sub-agent context, registrations silently fail (logged as warning). This creates a silent failure mode where agents trust the tool exists but may silently fail to register artifacts.

  ### SAM Auto-Registration Adoption Dependency

  T7 (sam_create auto-registration) only registers task-plan artifacts when a plan has an issue field. Plans created without an issue field are invisible to the artifact discovery system. Adoption of the manifest system depends on workflow discipline—orchestrators must remember to set the issue field at plan creation time.
