goal: |-
  Replace all uv run sam CLI patterns in workflow skills and agent files with mcp__plugin_dh_sam__* MCP tool calls
context: |-
  See plan/feature-context-sam-mcp-migration.md and plan/architect-sam-mcp-migration.md for full context.

  CLI-to-MCP Mapping (from TASK_FILE_FORMAT.md):
  uv run sam list -> mcp__plugin_dh_sam__sam_list
  uv run sam create -> mcp__plugin_dh_sam__sam_create
  uv run sam read -> mcp__plugin_dh_sam__sam_read
  uv run sam update -> mcp__plugin_dh_sam__sam_update
  uv run sam claim -> mcp__plugin_dh_sam__sam_claim
  uv run sam state -> mcp__plugin_dh_sam__sam_state
  uv run sam ready -> mcp__plugin_dh_sam__sam_ready
  uv run sam status -> mcp__plugin_dh_sam__sam_status

  Constraints: implementation-manager SKILL.md line 13 must remain CLI (load-time command substitution). CLI becomes fallback-only. Each agent gets only its specific MCP tools.

  Implementation complete: All 11 files updated. 4 agents got SAM MCP tools in frontmatter. 4 skills rewritten to use MCP as primary. 3 docs restructured with MCP primary, CLI fallback.
