feature: dispatch-orchestration-mcp-tools
version: '1.0'
description: ''
goal: |-
  Add four new MCP tools (dispatch_wave_start, dispatch_item_status, dispatch_wave_status, dispatch_spawn) to the backlog server with SQLite state backend at ~/.dh/projects/{project-stub}/dispatch-state.db and FastMCP background task support.
context: |-
  Generated by context-gathering agent on 2026-03-22

  ### How the Backlog Server Currently Works and Where Dispatch Tools Integrate

  The backlog server (`plugins/development-harness/backlog_core/server.py`) is a FastMCP v3 application that provides MCP tools for managing GitHub issues and artifacts as backlog items. It runs via `uv run scripts/run_backlog_server.py`, which includes PEP 723 inline metadata declaring dependencies including `fastmcp>=3.0.2`.

  **Current Architecture:**

  The server is structured in layers:

  1. **Data Models** (`backlog_core/models.py`): Pydantic v2 BaseModel subclasses representing backlog items, artifacts, and related structures. All models use Pydantic v2 conventions with `Field(description=...)` for schema documentation.

  2. **MCP Tool Registration** (`backlog_core/server.py`): Async functions decorated with `@mcp.tool` that receive `mcp` instance (the FastMCP server), parse Annotated parameters, execute business logic, and return dicts (not typed models — this is critical for MCP protocol compliance). The pattern used throughout is:
     ```python
     @mcp.tool
     async def tool_name(
         param1: Annotated[str, Field(description="...")],
         param2: Annotated[int, Field(description="...")] = default
     ) -> dict:
         # logic here
         return {"key": "value"}
     ```

  3. **Server Initialization**: The `mcp` instance is created once at module load, tools are registered via decorators, and the server runs until process termination.

  **Current Tool Examples**: The server already has tools like `backlog_sync`, `artifact_register`, and others that manage GitHub issues and artifacts. All follow the async + dict return pattern and wrap sync I/O in `asyncio.to_thread()` when needed.

  ### What Dispatch Tools Add: Four New MCP Tools for Parallel Task Spawning

  This feature adds four new tools for orchestrating parallel task execution across git worktrees using background FastMCP tasks:

  1. **`dispatch_wave_start`** — Creates a new "wave" (numbered attempt) containing multiple items (tasks/jobs) to run in parallel. Returns wave metadata.

  2. **`dispatch_item_status`** — Queries the status of a single dispatch item by milestone and issue number. Returns item state (pending, in-progress, complete, failed) and timestamps.

  3. **`dispatch_wave_status`** — Queries the status of all items in a wave by milestone and wave number. Checks for stale PIDs before responding. Returns wave summary with per-item status.

  4. **`dispatch_spawn`** — The background task worker. Takes a dispatch plan YAML, iterates waves (starting from a specified wave number), spawns parallel item tasks, monitors their PIDs, and reports progress. Uses `@mcp.tool(task=True)` to run as a FastMCP background task. Invokes `spawn.py` script for each item.

  **State Backend**: All four tools interact with a SQLite database at `~/.dh/projects/{project-stub}/dispatch-state.db` (where `project-stub` is derived from the repo root path by replacing `/` with `-` and stripping leading `-`). The database is managed by a new `DispatchStateManager` class defined in a new file `backlog_core/dispatch_state.py`.

  ### Core Implementation Files and Their Responsibilities

  **`plugins/development-harness/backlog_core/models.py` (EXISTING)**
  - Receives five new Pydantic BaseModel classes: `DispatchItemRecord`, `DispatchWaveRecord`, `DispatchSpawnResult`, `DispatchWaveSummary`, `DispatchSpawnSummary`
  - Each model maps to dispatch state and response structures
  - Field definitions are in the architect spec (Section 5.2)
  - No changes to existing models

  **`plugins/development-harness/backlog_core/dispatch_state.py` (NEW FILE)**
  - Single responsibility: SQLite state management for dispatch operations
  - Core class: `DispatchStateManager` with these methods:
    - `__init__(db_path: str)` — creates DB at path, calls `ensure_schema()`
    - `ensure_schema()` — creates `waves` and `items` tables if they don't exist. Schema is in architect spec Section 5.1
    - `create_wave(milestone: int, wave_num: int, num_items: int) -> DispatchWaveRecord` — inserts wave + item rows
    - `set_item_in_progress(wave_id: int, item_num: int, pid: int) -> None` — marks item started with PID
    - `set_item_complete(wave_id: int, item_num: int, result_file: str) -> None` — marks item done with result path
    - `set_item_failed(wave_id: int, item_num: int, error: str) -> None` — marks item failed with error message
    - `get_wave(wave_id: int) -> DispatchWaveRecord | None` — retrieves wave and all nested items
    - `get_wave_items(wave_id: int) -> list[DispatchItemRecord]` — retrieves items in a wave
    - `get_all_waves(milestone: int) -> list[DispatchWaveRecord]` — retrieves all waves for a milestone (used by dispatch_item_status to find items across waves)
    - `get_item(milestone: int, wave_num: int, issue: int) -> DispatchItemRecord | None` — single item lookup
    - `check_stale_pids(wave_id: int) -> None` — finds in-progress items with dead PIDs (via `os.kill(pid, 0)` check) and marks them failed
  - All methods are synchronous (no async)
  - Connection uses `check_same_thread=False` to allow access from async code
  - Uses stdlib `sqlite3` only, no ORM

  **`plugins/development-harness/backlog_core/server.py` (EXISTING, RECEIVES NEW TOOLS)**
  - Four new async functions added as `@mcp.tool` decorated methods:

    **`dispatch_wave_start`** (`@mcp.tool`):
    - Parameters: `milestone` (int), `wave_num` (int), `num_items` (int), `dispatch_plan_path` (str)
    - Logic: Calls state manager to create wave, returns `{"wave_id": int, "status": "created"}`

    **`dispatch_item_status`** (`@mcp.tool`):
    - Parameters: `milestone` (int), `issue` (int)
    - Logic: Calls `_dispatch_state_manager().get_all_waves(milestone)`, iterates all waves to find item with matching issue, returns item state: `{"issue": int, "status": str, "wave_num": int, "item_num": int, "pid": int | null, "timestamps": {...}}`

    **`dispatch_wave_status`** (`@mcp.tool`):
    - Parameters: `milestone` (int), `wave_num` (int)
    - Logic: Gets wave by number, calls `check_stale_pids()` before returning, returns `{"wave_num": int, "items": [...], "summary": DispatchWaveSummary}`

    **`dispatch_spawn`** (`@mcp.tool(task=True)`):
    - Parameters: `dispatch_plan_path` (str), `start_wave_num` (int), `max_concurrent` (int = 4)
    - Logic:
      1. Parse dispatch plan YAML from `dispatch_plan_path`
      2. For each wave starting at `start_wave_num`, for each item in wave:
         - Call spawn.py via `asyncio.create_subprocess_exec()`
         - Monitor PID via `os.kill(pid, 0)` in loop
         - Check for result file existence to detect completion
         - Use `asyncio.Semaphore(max_concurrent)` to limit parallel processes
         - Wrap all sync I/O in `asyncio.to_thread()`
         - Call `ctx.report_progress(completed, total)` to report progress
      3. Continue on item failure (skip-on-failure per item), wave continues when one item fails
      4. Return completion summary: `{"total_items": int, "completed": int, "failed": int}`

  - Helper functions:
    - `_dispatch_state_manager()` — lazy singleton factory that creates and caches `DispatchStateManager` with DB path at `~/.dh/projects/{project_stub}/dispatch-state.db`
    - `_project_stub()` — derives project slug from BACKLOG_DIR (which points to `.claude/backlog/`) by going up two levels to repo root, converting path `/home/user/repos/project-name` → `home-user-repos-project-name`, stripping leading `-`
    - All I/O on DispatchStateManager (sync) is wrapped in `asyncio.to_thread()`
    - Error handling catches `FileNotFoundError` (dispatch plan YAML missing), `ValueError` (dispatch plan YAML parsing)

  **`plugins/development-harness/skills/kage-bunshin/scripts/spawn.py` (EXISTING, WILL BE CALLED)**
  - Invoked by `dispatch_spawn` for each item
  - Receives arguments: `--milestone {m}`, `--issue {i}`, `--worktree-path {path}`, `--result-file {result_file}`
  - Behavior: Spawns a new shell session in an isolated git worktree, runs tasks, writes result to result file
  - Note: PID monitoring is done by the spawn loop in dispatch_spawn, not via callback

  **`plugins/development-harness/scripts/run_backlog_server.py` (EXISTING, RECEIVES PEP 723 UPDATE)**
  - PEP 723 block MUST be updated from `fastmcp>=3.0.2` to `fastmcp[tasks]>=3.0.2` (the `[tasks]` extra includes background task support)
  - This file is run via `uv run scripts/run_backlog_server.py`
  - Current dependencies are declared inline; new fastmcp[tasks] requirement is added there

  **`plugins/development-harness/pyproject.toml` (EXISTING, RECEIVES DEV DEPENDENCY)**
  - Must add `fastmcp[tasks]>=3.0.2` as a dev dependency (via `uv add --dev`)
  - This ensures the dependency is available in the development environment for linting, testing, and local runs
  - The PEP 723 block in run_backlog_server.py is SEPARATE and serves the `uv run` use case at runtime

  ### Data Models: Pydantic Structures for Dispatch State

  All models inherit from Pydantic v2 `BaseModel` and reside in `backlog_core/models.py`:

  1. **`DispatchItemRecord`** — Represents a single item (task) in a dispatch wave:
     - `item_num: int` — ordinal position in wave (1-indexed)
     - `issue: int` — GitHub issue number for this item
     - `status: str` — "pending" | "in-progress" | "complete" | "failed"
     - `pid: int | None` — process ID of spawned session (null if not yet started)
     - `created_at: datetime` — when item was created
     - `started_at: datetime | None` — when item entered in-progress
     - `completed_at: datetime | None` — when item entered complete or failed
     - `error: str | None` — error message if status is failed

  2. **`DispatchWaveRecord`** — Represents a wave (attempt/batch of items):
     - `wave_id: int` — database row ID
     - `milestone: int` — backlog milestone number (issue number of parent story)
     - `wave_num: int` — ordinal attempt number (1, 2, 3...)
     - `status: str` — "in-progress" | "complete"
     - `items: list[DispatchItemRecord]` — all items in this wave
     - `created_at: datetime`
     - `updated_at: datetime`

  3. **`DispatchSpawnResult`** — Single item result from a spawn:
     - `issue: int`
     - `status: str` — success | failure
     - `exit_code: int`
     - `result_file: str` — path to result file if successful

  4. **`DispatchWaveSummary`** — Aggregate status of a wave:
     - `wave_num: int`
     - `total_items: int`
     - `pending: int`
     - `in_progress: int`
     - `complete: int`
     - `failed: int`

  5. **`DispatchSpawnSummary`** — Overall result of a dispatch_spawn run:
     - `total_items: int`
     - `completed: int`
     - `failed: int`

  ### Sync Checkpoints and Verification Strategy

  The implementation includes four synchronization points where implementers should verify progress before moving to the next phase:

  **SYNC 1 (after T01)**: Models are importable and fastmcp[tasks] is installed
  - Verify: `uv run python -c 'from backlog_core.models import DispatchItemRecord, DispatchWaveRecord, ...'` returns 0
  - Verify: `uv run prek run --files plugins/development-harness/backlog_core/models.py` returns 0

  **SYNC 2 (after T03)**: SQLite state manager works in isolation
  - Verify: `uv run pytest tests/test_dispatch_state.py -v` passes all tests
  - Verify: Database schema is correct, CRUD operations work, stale PID detection works

  **SYNC 3 (after T04)**: MCP tools register and are callable
  - Verify: `uv run prek run --files plugins/development-harness/backlog_core/server.py` returns 0
  - Verify: Server starts without errors, tools appear in `@mcp.list_tools()` output
  - Verify: Lazy singleton returns same DispatchStateManager instance on repeated calls

  **SYNC 4 (after T05+T06)**: Full test suite passes
  - Verify: `uv run pytest tests/test_dispatch_state.py tests/test_dispatch_tools.py -v` passes with 80% coverage of dispatch_state.py and dispatch code paths in server.py

  ### Key Design Decisions Rationale

  **FastMCP[tasks] over plain fastmcp**: The `[tasks]` extra provides background task support via `@mcp.tool(task=True)`, allowing dispatch_spawn to run asynchronously and report progress without blocking the client.

  **SQLite over ORM**: Lightweight, no additional dependencies, simple schema, synchronous API allows easy wrapping in `asyncio.to_thread()` for async context.

  **Lazy singleton for DispatchStateManager**: Avoids repeated DB connection creation, centralizes DB path logic, simplifies test mocking (single point to patch).

  **asyncio.Semaphore for concurrency throttle**: Prevents resource exhaustion when spawning many parallel items, allows configurable max_concurrent parameter.

  **PID monitoring vs. callbacks**: Spawn.py doesn't need to know about dispatch state; dispatch_spawn simply polls PIDs in a loop. Simpler contract, avoids coupling spawn.py to dispatch infrastructure.

  **Skip-on-failure per item**: Individual item failures don't block other items or subsequent waves. Operator can inspect failed items and decide to retry or continue.

  **No quality gate integration in v1**: Dispatch orchestration is independent of the `complete-implementation` quality gates. Future integration point (v2) will add verification/rollback.

  **Project stub derivation**: Maps absolute repo paths to stable database identifiers that survive renames. Used to locate the correct dispatch-state.db for a project.

  ### Task Dependencies and Execution Order

  - **T01** (models + deps): No dependencies, executes first (Priority 1)
  - **T03** (state manager): Depends on T01 (models must be importable), Priority 2
  - **T04** (MCP tools): Depends on T01 (models) and T03 (state manager), Priority 3
  - **T05** (unit tests): Depends on T03 (state manager must exist), Priority 4, can parallelize with T06
  - **T06** (integration tests): Depends on T04 (tools must exist), Priority 4, can parallelize with T05

  All tasks use the `python3-development:python-cli-architect` agent (and pytest-architect for T05/T06) to implement code changes.

  ### Testing Strategy

  **Unit tests** (T05): Cover DispatchStateManager in isolation using temporary SQLite databases. Test schema creation, CRUD operations, PID monitoring, wave retrieval.

  **Integration tests** (T06): Cover the four MCP tools end-to-end using mocked subprocess calls and temporary databases. Verify tool registration, parameter passing, progress reporting, error handling.

  No real process spawning occurs in tests — subprocess calls are mocked to avoid side effects.

  ### Error Handling and Resilience

  - **Missing dispatch plan**: `dispatch_spawn` catches `FileNotFoundError` and returns error response
  - **Invalid dispatch plan YAML**: Caught as `ValueError` and reported
  - **Stale PIDs**: Detected in dispatch_wave_status before responding; item marked failed if PID is dead
  - **Item failure**: Logged and wave continues (skip-on-failure model)
  - **Database errors**: Propagate (no silent failures), allowing operator to diagnose state corruption
  - **Async I/O wrapping**: All sync I/O on DispatchStateManager is wrapped in `asyncio.to_thread()` to prevent blocking the event loop
