  ## Discovered During Implementation

  _Session Date: 2026-03-19_

  During implementation, several discoveries were made that weren't in the original context manifest.

  **1. sam migrate had 3 silent data-loss bugs (fixed during implementation)**

  The `sam migrate` command in `packages/sam_schema/` had three distinct silent data-loss bugs discovered when migrating plan files during this feature:

  - `_extract_bold_fields()` was dead code — referenced but never called, causing fields to silently drop during migration
  - String-format task entries in YAML were silently dropped (only dict-format entries were processed)
  - Unicode emoji status strings (e.g., '✅ COMPLETE') were not stripped correctly, causing status normalization to fail silently

  All three bugs were fixed in `packages/sam_schema/` as part of this session. 16 regression tests were added (680 total passing). Future migration operations are now safe.

  **2. Three plan file format generations discovered**

  The codebase has three distinct plan file format generations:
  - `global_manifest`: A legacy format using a different schema (e.g., the P1 add-status-field plan)
  - Legacy markdown: Monolithic `.md` files with `## Task {ID}:` headers
  - Current fenced-YAML: Directory-per-plan with individual `task-T{N}.yaml` files (this feature's format)

  The `sam` CLI handles all three but the `migrate` command's bugs meant migrating between formats silently corrupted data. This is now fixed.

  **3. Phase 5 fix required for skill files outside task scope**

  During implementation, `add-new-feature/SKILL.md` and `complete-implementation/SKILL.md` contained references to `python3-development:` namespace agents that also required updating to `@dh:`. These files were not in the original task list (T3 covered only `local-workflow.md`). The fix was applied as a Phase 5 correction.

  **4. local-workflow.md used cell-blanking rather than column removal**

  The architecture spec (§Step 2) specified removing the `python3-development` column entirely from Agent File Locations tables. The actual implementation blanked the column cells (replacing content with `—`) rather than removing the column structure. This preserves markdown table integrity while achieving the same semantic result — shared agent rows show `—` in the python3-development column, not a live path.

  **5. Follow-up backlog items P779 and P780 created**

  - P779: Pre-existing test bug in `test_writers_new.py` (wrong exception type assertion) — discovered during regression test addition, tracked separately
  - P780: Stale backlog references to python3-development namespace agents in historical `.claude/backlog/` files — tracked for future cleanup

  #### Updated Technical Details

  - `packages/sam_schema/sam_schema/cli.py`: Fixed `_extract_bold_fields()` dead code, string-entry drop, Unicode status strip failure
  - `packages/sam_schema/tests/`: 16 regression tests added for migration correctness
  - `plugins/python3-development/skills/add-new-feature/SKILL.md`: Updated to `@dh:` namespace
  - `plugins/python3-development/skills/complete-implementation/SKILL.md`: Updated to `@dh:` namespace
  - The D1 decision was Option B: delete `ecosystem-researcher-v1.1-rt-ica.md` as-is

  #### Gotchas for Future Developers

  - `sam migrate` had silent data-loss bugs — always verify migration output against the source plan file after running it
  - The three plan format generations coexist in `plan/` — the `sam` CLI handles all three but behavior differences exist at migration boundaries
  - When blanking Agent File Locations table cells, preserve column structure (use `—`) rather than removing columns — removing columns breaks table alignment for agents that remain in both locations
  - `add-new-feature/SKILL.md` and `complete-implementation/SKILL.md` also contained shared-agent namespace references and must be updated when doing future agent namespace migrations

  ## Additional Discoveries

  _Session Date: 2026-03-19_

  Two discoveries from the implementation session were not captured in the prior annotation run:

  **1. development-harness .mcp.json had \${CLAUDE_PROJECT_DIR} causing MCP validation error**

  The `plugins/development-harness/.mcp.json` used `\${CLAUDE_PROJECT_DIR}` in its `args` array. This environment variable is not expanded by the MCP server validator, causing the development-harness plugin to fail MCP validation. The fix replaced the variable reference with a literal path. Future .mcp.json files in any plugin must use literal paths in `args`, not environment variable references.

  **2. service-docs-maintainer @dh: prefix missing in complete-implementation/SKILL.md**

  The `complete-implementation/SKILL.md` file contained a reference to `service-docs-maintainer` without the `@dh:` namespace prefix. This was identified by the integration-checker agent during quality gates. The reference was updated to `@dh:service-docs-maintainer` to match the actual agent location in development-harness. This is the same class of namespace migration as the T3-T6 reference updates, but it appeared in a skill file rather than a workflow doc.

  #### Gotchas for Future Developers

  - `.mcp.json` files in plugin directories must use literal paths in `args`, not `\${CLAUDE_PROJECT_DIR}` or similar environment variable references — the MCP validator does not expand these
  - When auditing for stale `python3-development:` namespace references, include skill files (`SKILL.md`) not just reference docs — `complete-implementation/SKILL.md` was missed by the initial Task 3-6 pass
