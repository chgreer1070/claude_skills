  status: not-started
  agent: python3-development:python-cli-architect
  priority: 1
  complexity: medium
  skills:
  - python3-development
  acceptance_criteria:
  - "_build_list_entry() includes 'type' and 'topic' fields in returned dict, sourced from metadata.type and metadata.topic"
  - "list_items() accepts type_ and topic parameters; when type_ is provided, only items with matching metadata.type (case-insensitive exact match) are returned"
  - "list_items() topic parameter performs case-insensitive substring match against metadata.topic"
  - "Filters compose with AND logic — backlog_list(section='P1', type='Bug') returns only P1 bugs"
  - "Items missing metadata.type are included when no type filter is active, excluded when type filter is active"
  - "Items missing metadata.topic are included when no topic filter is active, excluded when topic filter is active"
  - "Invalid type values (e.g., 'InvalidType') return empty results with count 0, no error raised"
  - "Omitting both new parameters preserves identical behavior to pre-change — backward compatible"
  verification_steps:
