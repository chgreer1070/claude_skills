context_manifest_update:
  session: 2026-03-16
  discoveries:
  - id: DR-1
    classification: design-refinement
    title: parsing.py was changed despite spec listing it as unchanged
    detail: |
      The architect spec (section 3, "Files NOT Changed") stated: "parsing.py — find_item() is
      used by backlog_view, backlog_update, backlog_close, backlog_resolve, backlog_groom. These
      resolve a single item by selector. They do not need semantic matching. find_item() remains
      unchanged."

      During implementation, parsing.py was modified in parse_item_file() to populate two new
      BacklogItem fields:

        type_=meta.get("type", ""),
        topic=meta.get("topic", ""),

      This change was necessary because BacklogItem (models.py) was extended with type_ and topic
      fields, and parse_item_file() is the only place frontmatter is deserialized into BacklogItem
      instances. Without this change, the new model fields would always be empty regardless of
      frontmatter content.

      The spec error was an incorrect scope assessment: the architect assumed BacklogItem was
      populated elsewhere, but parsing.py is the sole deserialization point. Future architects
      should note that any new BacklogItem field requires a corresponding change to
      parse_item_file() in parsing.py.

      Code review confirmed this is additive and correct — not a code defect. The spec section 3
      "Files NOT Changed" list was inaccurate.

  - id: DR-2
    classification: design-refinement
    title: models.py was changed but not listed in architect spec change
      inventory
    detail: |
      The architect spec change inventory (section 3) listed operations.py, server.py, backlog.py,
      work-backlog-item/SKILL.md, and complete-implementation/SKILL.md as the files to change.
      models.py was not mentioned.

      During implementation, models.py (BacklogItem Pydantic model) was extended with:

        type_: str = ""
        topic: str = ""

      This was required to make the new fields available on BacklogItem instances throughout the
      codebase. The model is the canonical data carrier; adding filter fields to operations.py
      without extending the model would have required bypassing the model entirely.

      The architect spec implicitly assumed operations.py could add fields to _build_list_entry()
      by reading frontmatter directly (bypassing BacklogItem), but the actual code reads from
      BacklogItem attributes after parsing. Future implementation plans involving new backlog
      metadata fields should list models.py as a required change.

  - id: DR-3
    classification: design-refinement
    title: type/topic response fields emit empty string not None —
      spec/implementation mismatch
    detail: |
      The architect spec (section 1.1) defined the new response fields as:

        "type": str | None,    # None when metadata.type absent
        "topic": str | None,   # None when metadata.topic absent

      The implementation emits "" (empty string) for both fields when metadata is absent, because
      BacklogItem defaults are str = "" and _build_list_entry() reads item.type_ and item.topic
      directly. Tests assert items[0]["type"] == "" which is consistent with the implementation
      but inconsistent with the spec.

      Code review (Warning 2) identified this. Resolution: the spec was updated to document empty
      string as the canonical absent-field representation, matching the implementation. Callers
      must test `if item["type"]` (falsy check), not `if item["type"] is None`, to detect absent
      type metadata. The backlog-mcp-validator.md agent context file was updated accordingly.

  - id: DR-4
    classification: design-refinement
    title: CLI case-sensitivity bug found by code review and fixed
    detail: |
      Code review (Warning 1) found that backlog.py CLI initially implemented --type filtering
      with direct equality comparison (case-sensitive) while operations.py used lowercase
      normalization (case-insensitive). Additionally, --topic used exact equality rather than
      substring matching.

      The bug: `backlog.py list --type bug` against an item stored as `Bug` returned zero results,
      while the equivalent MCP tool call returned one result.

      The fix (visible in final implementation): both sides normalized to lowercase for --type;
      substring `in` matching used for --topic. The final backlog.py diff shows the corrected
      implementation with `type_lower = type_filter.lower()` and
      `topic_lower in it.get("metadata", {}).get("topic", "").lower()`.

      Implication for future CLI additions: when adding filter flags to backlog.py that correspond
      to operations.py parameters, case normalization and matching semantics must be explicitly
      matched between the two codepaths — they do not share filter logic.

  - id: DR-5
    classification: design-refinement
    title: FastMCP 3.0.2 prune_titles bug removes title parameter from MCP tool
      schema
    detail: |
      Already documented in T2 divergence_notes_detail. Summary for context manifest: FastMCP
      3.0.2 _single_pass_optimize(prune_titles=True) in fastmcp/utilities/json_schema.py removes
      any property named "title" when sibling JSON Schema keywords (e.g. "type") are present.
      Adding type_ with alias="type" to the backlog_list schema caused Pydantic to emit a schema
      with both "title" and "type" as property names, triggering the pruner.

      The title filter parameter is functional at runtime (MCP clients can pass "title" and it
      routes correctly) but absent from the introspectable schema. This is a FastMCP library bug.
      A backlog item tracks upgrading FastMCP or patching the schema post-generation.

      Implication: when adding parameters named after JSON Schema keywords (type, title, format,
      etc.) to FastMCP tools, verify the emitted schema via mcp.list_tools() output — the
      parameter may be silently pruned from introspection even though it works at runtime.

  - id: DR-6
    classification: design-refinement
    title: zvec added speculatively to pyproject.toml for deferred Layer 3
    detail: |
      zvec>=0.2.0 was added to pyproject.toml dev dependencies during this implementation.
      None of the changed files import or reference zvec. The feature context and architect spec
      both mark Layer 3 (vector embeddings via zvec) as deferred (layer_3_deferred: true).

      Code review (Suggestion 2) flagged this as dead dev dependency. The dependency was added
      speculatively in anticipation of Layer 3 work. If zvec is removed in a cleanup pass, note
      that it was added intentionally for future Layer 3 vector retrieval work on this feature.
context: |
  Generated by context-gathering agent on 2026-03-21

  ## How This Currently Works: SAM Workflow Architecture

  The SAM (Structured Agent-Managed) workflow is a multi-phase system that converts feature ideas into executable task files, implements them via agent delegation, and validates results through quality gates. The system integrates five components:

  **Component 1: Backlog System (backlog_core MCP server)**
  Manages items in .claude/backlog/ directory, syncs with GitHub Issues (source of truth). The backlog_add MCP tool creates both a local .md file and a GitHub issue with issue_number. That issue_number becomes the parent_issue_number for all downstream task tracking. Fields: title, priority (P0-P2 or Ideas), type, description, status, issue_number, plan (file path when linked to a SAM plan).

  **Component 2: SAM Task Files (plan/ directory + sam CLI)**
  The sam CLI reads/writes plan YAML files. Two formats supported: single file (plan/tasks-{N}-{slug}.md) or directory (plan/tasks-{slug}/ with one file per task). Each task has: task ID, title, status (not-started | in-progress | complete | blocked | deferred | skipped), agent (who implements it), dependencies, priority, complexity, skills (list), started timestamp, completed timestamp, last-activity timestamp. Plan-level fields: plan_number, slug, goal, issue (GitHub issue number), status.

  **Component 3: Ready Task Query (sam_ready CLI + backlog_get_ready_sam_tasks MCP)**
  When a task's status is not-started AND all dependencies have status complete, it is ready. sam_ready returns ReadyTasksResult: {feature: slug, ready_tasks: [{id, name, agent, skills, issue_number, ...}], count: N}. The MCP version (backlog_get_ready_sam_tasks) adds skills from task YAML, used by /implement-feature to load agent skills.

  **Component 4: Task Execution (/start-task skill → agent delegation)**
  The orchestrator calls Skill(skill='start-task', args='{task_file_path} --task {task_id}'). The skill runs inside a sub-agent delegation context. It reads the task YAML, calls sam_claim to mark the task in-progress (and acquire it), writes .claude/context/active-task-{CLAUDE_SESSION_ID}.json containing {task_file_path, task_id, parent_issue_number}, loads skills from the task's skills: field, then delegates implementation to the specified agent. The context file is the bridge between the skill layer and the hook layer.

  **Component 5: Hook-Based Status Updates (task_status_hook.py)**
  Two hook events:
  - SubagentStop (fired when /implement-feature finishes a sub-agent): The hook reads the prompt for /start-task invocation, extracts task_file_path and task_id, calls sam_state to set status: complete and add Completed: {ISO timestamp}. Then calls sync_completion_to_github() to sync the completion to the GitHub sub-issue (github_issue field in task YAML, non-fatal if absent or fails).
  - PostToolUse (Write|Edit|Bash during task execution): Hook reads .claude/context/active-task-{session_id}.json, updates the LastActivity: {ISO timestamp} field in the task YAML. This tracks real-time activity.

  **Data Flow from GitHub Issue to Completion:**
  1. backlog_add creates GitHub Issue #{N} → stored as issue_number in BacklogItem
  2. sam create writes plan with issue: {N} field → becomes plan_number for file naming P{N}-{slug}.yaml
  3. /start-task writes active-task-{sid}.json with parent_issue_number: {N}
  4. Task execution happens with context file present
  5. SubagentStop hook reads active-task-{sid}.json, uses parent_issue_number to find GitHub issue
  6. Hook syncs task.github_issue (sub-issue) completion to GitHub
  7. Active task context file is deleted

  **Quality Gates (/complete-implementation)**
  After all tasks complete (sam status shows all COMPLETE), /complete-implementation runs six validation phases: code-reviewer → feature-verifier → integration-checker → doc-drift-auditor → service-docs-maintainer → context-refinement. Each produces findings or durable artifacts. Then follow-up task files (if any from code-reviewer) are linked to backlog items and evaluated for recursion. Finally all modified files are staged and committed.

  **Bookend Tasks (T0 and TN when acceptance-criteria-structured is present)**
  When a plan has acceptance-criteria-structured entries, swarm-task-planner generates:
  - T0 (t0-baseline-capture, Priority 1, no dependencies): Runs first (highest priority, no deps). Reads acceptance-criteria-structured, executes each check_command, records exit codes and stdout/stderr to plan/T0-baseline-{slug}.yaml.
  - TN (tn-verification-gate, Priority 5, depends on all non-bookend tasks): Runs last. Reads T0 baseline, re-runs each check_command, compares results, classifies per criterion as: passed (T0 pass + TN pass), regressed (T0 pass + TN fail - blocks further execution), pre-existing-fail (T0 fail + TN fail), newly-passing (T0 fail + TN pass). Writes plan/TN-verification-{slug}.yaml as array of per-criterion records with status field (no top-level verdict field).

  ## For This Task (Workflow Architecture Diagram Document): What Needs to Connect

  The service-docs-maintainer agent (T1) must read these source files to verify every field in the diagram:

  **Critical Sources for Section 2 (Data Structure Shapes):**
  - .claude/docs/TASK_FILE_FORMAT.md: Canonical Task schema (status values, field types, authorized writers table for status transitions)
  - plugins/development-harness/backlog_core/server.py: Backlog MCP tool signatures (backlog_add returns issue_number, backlog_list/view field types)
  - plugins/development-harness/backlog_core/models.py: BacklogItem Pydantic model (plan field as str | None)
  - plugins/python3-development/skills/implementation-manager/scripts/task_status_hook.py: Hook behavior (reads active-task context file, parent_issue_number handling via .get(), updates LastActivity, calls sync_completion_to_github)
  - plugins/python3-development/agents/t0-baseline-capture.md: T0 baseline YAML structure (what fields result from running check_commands)
  - plugins/python3-development/agents/tn-verification-gate.md: TN verification YAML structure (per-criterion record format with status field, no top-level verdict)
