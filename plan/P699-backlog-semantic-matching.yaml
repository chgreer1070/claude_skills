    schema and behavior
  verification_steps:
  - 'Run MCP tool schema tests: uv run pytest .claude/skills/backlog/tests/test_backlog_core_server.py'
  - Inspect tool schema via uv run python -c 'from backlog_core.server import
    mcp; print(mcp.list_tools())' to verify new params appear
  - Call backlog_list with type='Bug' via MCP and verify filtered results
  started: '2026-03-16T19:11:59.093703+00:00'
  divergence_notes: 1
  divergence_notes_detail: |
    DN-1: FastMCP 3.0.2 removes 'title' from MCP tool schema when 'type' is also a property
    Plan artifact: plan/P699-backlog-semantic-matching.yaml, T2 acceptance_criteria item 4
    Plan claim: "Existing parameters (section, status, title, label) remain unchanged in schema and behavior"
    Actual implementation: The title filter parameter is functional at runtime (MCP clients can
    pass "title" and it routes correctly via alias="title" to operations.list_items(title=...)),
    but the "title" key is absent from the MCP tool schema as returned by FastMCP. Root cause:
    FastMCP 3.0.2 _single_pass_optimize(prune_titles=True) in fastmcp/utilities/json_schema.py
    traverses the JSON Schema properties dict and removes any entry whose key is "title" when any
    sibling key is a JSON Schema keyword (e.g., "type"). Adding alias="type" to the type_
    parameter caused Pydantic to emit by_alias=True schema, which now has both "title" and "type"
    as property names, triggering the pruner. Renaming the Python parameter to title_filter with
    alias="title" does not help because the schema property key is still "title". The behavior gap
    (title absent from schema, present at runtime) is a FastMCP library bug, not an implementation
    error. A backlog item should be created to track upgrading FastMCP or patching the schema
    post-generation.
    Classification: design-refinement
    Recorded: 2026-03-16T20:00:00+00:00
