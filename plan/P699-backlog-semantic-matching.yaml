- id: T05
  title: Rewrite work-backlog-item Step 1 with semantic matching strategy chain
  status: not-started
  agent: contextual-ai-documentation-optimizer
  dependencies:
  - T01
  - T02
  - T04
  priority: 3
  complexity: high
  skills:
  - plugin-creator
  acceptance_criteria:
  - "SKILL.md Step 1 contains a 3-strategy fallback chain: Strategy 1 (substring via title=), Strategy 2 (filter-first via type/topic hints), Strategy 3 (LLM semantic match against all open item titles)"
  - "Strategy 2 includes type derivation heuristic (bug/fix/broken/error -> Bug, feature/add/new/implement -> Feature, refactor/clean/restructure -> Refactor)"
  - "Strategy 3 uses backlog_list() to load all open item titles+types+topics and presents them to the LLM for semantic selection"
  - "Token budget validation: the loaded data for Strategy 3 (titles+types+topics for all items) stays under 10K tokens — verified by calculation: 245 items x ~25 tokens/item = ~6,125 tokens"
  - "Each strategy transition is explicit — zero results from Strategy N triggers Strategy N+1"
  - "Issue-number and URL inputs bypass the strategy chain entirely (direct backlog_view)"
  verification_steps:
  - "Read the updated SKILL.md and verify all 3 strategies are present with explicit transition conditions"
  - "Verify Strategy 3 token budget note is present: '245 items x ~25 tokens/item = ~6,125 tokens (under 10K budget)'"
  - "Verify issue-number/URL bypass path is documented before the strategy chain"
  - "Run SKILL.md linting: uv run prek run --files .claude/skills/work-backlog-item/SKILL.md"
