version: '1.0'
description: ''
goal: |-
  Expose existing type/topic metadata as backlog_list filters (Layer 1) and add semantic matching strategy chain to SKILL.md instructions (Layer 2), resolving the substring-only matching defect in /work-backlog-item and /complete-implementation
issue: '745'
