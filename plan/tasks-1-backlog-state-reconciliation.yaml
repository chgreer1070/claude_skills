feature: backlog-state-reconciliation
version: '1.0'
description: |-
  Backlog state reconciliation - detect and resolve local/GitHub state divergence
issue: '#714'
architecture: ./architect-backlog-state-reconciliation.md
feature-context: ./feature-context-backlog-state-reconciliation.md
codebase-patterns: ./codebase/backlog-state-patterns.md
tasks:
- id: T1
  title: State handler helper functions
  status: complete
  agent: python3-development:python-cli-architect
  priority: 1
  complexity: low
  skills:
  - python3-development
  description: |-
    The reconciliation layer needs two pure helper functions in `state_handler.py` that do not exist yet. `is_terminal_state()` checks whether a state has no outgoing transitions. `find_valid_path()` performs BFS on the `VALID_TRANSITIONS` DAG to determine reachability between two states. Both are pure functions with no I/O. The architecture spec (Section 4.3) defines their signatures and behavior.
  objective: |-
    Add `is_terminal_state()` and `find_valid_path()` to `.claude/skills/backlog/scripts/state_handler.py` as public functions.
  requirements: |-
    1. Add `is_terminal_state(state: str) -> bool` that returns True for states with empty transition sets in `VALID_TRANSITIONS` (done, resolved, closed per the DAG)
    2. Add `find_valid_path(from_state: str, to_state: str) -> list[str] | None` that performs BFS on `VALID_TRANSITIONS` and returns the path as a list of state strings, or None if unreachable
    3. `find_valid_path` must handle same-state identity case (return `[state]`)
    4. Both functions must use `BacklogState` enum values for comparison but accept plain strings as input
    5. Both functions must be pure (no I/O, no side effects)
  constraints: |-
    - Do not modify existing functions (`validate_transition`, `apply_github_transition`)
    - Do not add new dependencies
    - Do not modify `VALID_TRANSITIONS` or `BacklogState`
    - Place new functions after existing public functions, before private helpers
  expected-outputs: |-
    - File modified: `.claude/skills/backlog/scripts/state_handler.py`
  acceptance-criteria: |-
    1. `is_terminal_state("done")` returns True; `is_terminal_state("in-progress")` returns False
    2. `find_valid_path("needs-grooming", "in-progress")` returns a list of 4+ states representing the valid path
    3. `find_valid_path("done", "needs-grooming")` returns None (no backward path)
    4. `find_valid_path("groomed", "groomed")` returns `["groomed"]` (identity)
    5. Both functions are importable from `state_handler` without errors
  verification-steps: |-
    1. `uv run python -c "from state_handler import is_terminal_state; assert is_terminal_state('done'); assert is_terminal_state('resolved'); assert is_terminal_state('closed'); assert not is_terminal_state('in-progress'); print('PASS')"` (run from `.claude/skills/backlog/scripts/`)
    2. `uv run python -c "from state_handler import find_valid_path; p = find_valid_path('needs-grooming', 'in-progress'); assert p is not None and len(p) >= 4; assert find_valid_path('done', 'needs-grooming') is None; assert find_valid_path('groomed', 'groomed') == ['groomed']; print('PASS')"` (run from `.claude/skills/backlog/scripts/`)
    3. `uv run prek run --files .claude/skills/backlog/scripts/state_handler.py`

    - Key claims to verify:
      - `done`, `resolved`, and `closed` are the only terminal states per `VALID_TRANSITIONS`
      - BFS on the DAG from `needs-grooming` can reach `in-progress` via `groomed -> in-milestone -> in-progress`
    - Verification questions:
      1. Does `VALID_TRANSITIONS[BacklogState.DONE]` map to `frozenset({BacklogState.CLOSED})` (non-empty, so `done` is NOT terminal by "empty set" definition)?
      2. Which states have `frozenset()` as their transition set?
    - Evidence to collect:
      - Read `state_handler.py:54-63` and confirm which states have empty frozensets
    - Revision rule:
      - If `done` and `resolved` have non-empty transition sets (they transition to `closed`), then `is_terminal_state` must check for states from which no further non-closed progress is possible. Re-read the architecture spec Section 4.3: it says "True if state is done, resolved, or closed." Follow the spec definition, which treats done/resolved/closed as terminal for filtering purposes (items in these states should be excluded from default list).
  handoff: |-
    Report file path, function signatures, and BFS test output
- id: T2
  title: Core reconciliation functions in backlog.py
  status: complete
  agent: python3-development:python-cli-architect
  dependencies:
  - T1
  priority: 2
  complexity: high
  skills:
  - python3-development
  parallelize-with:
  - T3
  - T6
  description: |-
    The reconciliation layer is the core of this feature. It detects divergence between local backlog cache and GitHub state, auto-corrects DAG-valid divergences, flags invalid ones, and protects work-in-progress items from premature closure. Four new private functions and one dataclass are added to `backlog.py`. The architecture spec (Sections 4.1, 4.5, 5) defines all signatures and the reconciliation decision matrix.

    This task adds the new functions only. It does NOT modify existing functions (that is T4).
  objective: |-
    Add `ReconcileResult` dataclass, `_has_active_work()`, `_reconcile_item()`, `_reconcile_batch()`, and `_filter_closed_items()` to `.claude/skills/backlog/scripts/backlog.py`.
  requirements: |-
    1. Add `ReconcileResult` dataclass (fields: `issue_number: int`, `action: str`, `old_status: str`, `new_status: str`, `warning: str`) near existing dataclasses at module level
    2. Add `_has_active_work(item: dict) -> tuple[bool, str]` that checks for plan files with IN PROGRESS tasks and active-task context files referencing the item
    3. Add `_reconcile_item(item, gh_issue_map, repo) -> ReconcileResult` implementing the reconciliation decision matrix from architecture spec Section 5
    4. Add `_reconcile_batch(items, repo) -> tuple[list[dict], list[str]]` that fetches all GitHub issues (`state="all"`) and calls `_reconcile_item` for each
    5. Add `_filter_closed_items(items, include_closed) -> list[dict]` that filters out items with terminal status unless `include_closed=True`
    6. `_reconcile_item` must use `find_valid_path()` (not `validate_transition()`) for DAG reachability checks (per ADR-002)
    7. `_reconcile_item` must call `_update_item_metadata()` to persist auto-corrections (per ADR-001, ADR decision on persistence)
    8. `_reconcile_batch` must gracefully handle GitHub unavailability (return items unchanged with warning)
    9. `_has_active_work` must handle missing files gracefully (return `(False, "")`)
  constraints: |-
    - Do not modify any existing functions in `backlog.py` (that is T3 and T4)
    - Do not add new dependencies (use existing imports)
    - Follow existing private function naming convention (`_` prefix)
    - Follow existing error handling patterns (soft fail for optional operations)
    - Place `ReconcileResult` near existing dataclasses
    - Place private functions after existing private helpers
  expected-outputs: |-
    - File modified: `.claude/skills/backlog/scripts/backlog.py`
  acceptance-criteria: |-
    1. `ReconcileResult` is importable and has all 5 fields
    2. `_has_active_work` returns `(True, reason)` when a plan file with IN PROGRESS task exists for the item's topic
    3. `_has_active_work` returns `(False, "")` when no plan files or context files exist
    4. `_reconcile_item` returns `action="auto_corrected"` for DAG-valid divergences and persists the correction
    5. `_reconcile_item` returns `action="flagged_divergence"` for invalid divergences without modifying local state
    6. `_reconcile_item` returns `action="wip_protected"` when GitHub issue is closed but active work exists
    7. `_filter_closed_items` excludes items with status in {done, resolved, closed} when `include_closed=False`
    8. `_reconcile_batch` returns items unchanged with warning string when GitHub is unavailable
  verification-steps: |-
    1. `uv run python -c "import sys; sys.path.insert(0, '.claude/skills/backlog/scripts'); from backlog import ReconcileResult; r = ReconcileResult(1, 'no_change', 'groomed', 'groomed', ''); print(r); print('PASS')"`
    2. Confirm new functions exist: `grep -n 'def _has_active_work\|def _reconcile_item\|def _reconcile_batch\|def _filter_closed_items\|class ReconcileResult' .claude/skills/backlog/scripts/backlog.py`
    3. `uv run prek run --files .claude/skills/backlog/scripts/backlog.py`
    4. `uv run pytest .claude/skills/backlog/tests/ -x --timeout=30` (no regressions)

    - Key claims to verify:
      - `_update_item_metadata` signature and import location
      - `_try_get_github` return value when GitHub unavailable
      - Plan file glob pattern for WIP detection
    - Verification questions:
      1. What is the import path for `_update_item_metadata` -- is it in `backlog.py` directly or imported from `backlog_core.operations`?
      2. Does `_try_get_github()` return `None` when GitHub is unavailable, or does it raise?
      3. What is the actual glob pattern for plan files referencing a topic slug?
    - Evidence to collect:
      - Read `backlog.py` imports and search for `_update_item_metadata` definition
      - Read `_try_get_github` function body
      - Read feature context Section "Active task context files" and architecture spec Section 4.1
    - Revision rule:
      - If `_update_item_metadata` is imported from `backlog_core.operations`, use the imported name. If it is a local function in `backlog.py`, use the local reference.
  handoff: |-
    Report file path, function names added, and import verification output
- id: T3
  title: Fix grooming bug in backlog.py
  status: complete
  agent: python3-development:python-cli-architect
  priority: 2
  complexity: medium
  skills:
  - python3-development
  parallelize-with:
  - T2
  - T6
  description: |-
    The grooming bug is the primary source of "stateless void" items. Currently, `backlog groom` removes the `status:needs-grooming` label from GitHub but never adds `status:groomed`, and never updates local frontmatter status. This leaves items with no status label on GitHub and stale status locally. The fix replaces the manual label removal with `apply_github_transition()` (the same pattern used by 4 other transitions) and adds a `_update_item_metadata()` call. Architecture spec Section 4.2 defines the change. ADR-005 explains co-delivery rationale.
  objective: |-
    Fix `_write_groomed_to_item_file()` and surrounding grooming code in `backlog.py` to atomically transition labels and update local frontmatter status to `groomed`.
  requirements: |-
    1. Replace the manual `issue.remove_from_labels("status:needs-grooming")` call with `apply_github_transition(repo, issue, "needs-grooming", "groomed")`
    2. Add `_update_item_metadata(filepath, {"metadata": {"status": "groomed"}}, set_synced=True)` after the transition
    3. Ensure `apply_github_transition` and `BacklogState` are already imported (verify, do not duplicate imports)
    4. Follow the exact same pattern as `_apply_status_in_progress()` for consistency
  constraints: |-
    - Do not modify any other functions besides the grooming-related code
    - Do not change the grooming decision logic (RT-ICA approval flow)
    - Do not add new dependencies
    - Preserve the existing `groomed` date update in `_write_groomed_to_item_file`
  expected-outputs: |-
    - File modified: `.claude/skills/backlog/scripts/backlog.py`
  acceptance-criteria: |-
    1. After grooming, GitHub issue has exactly one `status:*` label: `status:groomed`
    2. After grooming, local frontmatter `status` field is `groomed`
    3. No manual `issue.remove_from_labels()` call remains in grooming code path
    4. `apply_github_transition` is called with `from_state="needs-grooming"` and `to_state="groomed"`
  verification-steps: |-
    1. Search for old pattern: `grep -n 'remove_from_labels.*needs-grooming' .claude/skills/backlog/scripts/backlog.py` (should return 0 results)
    2. Search for new pattern: `grep -n 'apply_github_transition.*groomed' .claude/skills/backlog/scripts/backlog.py` (should return 1+ results)
    3. `uv run prek run --files .claude/skills/backlog/scripts/backlog.py`
    4. `uv run pytest .claude/skills/backlog/tests/ -x --timeout=30` (no regressions)

    - Key claims to verify:
      - The grooming code path location (line ~1746 for label removal, line ~1576 for `_write_groomed_to_item_file`)
      - `apply_github_transition` is already imported in `backlog.py`
    - Verification questions:
      1. Is `apply_github_transition` imported at the top of `backlog.py`?
      2. Where exactly is `issue.remove_from_labels` called in the grooming code path?
      3. Does `_write_groomed_to_item_file` have access to `repo` and `issue` objects, or does it need them passed in?
    - Evidence to collect:
      - `grep -n 'apply_github_transition' .claude/skills/backlog/scripts/backlog.py` (check imports)
      - `grep -n 'remove_from_labels' .claude/skills/backlog/scripts/backlog.py` (find exact location)
      - Read `_write_groomed_to_item_file` function signature
    - Revision rule:
      - If `_write_groomed_to_item_file` does not have access to `repo`/`issue` objects, the function signature must be modified to accept them, and the caller must pass them.
  handoff: |-
    Report exact lines changed, old vs new behavior, and verification output
