    4. `uv run prek run --files .claude/skills/backlog/scripts/backlog.py`
    5. `uv run pytest .claude/skills/backlog/tests/ -x --timeout=30`

    - Key claims to verify:
      - `_batch_fetch_statuses` uses `repo_obj.get_issues(state="open")` at current line ~755
      - `_refresh_local_cache_from_github` uses `repo_obj.get_issues(state="open")` at current line ~860
      - `list_items` function uses `Annotated` syntax for existing CLI parameters
    - Verification questions:
      1. Does `_batch_fetch_statuses` use `repo_obj.get_issues` or a different GitHub API call pattern?
      2. Does `_refresh_local_cache_from_github` filter out PRs with `issue.pull_request is not None`? (Must preserve this filter)
      3. What is the existing parameter style for `list_items` -- does it use `Annotated[bool, typer.Option(...)]` or bare `typer.Option()`?
    - Evidence to collect:
