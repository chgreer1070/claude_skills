feature: agent-profile-mcp-tool
version: '1.0'
description: ''
goal: |-
  Build two FastMCP MCP tools (profile_load, profile_list) that compile agent definitions into loadable skill bundles for task-worker specialization. Mount into backlog_core server with profile_ namespace prefix.
context: |-
  ## Context Manifest

  ### How This Currently Works: Task-Worker Agent Specialization and Skill Loading

  When the orchestrator dispatches a SAM task to execute, that task carries metadata including an `agent:` field specifying which specialist should execute it (e.g., `agent: python-cli-architect`). The current flow requires the orchestrator to know which `subagent_type` to route to before dispatch — it must match the agent name to a known agent file, extract that agent's declared skills from its frontmatter, and communicate both to the task-worker explicitly.

  The task-worker (defined in `plugins/development-harness/agents/task-worker.md`) is a generic SAM task executor that currently loads skills on demand by iterating through a `skills:` list provided in task metadata. For each skill name, it calls `Skill(skill="{name}")` to activate that skill. However, the caller (the dispatch layer) must know which skills to list — the task-worker cannot derive this from the agent definition itself.

  This creates a critical coupling: the orchestrator must maintain routing tables mapping agent names to skills. When a new specialist agent is created (e.g., `plugins/development-harness/agents/impact-analyst.md` with `skills: [clear-cove-task-design, validation-protocol]`), the dispatch code must be updated to route tasks to that agent and include the skill list. Adding a new grooming role requires modifying dispatch logic in multiple places.

  The desired state is inversion of control: the task-worker reads the agent name from its task metadata (available via `sam_read` structured output), looks up the agent definition file by name, parses that file's frontmatter to extract the `skills:` list, resolves each skill URI to its actual `SKILL.md` file on disk, and bundles the agent's instruction body together with all resolved skill content into a single context injection. The orchestrator becomes agent-agnostic — it simply assigns an agent name to a task and the worker self-configures.

  This feature builds the infrastructure for that self-configuration: an MCP tool that reads agent definitions, resolves their skill dependencies, and returns bundled prompts ready for context injection.

  ### Architecture: The Agent-Profile MCP Tool System

  The agent-profile system is a new Python package mounted into the existing backlog MCP server with a `profile_` namespace prefix. It comprises five modules working in sequence to resolve an agent definition into a complete bundled prompt:

  **Discovery phase**: `agent_profile/discovery.py` scans all plugin directories (`plugins/*/agents/*.md`) to locate agent definition files. When given a bare agent name (e.g., `python-cli-architect`), it checks the owning plugin's agent directory first, then searches all plugins. This context-aware resolution ensures agents in a plugin prefer their own local skills over global ones. Plugin-qualified names (e.g., `python3-development:code-reviewer`) bypass the search and go directly to the specified plugin.

  **Parsing phase**: `agent_profile/parser.py` reads an agent `.md` file and splits it into two parts: YAML frontmatter (between `---` delimiters) and the instruction body below. The frontmatter contains structured metadata including a `skills:` field that lists skill URIs the agent depends on. The parser normalizes the `skills:` field from three YAML forms (comma-separated string, YAML list, single value) to a uniform `list[str]`. It also reads SKILL.md files from skill directories and collects all reference files from the `references/` subdirectory.

  **Resolution phase**: `agent_profile/resolver.py` takes the normalized skill URI list and resolves each URI to its actual filesystem path and content. It handles three skill URI formats found in the current codebase:

  1. **Bare names** (e.g., `subagent-contract`, `clear-cove-task-design`): The resolver checks the context plugin first (the plugin owning the agent), then scans all plugins. If multiple matches exist outside the context plugin, a warning is logged and the first match is used. This prevents silent wrong-skill loading while still allowing global skills to be found.

  2. **Plugin-qualified names** (e.g., `dh:subagent-contract`, `python3-development:code-reviewer`): The resolver splits on the first colon, resolves plugin aliases (currently `dh` → `development-harness`), and looks in `plugins/{plugin}/skills/{path}/SKILL.md`. The path can be nested for subdirectory skills (e.g., `dh:testing:analyze-test-failures` resolves to `plugins/development-harness/skills/testing/analyze-test-failures/SKILL.md`).

  3. **Domain paths** (e.g., `domains/enterprise-installanywhere`, `domains/enterprise-spring-xml`): Treated as relative paths within the context plugin's skills directory. Allows agents to reference domain-specific skill collections without full qualification.

  For each resolved skill, the resolver reads its SKILL.md content and collects all `.md` files from the `references/` directory. It also checks the skill's own frontmatter for sub-skill declarations (via a `skills:` or `requires:` field) and recursively resolves those, using a visited-set guard to detect circular dependencies (A depends on B, B depends on A). Circular dependencies are caught and logged as warnings rather than errors — a task-worker with 5 of 6 skills is more useful than a task-worker with zero skills.

  **MCP tools**: `agent_profile/server.py` defines two FastMCP tools exposed via mount into the backlog server:

  - `profile_load(agent_name: str) -> dict`: Discovers the agent file by name, parses its frontmatter and body, resolves all declared skills (including recursive sub-skills), and returns an `AgentProfile` dict containing the agent's metadata, instruction body, all resolved skill content, and any warnings from the resolution process.

  - `profile_list(plugin: str | None = None) -> dict`: Enumerates all agent `.md` files across all plugins (or filtered to a single plugin), reads their frontmatter to extract metadata (name, description, skill count), and returns a list of `ProfileListEntry` objects for discovery without requiring filesystem knowledge.

  Both tools return structured dicts (JSON-serializable Pydantic models) on success and `{"error": "description"}` on failure — never raising Python exceptions to the MCP client.

  **Integration**: A single mount call in `plugins/development-harness/backlog_core/server.py` wires the agent-profile server into the backlog MCP server:

  ```python
  from agent_profile import mcp as _agent_profile_mcp
  mcp.mount("profile", _agent_profile_mcp)
  ```

  This exposes the tools as `profile_load` and `profile_list` in the backlog MCP namespace, accessible to any MCP client including the task-worker agent.

  ### For New Feature Implementation: What Needs to Connect

  **Task-worker consumption**: The task-worker agent will be updated to call `profile_load(agent_name)` with the agent name from its SAM task metadata (available via `sam_read`). The returned `AgentProfile` dict contains the agent's instruction body and all bundled skill content. The task-worker injects this bundle into its own working context, making it immediately specialized for that role.

  **Dispatch layer simplification**: Dispatch code (in `/dh:dispatch` and `/dh:work-milestone` skills) becomes agent-agnostic. Instead of:
  ```
  if task.agent == "python-cli-architect": route_to(python_cli_architect_agent)
  elif task.agent == "code-reviewer": route_to(code_reviewer_agent)
  ...
  ```

  It becomes:
  ```
  spawn_task_worker_with(agent=task.agent)  # Agent name travels with the task
  # Task-worker calls profile_load internally
  ```

  This removes the coupling between dispatch logic and the set of available agents. New agents are added by creating agent files; dispatch code never changes.

  **Grooming swarms integration**: Grooming swarms (impact analysis, fact-checking, scope definition) can now spawn identical task-workers instead of specialized agent types. Each worker loads its role-specific agent profile at startup. Grooming roles become skills+agent-files, not specialized `subagent_type` values.

  **MCP server registration**: The agent-profile server is mounted, not standalone. No changes to `plugins/development-harness/.mcp.json` are required — the backlog server already exists and runs with the project directory context needed for plugin discovery.

  ### For Testing and Verification: Acceptance Criteria Structure

  The acceptance criteria in the backlog item and task file are grouped into logical areas:

  **Core tool functionality**:
  - `profile_load` tool exists and is callable via MCP
  - It correctly locates agent files by bare name and plugin-qualified name
  - It parses YAML frontmatter and extracts the `skills:` field correctly
  - It resolves all three URI formats (bare, plugin-qualified, domain path) to actual SKILL.md paths

  **Content bundling**:
  - It reads each resolved SKILL.md file completely
  - It reads all `.md` files from each skill's `references/` directory
  - It returns a single bundled string concatenating agent body + all skill content, separated by section headers
  - The response contains the full `AgentProfile` model as a JSON-serializable dict

  **Error handling**:
  - Missing agent file returns `{"error": "..."}` not an exception
  - Missing individual skill returns partial bundle with warning (ADR-3: warnings over errors)
  - Circular dependencies are detected and produce warnings without infinite loops

  **Discovery and enumeration**:
  - `profile_list` returns all agents or filtered by plugin
  - Both tools are accessible via the backlog MCP server with `profile_` prefix

  **Testing scope**:
  - Unit tests cover discovery, parsing, URI resolution, circular detection, missing files
  - Integration tests invoke the MCP tools end-to-end via `mcp.test_client()`
  - No tests access the real `plugins/` filesystem; all use synthetic `tmp_path` fixtures
  - 100% coverage on resolver.py (the core logic), 80%+ on discovery and parser

  ### Technical Details: File Structure and Dependencies

  **New files to create**:
  - `plugins/development-harness/agent_profile/__init__.py` — exports the mcp server instance
  - `plugins/development-harness/agent_profile/models.py` — Pydantic v2 data classes (AgentEntry, AgentMetadata, ResolvedSkill, AgentProfile, ProfileListEntry)
  - `plugins/development-harness/agent_profile/discovery.py` — agent file scanning and lookup functions
  - `plugins/development-harness/agent_profile/parser.py` — frontmatter parsing and body extraction
  - `plugins/development-harness/agent_profile/resolver.py` — skill URI classification and recursive resolution
  - `plugins/development-harness/agent_profile/server.py` — FastMCP tool definitions
  - `plugins/development-harness/tests/test_agent_profile/` — comprehensive unit and integration test suite

  **Modified files**:
  - `plugins/development-harness/backlog_core/server.py` — add mount call at module bottom
  - `plugins/development-harness/pyproject.toml` — verify agent_profile package is in Hatchling packages list

  **Dependencies** (all already declared):
  - `fastmcp` — FastMCP 3.x, provides FastMCP, mount(), @mcp.tool
  - `ruamel.yaml` — YAML parsing (NOT pyyaml per repo convention)
  - `pydantic` — Pydantic v2 for data models
  - `pathlib` — stdlib, for file traversal

  **No new dependencies required** — the feature uses only libraries already declared in the plugin.

  ### Key Implementation Notes

  **Plugin alias map**: Stored as a module-level dict in resolver.py: `PLUGIN_ALIASES = {"dh": "development-harness"}`. Currently contains only one alias. New aliases are rare (adding a plugin shorthand) and added as one-line code changes — no configuration registry needed.

  **Path safety**: All resolved paths are validated to remain within the `plugins_root` directory tree. Domain paths with `..` traversal attempts are caught and rejected with warnings.

  **Synchronous design**: Both tools are synchronous. All operations are local filesystem reads — no I/O-bound network calls. FastMCP handles concurrency at the server level.

  **No caching in v1**: Agent and skill files are small (1-50KB). A full scan reads ~55 agent files. Full skill resolution for one agent reads 1-10 SKILL.md files. Profiling can drive future caching if needed.

  **Circular dependency handling**: Uses visited-set of absolute path strings (not URIs) to prevent aliasing issues. Depth-first traversal. Per-call state (each `resolve()` invocation gets a fresh visited set).

  ### Integration Points with Existing Systems

  **SAM task schema**: The task-worker reads the `agent:` field from task metadata returned by `sam_read()`. This field must exist as structured data in the JSON response, not just in markdown display. The feature depends on this being available.

  **Backlog artifact manifest**: Agent-profile tools are stateless and read-only. Future integration with the artifact manifest system is possible but out of scope for v1 — the tools do not register themselves, and there is no caching layer to manage.

  **Task-execution flow**: The hook system (`task_status_hook.py`) and context file system (`.claude/context/active-task-{sid}.json`) are optional integration points. Future work could pre-fetch and cache bundled profiles in the context file, but v1 is purely on-demand loading via MCP calls.

  ### Architectural Decisions Rationale

  **Mount vs. standalone server** (ADR-1): Mounting into backlog_core simplifies operations (one less server process, one less .mcp.json entry) and leverages the backlog server's existing project-dir context needed for plugin discovery. Trade-off: agent-profile tools now depend on the backlog server's lifecycle — acceptable since the task-worker workflow already depends on backlog.

  **Context-plugin-first resolution** (ADR-2): Bare skill names check the owning plugin first, then global scan. Matches developer intent (an agent in development-harness saying `subagent-contract` means the one in its own plugin) and prevents silent wrong-skill loading when ambiguity exists.

  **Warnings over errors for unresolvable skills** (ADR-3): A partial profile (5 of 6 skills) is more useful than total failure. Warnings are visible in the MCP response for consumers to act on. Matches the feature context Scenario 5 requirement.

  **Visited-set cycle detection** (ADR-4): Standard cycle detection pattern. Using absolute path strings prevents aliasing issues. Per-call state ensures independent profile resolutions.

  ### Existing Code Patterns to Follow

  When implementing, follow these patterns from the existing codebase:

  - **FastMCP server structure**: `plugins/development-harness/backlog_core/server.py` — tool definitions, error handling, response shapes
  - **SAM server example**: `plugins/development-harness/sam_schema/server.py` — second FastMCP server in the same plugin, provides structural reference
  - **File discovery pattern**: `plugins/development-harness/backlog_core/artifact_provider.py` — plugin directory traversal, file matching
  - **Pydantic models**: `plugins/development-harness/backlog_core/models.py` and `sam_schema/core/models.py` — Field descriptions, JSON serialization
  - **Frontmatter parsing**: `plugins/development-harness/backlog_core/frontmatter_utils.py` (if available) or raw ruamel.yaml per repo convention
  - **Skill resolution precedent**: `plugins/plugin-creator/SKILL.md` — existing skill resolution logic reference

  All patterns are for synchronous, file-based, read-only operations similar to what agent-profile will do.

  ### Success Criteria for Implementation

  The feature is successful when:

  1. Both MCP tools are callable and return correct response shapes
  2. All three skill URI formats are resolved correctly across plugin boundaries
  3. Agent files with no skills, missing skills, and circular skill dependencies are handled gracefully
  4. Task-workers can call `profile_load` and receive a complete, ready-to-inject bundle
  5. The mount integration adds only 5 lines to backlog_core/server.py
  6. Tests achieve 100% coverage on resolver.py and 80%+ on discovery/parser
  7. No new dependencies are introduced
  8. Integration with SAM task metadata (the `agent:` field) is validated as a prerequisite

  ### Implementation Discoveries (2026-03-22)

  Context-refinement agent comparison of spec vs. actual implementation across server.py, resolver.py, and models.py.

  #### server.py — Tool naming and mount semantics (design-refinement)

  The spec showed tool functions named `profile_load` and `profile_list` registered at the sub-server level. The implementation uses `@mcp.tool(name="load")` and `@mcp.tool(name="list")` with internal function names `_load` and `_list`. This is correct FastMCP mount semantics: when `mcp.mount("profile", _agent_profile_mcp)` runs in backlog_core, FastMCP prepends the mount prefix, producing `profile_load` and `profile_list` in the consumer namespace. The spec described the consumer-visible names; the implementation correctly registers short names within the sub-server. The underscore prefix on function names avoids shadowing Python builtins (`list`).

  #### resolver.py — Internal decomposition refined (design-refinement)

  The spec described `_resolve_single` as the primary internal method. The implementation decomposes this into two methods:

  - `_resolve_single(uri, context_plugin, visited, warnings) -> ResolvedSkill | None` — resolves one URI to a skill object or None
  - `_resolve_into(uri, context_plugin, visited, resolved, warnings) -> None` — accumulator wrapper that calls `_resolve_single`, appends to `resolved`, then recurses into sub-skills

  This is cleaner than the spec's implicit design: the spec's `_resolve_single` would have needed to both return a skill and handle recursion. The split improves testability and single-responsibility.

  Three additional private helper methods were added (`_locate_plugin_qualified`, `_locate_domain`, `_locate_bare`) that are not in the spec's interface contract. These decompose the location logic per URI format, making each branch independently testable.

  The `_classify_uri` return value uses `"plugin-qualified"` (hyphenated) for the format type string where the spec suggested `"qualified"`. Functionally identical — only affects internal branch labels.

  A module-level helper `_plugin_and_name_from_dir(skill_dir, plugins_root)` derives plugin name and skill name from a resolved path, handling nested skill paths (e.g., `testing/analyze-test-failures`). This was not in the spec but is required to populate `ResolvedSkill.plugin` and `ResolvedSkill.skill_name` correctly from resolved filesystem paths.

  #### models.py — description field strictness (design-refinement, verified safe)

  The spec declared `description: str = Field(default="", ...)` with a default empty string for `AgentMetadata`, `AgentProfile`, and `ProfileListEntry`. The implementation declares `description: str = Field(description="...")` with no default — making `description` a required field.

  Verified across all 60 agent `.md` files across all plugins: every file has a `description:` key in frontmatter. The stricter implementation is consistent with the actual corpus and will surface missing descriptions as parse errors rather than silently defaulting. This is correct behavior.

  The `model_rebuild()` calls at module bottom (`AgentEntry.model_rebuild(...)`, `ResolvedSkill.model_rebuild(...)`) were not in the spec. They are required by Pydantic v2 when `from __future__ import annotations` is active and `Path` is imported only inside `if TYPE_CHECKING`. Without these calls, Pydantic cannot resolve the `Path` annotation at validation time.

  #### No intent-divergences found

  All three files implement the spec's intent faithfully. The deviations are implementation improvements (better decomposition, correct FastMCP semantics, Pydantic v2 correctness) not contradictions of architectural decisions or feature requirements.
