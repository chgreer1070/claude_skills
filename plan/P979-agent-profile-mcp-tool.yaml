  description: |
    Create plugins/development-harness/agent_profile/server.py with FastMCP server
    and two MCP tools, then wire the mount into backlog_core/server.py.

    Part A — server.py (architect spec section 4.5):
    - Create FastMCP instance at module level: mcp = FastMCP("agent-profile")
    - @mcp.tool: profile_load(agent_name: str) -> dict
      Uses discovery.find_agent, parser.parse_agent_file, resolver.resolve to build
      AgentProfile. Returns model_dump() on success, {"error": str} on failure.
      Catches FileNotFoundError and ValueError, returns error dict.
    - @mcp.tool: profile_list(plugin: str | None = None) -> dict
      Uses discovery.scan_all_agents, parser.parse_agent_file for each to get metadata.
