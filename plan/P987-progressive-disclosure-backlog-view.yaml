feature: progressive-disclosure-backlog-view
version: '1.0'
description: ''
goal: |-
  Add include_content parameter to backlog_view that returns compact metadata (section names + entry counts) when False, while preserving full-content default behavior for backward compatibility.
context: |-
  ## Context Manifest: Progressive Disclosure for backlog_view

  ### How This Currently Works: Backlog View and Response Generation

  The backlog_view MCP tool is one of the primary interfaces to the backlog system. When a caller invokes `backlog_view(selector)`, it traverses a three-layer call stack: FastMCP server layer ‚Üí operations layer ‚Üí Pydantic models. Understanding this flow is critical to implementing the compact response mode.

  **Layer 1: FastMCP Server (server.py::backlog_view)**

  The server-layer function is an async MCP tool defined in `plugins/development-harness/backlog_core/server.py` starting around line 271. It receives the selector (which can be a GitHub issue URL, issue number like #987, or a title substring). The server validates the selector, parses an optional `show` filter parameter, and then delegates to the operations layer via `operations.view_item()`. Currently, the function returns the result dict directly to the MCP caller. All response data originates from `operations.view_item()`, which returns a dict that is serialized back to the MCP consumer. The current signature is:

  ```python
  async def backlog_view(
      selector: Annotated[str, Field(description="...")],
      offset: Annotated[int, Field(ge=0, ...)] = 0,
      limit: Annotated[int, Field(ge=0, ...)] = 0,
      show: Annotated[str | None, Field(...)] = None,
      since: Annotated[str | None, Field(...)] = None,
  ) -> dict:
  ```

  **Layer 2: Operations Layer (operations.py::view_item)**

  The operations layer is the core logic engine. The `view_item()` function (around line 1370 in operations.py) performs the following sequence:

  1. Searches for the item (local file or GitHub) using the selector
  2. Loads the item's frontmatter and body text
  3. Calls `_build_sections_metadata()` to parse the body and extract all section headers and entries. This function returns a dict where each key is a section name (like "Groomed (2026-03-22)") and each value contains:
     - `num_entries` (count of active entries)
     - `num_struck` (count of struck entries)
     - `entries` (list of entry dicts, each with `id`, `struck`, and `content`)
  4. Applies pagination via `_paginate_body()` if offset/limit are provided
  5. Constructs a `ViewItemResult` Pydantic model with all metadata fields plus the full `body` and `sections` dict
  6. Calls `result.model_dump()` to convert the Pydantic model to a plain dict
  7. Returns the dict to the server layer

  **Layer 3: Pydantic Models (models.py::ViewItemResult)**

  The `ViewItemResult` model is defined in `plugins/development-harness/backlog_core/models.py` around line 505. It is a Pydantic BaseModel with these fields:

  - Metadata: `title`, `priority`, `description`, `source`, `added`, `plan`, `issue`, `file_path`, `groomed`, `status`, `number`, `state`, `labels`, `milestone`
  - Content: `body` (full issue/item body text) and `sections` (dict of section data)
  - Status: `messages` and `warnings` lists

  The model uses Pydantic's standard serialization ‚Äî `model_dump()` converts it to a plain dict with all fields present.

  **Why This Matters for Compact Mode**

  The current flow assumes every caller wants all content. The `body` field contains the complete item body (up to 53K+ characters for heavily-groomed items). The `sections` dict contains full entry content with timestamps and metadata. There is no branching logic ‚Äî all callers get the full response. This is the inefficiency we're addressing.

  **Current Response Shape (include_content=True, existing behavior)**

  ```python
  {
      # Metadata fields
      "title": "Backlog item title",
      "priority": "P1",
      "description": "...",
      "source": "...",
      "added": "2026-03-01",
      "plan": "P987",
      "issue": "987",
      "file_path": ".claude/backlog/some-item.md",
      "groomed": True,
      "status": "in-progress",
      "number": 987,
      "state": "open",
      "labels": ["priority:p1", "status:in-progress"],
      "milestone": "Sprint 5",
      
      # Content fields (expensive)
      "body": "Full item body text...",
      "sections": {
          "Groomed (2026-03-22)": {
              "num_entries": 5,
              "num_struck": 2,
              "entries": [
                  {"id": "e1", "struck": False, "content": "Entry text..."},
                  {"id": "e2", "struck": True, "content": "Struck entry..."},
                  ...
              ]
          },
          "Concerns": {
              "num_entries": 3,
              ...
          }
      },
      
      # Status fields
      "messages": [...],
      "warnings": [...]
  }
  ```

  ### For New Feature Implementation: What Needs to Connect

  The progressive disclosure feature adds a new parameter `include_content: bool = True` that branches the response generation in layer 2 (operations.py). The key insight is that the branching happens AFTER the item is loaded but BEFORE the response is assembled.

  **Design Point 1: Where the Branch Happens**

  In operations.py::view_item(), after `data = result.model_dump()`, we branch:

  - `include_content=True` (default): existing path ‚Äî no changes, return full `body` and `sections`
  - `include_content=False` (new): new path ‚Äî pop `body` and `sections`, add `sections_metadata` containing compact section info

  The critical detail: we always load the item and parse sections initially (for correctness in Phase 1). We only suppress the content in the response dict. This is intentional ‚Äî Phase 1 prioritizes correctness and minimal change. Phase 3 would optimize the parsing layer to skip entry content extraction entirely when compact mode is requested.

  **Design Point 2: The Compact Response Model**

  We introduce two new types in models.py:

  1. `SectionMeta` (TypedDict, not Pydantic):
     - `name: str` ‚Äî section heading text
     - `num_entries: int` ‚Äî count of active entries
     - `num_struck: int` ‚Äî count of struck entries

  2. `ViewItemResultCompact` (Pydantic BaseModel):
     - All metadata fields from ViewItemResult (title, priority, description, etc.)
     - `sections_metadata: list[SectionMeta]` instead of full `sections` dict
     - No `body` field at all

  Why separate models, not optional fields? Type safety and schema clarity. A caller holding a `ViewItemResultCompact` reference knows for certain there is no `body` ‚Äî they cannot accidentally try to access it. Optional fields on `ViewItemResult` would create ambiguity: is `body=None` because the item is empty, or because compact mode was requested?

  **Design Point 3: The Routing Logic in operations.py**

  The view_item() function assembles the response like this (pseudo-code):

  ```python
  data = result.model_dump()

  if include_content:
      # Full content path (existing behavior unchanged)
      body = data.get("body", "")
      if body:
          data["sections"] = _build_sections_metadata(body, parsed_show, since)
      if body and (offset > 0 or limit > 0):
          _paginate_body(data, body, offset, limit)
  else:
      # Compact path (new)
      body = data.pop("body", "")
      data.pop("sections", None)
      if body:
          data["sections_metadata"] = _build_sections_compact(body)
  ```

  Key details:
  - In compact mode, we `pop()` the body (removes the key) rather than setting it to empty string. This lets callers use `"body" in response` to detect whether they got a compact response.
  - We do NOT call `_paginate_body()` in compact mode. The parameters `offset` and `limit` exist for controlling which entries are returned in full-content mode. In compact mode, we return all sections with their counts, so pagination is not applicable. The architect spec confirms this: in Phase 1, compact mode returns all sections regardless of offset/limit.
  - We call a new function `_build_sections_compact()` that returns the lightweight section inventory.

  **Design Point 4: The _build_sections_compact() Function**

  This function is intentionally separate from `_build_sections_metadata()` because:

  1. It has simpler preconditions ‚Äî it doesn't need to handle `show` filtering (compact mode returns all sections)
  2. It's independently optimizable in Phase 3 ‚Äî we can replace the `parse_entries()` call with a regex-only count without touching the full-content path
  3. It has a single responsibility ‚Äî extract section names and entry counts, no filtering logic

  The function signature:

  ```python
  def _build_sections_compact(body: str) -> list[dict[str, str | int]]:
      """Extract section names and entry counts without parsing entry content."""
  ```

  It returns a list of dicts (not TypedDicts ‚Äî they're plain dicts for JSON serialization). Each dict has `name`, `num_entries`, and `num_struck`. The implementation:

  1. Extracts section headers using regex: `r"^### (.+?)$"` with MULTILINE flag
  2. For each section, slices the body text from one header to the next (or end of body)
  3. Calls `parse_entries(sec_body, show="all")` to get accurate entry counts
  4. Counts active vs struck entries
  5. Appends `{"name": sec_name, "num_entries": active_count, "num_struck": struck_count}` to result

  **Design Point 5: Parameter Placement and Description**

  In server.py::backlog_view(), the new parameter is placed as the second positional parameter (after `selector`, before `offset`):

  ```python
  async def backlog_view(
      selector: Annotated[str, Field(...)],
      include_content: Annotated[bool, Field(description="...")] = True,
      offset: Annotated[int, ...] = 0,
      ...
  ```

  Placement rationale: `include_content` changes the fundamental response shape, unlike `offset`/`limit` which are filtering/pagination parameters. Therefore it goes earlier. The description text is: "When True (default), returns full body and section entries. When False, returns metadata and section inventory only (section names with entry counts, no body or entry content)."

  **Design Point 6: Backward Compatibility**

  The `include_content=True` default is non-negotiable. Every existing caller ‚Äî tests, skills, agents ‚Äî will continue to work without modification. The existing test suite has 15+ assertions on `body` and `sections` keys. All of these pass when `include_content=True` (the default). Phase 1 does not modify any existing tests ‚Äî it only adds new tests for compact mode.

  ### Technical Reference Details

  #### File Locations and Scope

  **Production files** (to be modified):
  - `plugins/development-harness/backlog_core/models.py` ‚Äî Add `SectionMeta` TypedDict and `ViewItemResultCompact` BaseModel
  - `plugins/development-harness/backlog_core/server.py` ‚Äî Add `include_content` parameter to `backlog_view()`, pass through to operations
  - `plugins/development-harness/backlog_core/operations.py` ‚Äî Add `include_content` to `view_item()` signature, routing logic, and `_build_sections_compact()` function

  **Test files** (to be modified):
  - `plugins/development-harness/tests/test_backlog_core_server.py` ‚Äî Add 3 new unit tests for compact mode
  - `plugins/development-harness/tests/test_scenarios.py` ‚Äî Add scenario C1 for compact view with pagination interaction

  **Documentation files** (to be modified):
  - `plugins/development-harness/skills/backlog/SKILL.md` ‚Äî Update tool description for `backlog_view` to document the new parameter

  #### ViewItemResult Context (What Stays Unchanged)

  The `ViewItemResult` model in models.py currently has these fields (lines ~505-540):

  ```python
  class ViewItemResult(BaseModel):
      title: str = ""
      priority: str = ""
      description: str = ""
      source: str = ""
      added: str = ""
      plan: str = ""
      issue: str = ""
      file_path: str = ""
      groomed: bool = False
      status: str = ""
      number: int | None = None
      state: str = ""
      body: str = ""
      labels: list[str] = Field(default_factory=list)
      milestone: str = ""
      sections: dict = Field(default_factory=dict)
      messages: list[str] = Field(default_factory=list)
      warnings: list[str] = Field(default_factory=list)
  ```

  We do NOT modify this model. We create a separate `ViewItemResultCompact` that duplicates the metadata fields but omits `body` and `sections`.

  #### Current _build_sections_metadata() Signature (Reference)

  Located around line 1371 in operations.py:

  ```python
  def _build_sections_metadata(
      body: str,
      show: str | int | None = None,
      since: str | None = None,
  ) -> dict[str, dict]:
      """Parse body and extract section metadata with full entry content.
      
      Returns dict where keys are section names and values are dicts with:
      - num_entries (int)
      - num_struck (int)  
      - entries (list of entry dicts with id, struck, content)
      """
  ```

  This function is NOT modified. Our new `_build_sections_compact()` is a parallel function, not a refactoring of this one.

  #### parse_entries() Function (Critical Dependency)

  Imported from `entry_blocks.py` at the top of operations.py. Signature:

  ```python
  def parse_entries(body: str, show: str | int | None = None) -> list[Entry]:
  ```

  It parses entry blocks (lines with timestamps and optional strike-through) and returns a list of `Entry` namedtuples. Each entry has fields: `id`, `struck`, `content`. In `_build_sections_compact()`, we call `parse_entries(sec_body, show="all")` to get all entries (both active and struck) and then count them. The `show="all"` parameter ensures we get both categories ‚Äî not filtered by the `show` parameter that would apply in full-content mode.

  #### Pydantic Field Import

  The models.py file already imports `Field` from pydantic at line ~17. We use it to annotate default factory and descriptions:

  ```python
  from pydantic import BaseModel, Field

  sections_metadata: list[SectionMeta] = Field(default_factory=list)
  ```

  #### TypedDict Import

  Also already present in models.py at line ~14:

  ```python
  from typing import TypedDict
  ```

  #### Test Patterns in test_backlog_core_server.py

  The test file uses pytest with async fixtures. Pattern example (line ~50):

  ```python
  @pytest.mark.asyncio
  async def test_backlog_view_success_returns_item_detail(mock_view_item):
      """Test that backlog_view calls operations.view_item and returns result."""
      result = await backlog_view(selector="some-item")
      assert "body" in result
      assert "sections" in result
  ```

  Tests mock `operations.view_item` at the server layer. The mock returns a dict that the server returns directly. New tests will follow the same pattern ‚Äî mock `operations.view_item` to return a dict with body and sections, then verify that when `include_content=False`, the server-layer logic removes them.

  #### Test Pattern: Mock Fixture

  Example fixture (around line ~30):

  ```python
  @pytest.fixture
  def mock_view_item(monkeypatch):
      """Mock operations.view_item to return a known response."""
      def mock_fn(*args, **kwargs):
          return {
              "title": "Test Item",
              "body": "Test body",
              "sections": {"Section 1": {...}},
              ...
          }
      monkeypatch.setattr(operations, "view_item", mock_fn)
      return mock_fn
  ```

  #### Test Scenarios Pattern in test_scenarios.py

  Scenario tests exercise full paths end-to-end with real data. Example (line ~100):

  ```python
  def test_scenario_S001_basic_list_pagination():
      """Scenario S001: List backlog with limit=5"""
      # Create test item
      # Call backlog_list(limit=5)
      # Assert response shape and pagination
  ```

  New scenario C1 will follow this pattern but test compact mode.

  #### SKILL.md Location and Update Pattern

  File: `plugins/development-harness/skills/backlog/SKILL.md`

  The file documents the `backlog_view` tool with parameter descriptions. Currently (around line ~200), it lists `offset`, `limit`, `show`, and `since`. We add `include_content` to this list with description matching the architect spec.

  #### Imports Already Present in operations.py

  - `re` ‚Äî for regex operations (pattern matching)
  - `parse_entries` from `entry_blocks` ‚Äî for parsing sections
  - `Entry` type (namedtuple) ‚Äî represents a parsed entry

  All dependencies for `_build_sections_compact()` are already imported.

  #### Response Assembly Pattern in view_item()

  Current pattern around line 1472:

  ```python
  data = result.model_dump()
  body = data.get("body", "")
  if body:
      data["sections"] = _build_sections_metadata(body, parsed_show, since)
  if body and (offset > 0 or limit > 0):
      _paginate_body(data, body, offset, limit)
  return data
  ```

  The new compact-mode code slots into this same location with an `if include_content:` branch.

  ### Acceptance Criteria for Implementation

  **T1 (Models)**:
  - `SectionMeta` TypedDict with `name`, `num_entries`, `num_struck`
  - `ViewItemResultCompact` BaseModel with all metadata fields plus `sections_metadata`
  - No `body` or `sections` on `ViewItemResultCompact`
  - `uv run prek run --files plugins/development-harness/backlog_core/models.py` passes

  **T2 (Operations)**:
  - `view_item()` signature includes `include_content: bool = True`
  - `_build_sections_compact()` function defined with correct logic
  - Routing logic: `if include_content: [full path] else: [compact path]`
  - Body key popped (not set to empty) in compact mode
  - `uv run prek run --files plugins/development-harness/backlog_core/operations.py` passes

  **T3 (Server)**:
  - `backlog_view()` signature includes `include_content` parameter
  - Parameter positioned after `selector`, before `offset`
  - Parameter passed through to `operations.view_item()`
  - `uv run prek run --files plugins/development-harness/backlog_core/server.py` passes

  **T4 (Unit Tests)**:
  - `test_backlog_view_compact_mode_omits_body()` passes
  - `test_backlog_view_compact_mode_includes_sections_metadata()` passes
  - `test_backlog_view_default_includes_content()` passes
  - All 15 existing tests still pass
  - `uv run pytest plugins/development-harness/tests/test_backlog_core_server.py -v` passes

  **T5 (Scenario Tests)**:
  - Scenario C1 passes
  - All existing scenarios still pass
  - `uv run pytest plugins/development-harness/tests/test_scenarios.py -v` passes

  **T6 (Documentation)**:
  - `include_content` parameter documented in `backlog/SKILL.md`
  - `uvx skilllint@latest check plugins/development-harness/skills/backlog/` passes
