  #### Context

  This task covers Step 1 of `/refresh-research` SKILL.md only. Two changes:
  1. The inventory table header (line 42) gains a `Days Old` column.
  2. The staleness flowchart (lines 30-40) gains a `ComputeDays` action node and renames the
     `FRESH: skip` terminal to `FRESH: N days until next review`.

  The `FRESH: skip` terminal is Blocking Site #2 from the feature context. The rename does not
  change routing — fresh entries remain excluded from the STALE target set under `--stale`.
  It changes the label to reflect that the delta is computed and retained, not discarded.

  Task 1.4 modifies Steps 2 and 6 of the same file. Task 1.3 must complete first so that 1.4
  can read the post-1.3 file state without conflict.

  #### Objective

  Replace the Step 1 staleness flowchart with the updated version (adding ComputeDays node,
  renaming FRESH terminal), and update the inventory table header to add the Days Old column.

  #### Required Inputs

  - `.claude/skills/refresh-research/SKILL.md` — read in full before editing; confirm lines
    30-42 match the verified state (flowchart from `Start` through `Fresh[FRESH: skip]`,
    then table header)
  - `plan/architect-research-freshness-delta.md` — section 3, "File 2" changes (a) and (b);
    use the exact replacement flowchart block from the spec
  - `plan/codebase/skill-conventions.md` — Mermaid node conventions: `<br>` for multi-line
    labels, `=` not `:` in quoted strings, node type semantics

  #### Requirements

  ##### Step 1 staleness flowchart (arch spec section 3, change b)

  1. Replace the entire flowchart block (lines 30-40) with:

     ````text
     ```mermaid
     flowchart TD
         Start([Read entry]) --> ParseFM[Parse YAML frontmatter<br>Extract metadata.layer]
         ParseFM --> HasFreshness{Freshness Tracking section present?}
         HasFreshness -->|No| Stale1[STALE: no tracking]
         HasFreshness -->|Yes| ComputeDays[Compute Days Old = today minus Last Verified]
         ComputeDays --> PastDue{Next Review Recommended < today?}
         PastDue -->|Yes| Stale2[STALE: past review date]
         PastDue -->|No| TooOld{Last Verified > 6 months ago?}
         TooOld -->|Yes| Stale3[STALE: too old]
         TooOld -->|No| Fresh[FRESH: N days until next review]
     ```
     ````

  2. The replacement flowchart must be inside a fenced code block with ` ```mermaid ` specifier.
     Blank lines must appear before and after the fenced block (MD031).

  3. The `ComputeDays` node uses `=` not `:` in its label (`today minus Last Verified`, not
     `today: Last Verified`). This avoids Mermaid parse failures per the conventions doc.

  ##### Step 1 inventory table header (arch spec section 3, change a)

  4. Replace line 42:

     ```text
     Build inventory table: `| File | Category | Layer | Last Verified | Next Review | Stale? |`
     ```

     With:

     ```text
     Build inventory table:
     `| File | Category | Layer | Last Verified | Next Review | Days Old | Stale? |`

     The `Days Old` column holds an integer: today's date minus the Last Verified date in days.
     If Last Verified is absent or malformed, render the Days Old cell as `—` (em-dash).
     ```

  5. The Days Old column sits between `Next Review` and `Stale?` — preserve that column order.

