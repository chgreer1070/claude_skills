  #### Context

  All three implementation tasks (1.2, 1.3, 1.4) and the template task (1.1) have completed.
  This task verifies that the combined changes are self-consistent and that no acceptance
  criterion from the original issue #444 has been missed.

  The feature resolves 6 concrete gaps from the feature context:
  - Gap 1: Batch Mode unconditional skip (resolved by Task 1.2)
  - Gap 4: No delta shown on skip (resolved by Tasks 1.1, 1.2, 1.3, 1.4)
  - Gap 2: FRESH: skip terminal unconditional (resolved by Task 1.3)
  - Gaps related to per-entry delta visibility (resolved by Tasks 1.3 and 1.4)
  - Template ambiguity about "Next Review Recommended" as a gate (resolved by Task 1.1)
  - Activity-aware schedule guidance missing (resolved by Task 1.1)

  #### Objective

  Read all three modified files, verify each of the 6 feature acceptance criteria is met,
  confirm no contradictions exist across files, and run prek on all three files.

  #### Required Inputs

  - `.claude/skills/research-curator/references/entry-template.md` — read in full
  - `.claude/skills/research-curator/SKILL.md` — read in full
  - `.claude/skills/refresh-research/SKILL.md` — read in full
  - `plan/feature-context-research-freshness-delta.md` — Gap Analysis section (gaps 1-7) and
    Use Scenarios (scenarios 1-4) as the acceptance baseline

  #### Requirements

  1. Read all three files and check each acceptance criterion below. Report PASS or FAIL with
     evidence for each.

  2. Confirm no contradictions between files:
     - The `--stale` scope filter in refresh-research SKILL.md still excludes FRESH entries
       from agent spawning (only the label and per-entry listing change, not the routing)
     - The entry-template.md note says re-research proceeds "regardless of this date" — confirm
       research-curator SKILL.md Batch Mode now implements this behavior (auto-rerun)
     - refresh-research SKILL.md Step 6 Results table `Skipped (fresh)` row uses the same
       day-range format as the Step 2 listing block

  3. Run `uv run prek run --files` on each of the three modified files.

  #### Constraints

  - This is a read-and-verify task. Do not make edits to any file unless a critical error
    is found that would block any of the 6 acceptance criteria. If an edit is needed, describe
    it in the handoff report rather than silently making it.
  - If prek fails on a file, report the lint error in the handoff — do not suppress it

  #### Expected Outputs

  - Handoff report stating PASS/FAIL for each of the 6 criteria, contradiction check result,
    prek results for all three files

  #### Acceptance Criteria

  The following 6 criteria map to the feature's resolution of issue #444:

  1. **Batch Mode no longer hard-skips existing URLs**: `research-curator/SKILL.md` Duplicate
     Detection section contains `Proceeding with refresh.` and does not contain
     `skip with info message suggesting`

  2. **Batch Mode delta shown before rerun**: `research-curator/SKILL.md` Duplicate Detection
     section contains the freshness delta message template
     `Entry is N days old (last verified: YYYY-MM-DD, vX.Y.Z).`

  3. **FRESH terminal renamed**: `refresh-research/SKILL.md` staleness flowchart contains
     `FRESH: N days until next review` and does not contain `FRESH: skip`

  4. **Days Old column present**: `refresh-research/SKILL.md` Step 1 inventory table header
     contains `Days Old` between `Next Review` and `Stale?`

  5. **Per-entry Skipped(fresh) listing**: `refresh-research/SKILL.md` Step 2 section contains
     a `Skipped (fresh):` listing block with per-entry delta lines

  6. **Template semantics clarified**: `entry-template.md` Freshness Tracking section contains
     the blockquote note `"Next Review Recommended" is a suggestion, not a gate.`

  #### Verification Steps

  1. Grep `skip with info message` in `.claude/skills/research-curator/SKILL.md` — expect 0 matches (Criterion 1)
  2. Grep `Proceeding with refresh` in `.claude/skills/research-curator/SKILL.md` — expect 2+ matches (Criterion 2)
  3. Grep `FRESH: skip` in `.claude/skills/refresh-research/SKILL.md` — expect 0 matches (Criterion 3)
  4. Grep `FRESH: N days until next review` in `.claude/skills/refresh-research/SKILL.md` — expect 1 match (Criterion 3)
  5. Grep `Days Old` in `.claude/skills/refresh-research/SKILL.md` — expect 2+ matches (Criterion 4)
  6. Grep `Skipped (fresh):` in `.claude/skills/refresh-research/SKILL.md` — expect 2+ matches in Steps 2 and 6 (Criterion 5)
  7. Grep `is a suggestion, not a gate` in `.claude/skills/research-curator/references/entry-template.md` — expect 1 match (Criterion 6)
  8. Run: `uv run prek run --files .claude/skills/research-curator/SKILL.md .claude/skills/refresh-research/SKILL.md .claude/skills/research-curator/references/entry-template.md`
     Confirm all exit 0

