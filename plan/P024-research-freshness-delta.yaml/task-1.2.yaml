  #### Context

  This task merged from three planned changes to avoid edit conflicts on
  `.claude/skills/research-curator/SKILL.md`:
  1. Batch Mode — Duplicate Detection section (line 166): replace skip-and-redirect with
     delta display + auto-rerun
  2. Batch Mode — Progress Reporting wave log: add `refreshed` outcome label
  3. Batch Mode — Output Format: update Batch Mode Output template with Refreshed subsection

  The research-curator SKILL.md declares Mermaid diagrams as "executable instruction sets"
  (lines 7-10). All prose instructions carry the same binding weight. The Duplicate Detection
  section (line 166) is the primary blocking site for issue #444.

  Architecture spec sections 2 and 6 provide exact replacement text and output templates.
  Task 1.1 must complete first because the note added to entry-template.md is referenced
  conceptually in the new Duplicate Detection prose (the rerun path now reads freshness data
  whose semantics are clarified in the template).

  #### Objective

  Replace the Duplicate Detection one-liner with the four-step auto-rerun procedure, add
  the `refreshed` outcome to the wave progress log, and update the Batch Mode Output Format
  template to include `Refreshed` count and `Entries Refreshed` subsection.

  #### Required Inputs

  - `.claude/skills/research-curator/SKILL.md` — read in full before editing; confirm line 166
    is the duplicate detection sentence and lines 390-405 are the Batch Mode Output template
  - `plan/architect-research-freshness-delta.md` — section 2, "File 1" changes; use exact text
    from the spec for all three changed sections
  - `plan/codebase/skill-conventions.md` — Mermaid `<br>` conventions, `=` not `:` in node
    strings, blank lines around fences

  #### Requirements

  ##### Duplicate Detection section (arch spec section 2, changed section 1)

  1. Replace the single sentence at line 166:

     ```text
     Before spawning, check if `./research/` already contains an entry for the URL's resource. If found, skip with info message suggesting `--rerun` instead.
     ```

     With:

     ```text
     Before spawning, check if `./research/` already contains an entry for the URL's resource.
     If found:

     1. Read the entry's Freshness Tracking section.
     2. Compute days since Last Verified (today minus Last Verified date as integer days).
     3. Emit: `Entry is N days old (last verified: YYYY-MM-DD, vX.Y.Z). Proceeding with refresh.`
     4. Pass `--rerun ./research/{category}/{name}.md` to the agent instead of skipping.

     If the Freshness Tracking section is absent or Last Verified is unreadable, emit:
     `Entry exists but freshness data unavailable. Proceeding with refresh.`
     and pass `--rerun ./research/{category}/{name}.md` to the agent.
     ```

  ##### Progress Reporting wave log (arch spec section 2, changed section 2)

  2. In the `### Progress Reporting` section (lines 170-177), replace the wave log code block:

     ```text
     Wave N complete: M/N succeeded
       created -- category/resource-name.md
       created -- category/resource-name.md
       failed  -- https://url.com -- {exact reason from agent}
     ```

     With:

     ```text
     Wave N complete: M/N succeeded
       created    -- category/resource-name.md
       refreshed  -- category/resource-name.md (was N days old)
       failed     -- https://url.com -- {exact reason from agent}
     ```

  3. Align spacing so `created`, `refreshed`, and `failed` keywords are left-padded to the same
     column width (two spaces of indent, keyword padded to 10 characters, then `--`).

  ##### Batch Mode Output Format template (arch spec section 2, changed section 3)

  4. Replace the Batch Mode Output template (lines 392-405 of the `<output_format>` section):

     ```text
     ## Batch Research Complete

     **Total**: X URLs processed
     **Succeeded**: Y entries created
     **Failed**: Z

     ### Entries Created
     - ./research/{category}/{name}.md
     - ./research/{category}/{name}.md

     ### Failures
     - {URL} -- {exact reason from agent output}
     ```

     With:

     ```text
     ## Batch Research Complete

     **Total**: X URLs processed
     **Created**: Y new entries
     **Refreshed**: Z existing entries
     **Failed**: W

     ### Entries Created
     - ./research/{category}/{name}.md

     ### Entries Refreshed
     - ./research/{category}/{name}.md (was N days old, last: YYYY-MM-DD, vX.Y.Z)

     ### Failures
     - {URL} -- {exact reason from agent output}
     ```

  #### Constraints

  - Do not modify any section of research-curator SKILL.md outside the three identified
    sub-sections (Duplicate Detection, Progress Reporting wave log, Batch Mode Output template)
  - Do not modify Default Mode, Rerun Mode, Validate Mode, or any other section
  - The replacement text for Duplicate Detection must preserve the initial `Before spawning,
    check if...` sentence before the `If found:` branching — do not restructure the opening
  - All code fences in the modified sections must have a language specifier; use `text` for
    plain-text output examples

  #### Expected Outputs

  - `.claude/skills/research-curator/SKILL.md` — modified: Duplicate Detection section,
    Progress Reporting wave log code block, Batch Mode Output Format template

  #### Acceptance Criteria

  1. The Duplicate Detection section contains the phrase `Proceeding with refresh.` and no
     longer contains `skip with info message suggesting`
  2. The Progress Reporting wave log code block contains `refreshed  -- category/resource-name.md (was N days old)` as a distinct outcome line alongside `created` and `failed`
  3. The Batch Mode Output template contains `**Refreshed**: Z existing entries` and an
     `### Entries Refreshed` subsection with the `(was N days old, last: YYYY-MM-DD, vX.Y.Z)`
     annotation format
  4. `uv run prek run --files .claude/skills/research-curator/SKILL.md` exits 0

  #### Verification Steps

  1. Grep for `skip with info message` in `.claude/skills/research-curator/SKILL.md` — confirm
     zero matches
  2. Grep for `Proceeding with refresh` in `.claude/skills/research-curator/SKILL.md` — confirm
     at least two matches (Template A and Template B variants)
  3. Read the Progress Reporting section and confirm three outcome labels: `created`,
     `refreshed`, and `failed`, each on its own line
  4. Read the Batch Mode Output section and confirm `**Refreshed**:` and `### Entries Refreshed`
     are present
  5. Run: `uv run prek run --files .claude/skills/research-curator/SKILL.md` and confirm exit 0

