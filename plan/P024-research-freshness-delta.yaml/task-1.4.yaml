  #### Context

  This task covers Steps 2 and 6 of `/refresh-research` SKILL.md only. Two changes:
  1. Step 2 scope filter — append a `Skipped (fresh)` per-entry listing block.
  2. Step 6 summary report — add `Skipped (fresh)` row to the Results table and update the
     summary header line.

  Task 1.3 has already modified Step 1 of this file. Read the file after 1.3 has completed
  to get the correct current state before making these edits.

  The Step 2 listing makes fresh-entry exclusions auditable without requiring the user to run
  Step 1 manually. The Step 6 row quantifies the exclusions in the final report.

  #### Objective

  Append the Skipped(fresh) listing specification to Step 2 and add the Skipped(fresh) row
  and updated header to the Step 6 Results table, exactly as specified in the architecture spec.

  #### Required Inputs

  - `.claude/skills/refresh-research/SKILL.md` — read in full after Task 1.3 completes; confirm
    Step 1 changes from 1.3 are present before proceeding
  - `plan/architect-research-freshness-delta.md` — section 3, "File 2" changes (c) and (d);
    use exact prose and template text from the spec
  - `plan/architect-research-freshness-delta.md` — section 6, Templates D, E, and F for
    exact output format strings

  #### Requirements

  ##### Step 2 Skipped(fresh) listing (arch spec section 3, change c)

  1. After the zero-entries stop condition in Step 2 (line 58: `If zero entries remain after
     all filters: report "No entries match..."`) and before the `### Step 3` header, insert:

     ```text
     When the `--stale` filter excludes entries because they are FRESH, list each excluded entry
     in a "Skipped (fresh)" block with its freshness delta before Step 3 begins:

     ```text
     Skipped (fresh):
       ./research/{category}/{name}.md — N days until next review (last: YYYY-MM-DD, vX.Y.Z)
       ./research/{category}/{name}.md — N days until next review (last: YYYY-MM-DD, vX.Y.Z)
     ```

     This listing appears regardless of whether `--dry-run` is active. Under `--all` (no
     staleness filter), no entries are excluded by staleness so this block does not appear.

     If Next Review date is absent, render: `review date unknown (last: YYYY-MM-DD, vX.Y.Z)`.
     If Version at Verification is absent, omit the version token from the line.
     ```

  2. The inner `text` code block containing the listing template must have the `text` language
     specifier and be surrounded by blank lines (MD031).

  ##### Step 6 summary header and Results table (arch spec section 3, change d)

  3. Replace the summary header line (line 112):

     ```text
     **Total scanned**: {N} | **Targeted**: {M} | **Skipped (fresh)**: {K}
     ```

     With:

     ```text
     **Total scanned**: {N} | **Targeted**: {M} | **Skipped (fresh)**: {K} ({min}–{max} days until next review)
     ```

  4. Replace the Results table (lines 116-120):

     ```text
     | Outcome | Count |
     |---------|-------|
     | Updated | {N} |
     | Unchanged | {N} |
     | Failed | {N} |
     ```

     With:

     ```text
     | Outcome | Count | Notes |
     |---------|-------|-------|
     | Updated | {N} | |
     | Unchanged | {N} | |
     | Failed | {N} | |
     | Skipped (fresh) | {K} | {min}–{max} days until next review |
     ```

  5. After the Results table, add an inline specification note:

     ```text
     When K = 0, omit the Skipped (fresh) row entirely.
     When K = 1, Notes column: `{N} days until next review` (single value, no range dash).
     ```

  #### Constraints

  - Do not modify Step 1 (already modified by Task 1.3) or Steps 3-5 or Step 7
  - The Skipped(fresh) listing in Step 2 must appear before the `### Step 3` header but after
    the zero-entries stop condition
  - The Results table expansion must not alter the `## Updates`, `## Failures`, or
    `## Next Actions` subsections within the Step 6 report block
  - The K=0 omission rule means the table template shows 4 rows; the inline note clarifies
    the conditional rendering — do not try to represent the conditional inside the table itself

  #### Expected Outputs

  - `.claude/skills/refresh-research/SKILL.md` — modified: Step 2 Skipped(fresh) block appended,
    Step 6 summary header updated, Step 6 Results table expanded

  #### Acceptance Criteria

  1. Step 2 contains a `Skipped (fresh):` listing block with the per-entry template line:
     `./research/{category}/{name}.md — N days until next review (last: YYYY-MM-DD, vX.Y.Z)`
  2. The Step 2 listing prose states it appears `regardless of whether --dry-run is active`
  3. The Step 6 summary header contains `({min}–{max} days until next review)` after the
     `**Skipped (fresh)**: {K}` token
  4. The Step 6 Results table has four data rows: `Updated`, `Unchanged`, `Failed`, and
     `Skipped (fresh)`, each with a `Notes` column
  5. The K=0 conditional omission rule is documented after the Results table
  6. `uv run prek run --files .claude/skills/refresh-research/SKILL.md` exits 0

  #### Verification Steps

  1. Grep for `Skipped (fresh):` (with trailing colon) in refresh-research/SKILL.md — confirm
     at least two matches: one in Step 2 listing block, one in Step 6 Results table
  2. Grep for `{min}–{max} days until next review` in the file — confirm at least one match
     in the Step 6 summary header
  3. Read the Step 6 summary block and confirm the Results table has a `Notes` column header
     and the `Skipped (fresh)` row
  4. Read the Step 2 section and confirm the listing block appears after line 58 content and
     before the `### Step 3` header
  5. Run: `uv run prek run --files .claude/skills/refresh-research/SKILL.md` and confirm exit 0

