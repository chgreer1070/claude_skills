    ## Context

    T1 added `timeout: float = 300.0` to `run_quality_gates()` and a `except subprocess.TimeoutExpired` block that produces `CommandResult(exit_code=124)`. This task adds a new test class to cover that exception path.

    Existing test file: `plugins/development-harness/tests/test_dispatch_schema/test_gates.py`

    Structural reference for the new class:
    - `TestSubprocessInvocationContract` (lines 568-651) ŌĆö most similar existing class in structure
    - Mock target: `mocker.patch("dispatch_schema.gates.subprocess.run", side_effect=subprocess.TimeoutExpired(cmd=["pytest"], timeout=300.0))`
    - `shutil.which` must also be patched to return a non-None path so code reaches the `subprocess.run` call site
    - `_clear_resolve_executable_cache` autouse fixture is inherited automatically ŌĆö no new fixtures needed
    - `_make_completed_process` helper is available for tests that need a normal result alongside a timeout

    ## Objective

    Add `class TestSubprocessTimeoutContract` to `test_gates.py` that verifies all observable behaviors of the `subprocess.TimeoutExpired` exception path.

    ## Inputs

    - `plugins/development-harness/tests/test_dispatch_schema/test_gates.py` ŌĆö file to modify (read before editing)
    - `plugins/development-harness/dispatch_schema/gates.py` after T1 ŌĆö the implementation under test
    - Architecture spec section 7.2ŌĆō7.4 at `plan/architect-gates-subprocess-timeout.md`

    ## Requirements

    1. Add `class TestSubprocessTimeoutContract` to the test file following the class-based pattern of existing tests
    2. Include these test methods (minimum ŌĆö add more if coverage gaps exist):
       - `test_timeout_produces_exit_code_124` ŌĆö `side_effect=TimeoutExpired`, assert `result.results[0].exit_code == 124`
       - `test_timeout_stderr_contains_timeout_duration` ŌĆö assert `"300.0s"` (or the timeout value) appears in `stderr`
       - `test_timeout_result_has_passed_false` ŌĆö assert `result.results[0].passed is False`
       - `test_timeout_failfast_stops_after_first_timeout` ŌĆö two commands, first times out, assert only one result returned
       - `test_timeout_runall_continues_after_timeout` ŌĆö two commands, first times out, second succeeds, assert two results
       - `test_custom_timeout_value_forwarded_to_subprocess` ŌĆö call with `timeout=5.0`, assert `subprocess.run` was called with `timeout=5.0`
    3. Each test uses AAA (Arrange / Act / Assert) comment structure matching existing tests
    4. Mock target string: `"dispatch_schema.gates.subprocess.run"` ŌĆö identical to all existing tests
    5. Also patch `shutil.which` (or `dispatch_schema.gates.shutil.which`) to return a non-None path in every test

    ## Constraints

    - Do NOT modify any existing test class or method
    - Do NOT add new fixtures beyond the existing autouse fixture
    - Do NOT import new test libraries ŌĆö `pytest`, `pytest-mock`, and `subprocess` are sufficient
    - Test class must be appended after the last existing class in the file

