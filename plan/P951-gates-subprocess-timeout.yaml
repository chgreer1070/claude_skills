    ## Context

    Single-function patch to `run_quality_gates()` in `plugins/development-harness/dispatch_schema/gates.py`. The `subprocess.run` call at line 75 has no `timeout` parameter, so hung gate commands block indefinitely. The fix follows the established `exit_code=127` pattern (command-not-found) at lines 71-72 for converting a non-subprocess error into a `CommandResult`.

    Architecture decisions already resolved:
    - `timeout` is a keyword-only function parameter with default `300.0` (ADR-001)
    - No explicit `kill()` needed ŌĆö `subprocess.run` kills the child before raising `TimeoutExpired` (ADR-002)
    - `exit_code=124` follows Unix `timeout(1)` convention (ADR-003)

    ## Objective

    Patch `run_quality_gates()` so that a hung subprocess raises `TimeoutExpired`, which is caught and converted to `CommandResult(exit_code=124)`, and update the docstring to document the new parameter and behavior.

    ## Inputs

    - `plugins/development-harness/dispatch_schema/gates.py` ŌĆö file to modify (read before editing)
    - Architecture spec section 4.1ŌĆō4.4 at `plan/architect-gates-subprocess-timeout.md` ŌĆö exact code shapes to follow

    ## Requirements

    1. Add `timeout: float = 300.0` as a keyword-only parameter to `run_quality_gates()` after `cwd` (all three params already keyword-only after `*`)
    2. Pass `timeout=timeout` to the existing `subprocess.run(...)` call at line 75
    3. Wrap the `else` branch (lines 73-78) in `try/except subprocess.TimeoutExpired` ŌĆö the `except` block constructs `CommandResult(command=command, exit_code=124, stdout="", stderr=f"command timed out after {timeout}s")`
    4. Update the `run_quality_gates()` docstring:
       - Add `timeout` entry in the `Args:` section: per-command timeout in seconds, default 300.0
       - Add a paragraph after the `exit_code=127` paragraph documenting that `subprocess.TimeoutExpired` is caught (not propagated) and produces `exit_code=124`
       - Preserve the existing `OSError` propagation note unchanged

    ## Constraints

    - Do NOT modify any other function or class
    - Do NOT add `kill()` or `Popen` ŌĆö `subprocess.run` with `timeout=` handles child cleanup
    - Do NOT change `CommandResult`, `GateResult`, or `GateRunMode` ŌĆö no model changes needed
    - Do NOT use `shell=True`
    - Preserve all existing behavior for commands that complete within the timeout

    ## Expected Outputs

    - `plugins/development-harness/dispatch_schema/gates.py` ŌĆö modified with timeout parameter, except block, and updated docstring

    ## Acceptance Criteria

    1. `run_quality_gates` signature contains `timeout: float = 300.0` as a keyword-only parameter
    2. `subprocess.run(...)` call includes `timeout=timeout`
    3. `except subprocess.TimeoutExpired` block exists within the `else` branch and constructs `CommandResult(exit_code=124, stdout="", stderr=f"command timed out after {timeout}s")`
    4. Docstring `Args:` section includes `timeout` entry
    5. Docstring body mentions `exit_code=124` and `TimeoutExpired`
    6. Existing `OSError` propagation note is preserved in docstring
    7. `uv run pytest plugins/development-harness/tests/test_dispatch_schema/test_gates.py` exits 0 (all 8 existing tests pass)
    8. `uv run prek run --files plugins/development-harness/dispatch_schema/gates.py` exits 0

    ## Verification Steps

    1. Read `plugins/development-harness/dispatch_schema/gates.py` and confirm signature, subprocess.run call, except block, and docstring match requirements
    2. `uv run pytest plugins/development-harness/tests/test_dispatch_schema/test_gates.py -v` ŌĆö confirm all existing tests pass, no new failures
    3. `uv run prek run --files plugins/development-harness/dispatch_schema/gates.py` ŌĆö confirm linting passes

    ## Handoff

    Return:
    - Line numbers of each changed section (signature, subprocess.run call, except block, docstring)
    - pytest output confirming all existing tests pass
    - prek output confirming lint passes

