  description: |-
    ## Context

    `local-workflow.md` documents agent sequencing but omits data structure shapes at edges and
    publisher-consumer relationships. AI agents reading it make incorrect assumptions about field
    names (e.g., accessing `verdict` on a TN verification record that uses per-criterion `status`
    instead). GitHub Issue #933 requests a companion reference document that is purely about data
    shapes — no agent sequencing narrative.

    This task creates `.claude/docs/workflow-architecture-diagram.md` as a new file. No existing
    file is modified. The architecture spec at `plan/architect-workflow-architecture-diagram.md`
    contains the complete section structure, all data shapes, the publisher-consumer map, and
    exact implementation instructions — read it in full before writing.

    ## Objective

    Write `.claude/docs/workflow-architecture-diagram.md` containing all 6 sections specified in
    the architecture spec, with every data shape sourced from the listed source files and zero
    invented fields.

    ## Inputs

    - Architecture spec: `plan/architect-workflow-architecture-diagram.md` — read in full; contains
      exact field definitions, node inventory, and implementation instructions (Sections 4–8)
    - `plugins/development-harness/docs/TASK_FILE_FORMAT.md` — canonical Task and Plan schemas; source for TaskAssignment
      fields, status values, authorized writers table
    - `plugins/development-harness/backlog_core/server.py` — backlog MCP tool signatures; source for
      BacklogItem creation fields and all 8 MCP tool names
    - `plugins/development-harness/backlog_core/models.py` — Pydantic model definitions; source for
      BacklogItem field types
    - `plugins/python3-development/skills/implementation-manager/scripts/task_status_hook.py` —
      source for hook trigger conditions, context file shape, and SubagentStop/PostToolUse behavior
    - `.claude/rules/local-workflow.md` — existing data flow diagram; node inventory for Section 1
    - `plugins/python3-development/agents/t0-baseline-capture.md` — T0 baseline YAML format
    - `plugins/python3-development/agents/tn-verification-gate.md` — TN verification YAML format

    ## Requirements

    1. Read the architecture spec fully before writing any content.
    2. Write the file using Strategy B (skeleton Write + section Edit calls per
       `.claude/rules/large-file-write-strategy.md`): write a skeleton with `<!-- PENDING: section-N -->`
       stubs for all 6 sections, then fill each section with an Edit call.
    3. Section 1 (Pipeline Overview): Mermaid `flowchart TD` with subgraphs for Planning, Execution,
       and Quality Gates. Must include all 33 nodes: 8 MCP tools, 4 skills, 14 agents, 2 hooks,
       5 CLI commands. Label edges with cross-reference markers to Section 2 subsections (e.g., `§2.1`).
    4. Section 2 (Data Structure Shapes): 7 subsections with fenced YAML or JSON blocks. Every field
       must exist in one of the source files listed in Inputs. Do not add fields that are not in the
       source files. Subsections: 2.1 ReadyTasksResult, 2.2 TaskAssignment, 2.3 T0 Baseline YAML,
       2.4 TN Verification YAML, 2.5 BacklogItem, 2.6 Active Task Context File, 2.7 sam_claim output.
    5. Section 3 (Publisher-Consumer Map): Markdown table with columns Artifact, Publisher, Consumer(s).
       Include all 12 artifacts listed in architecture spec Section 5.3.
    6. Section 4 (SAM Task State Lifecycle): Mermaid `flowchart TD` showing all 6 status values
       (`not-started`, `in-progress`, `complete`, `blocked`, `deferred`, `skipped`) with actor
       annotations and guard conditions per architecture spec Section 5.4.
    7. Section 5 (Cross-System Dependency Map): Mermaid `flowchart TD` showing the issue number
       propagation chain from GitHub Issue → BacklogItem → plan YAML → active-task context file →
       hook → GitHub sub-issue, per architecture spec Section 5.5.
    8. Section 6 (Hook Trigger Conditions): Two subsections — 6.1 SubagentStop and 6.2 PostToolUse.
       Document the trigger event, input data shape the hook reads, and effect on task fields.
       Source: `task_status_hook.py` and TASK_FILE_FORMAT.md Authorized Writers table.
    9. File header must cite source files and include a "Last verified" date line.
    10. Table of Contents at top with links to all 6 sections.
    11. All fenced code blocks must have a language specifier (`json`, `yaml`, `mermaid`, `text`, `bash`).
    12. After filling all sections, verify zero `<!-- PENDING:` markers remain by reading the file.

    ## Constraints

    - Do NOT modify any source file listed in Inputs.
    - Do NOT invent field names. Every field in Section 2 must be verified against a source file
      before inclusion. If a field is referenced in `local-workflow.md` but cannot be confirmed in
      a source file, note it with a `# unverified` comment and flag it in the handoff.
    - Do NOT use tables for workflow steps or Mermaid diagrams — tables are only for the
      publisher-consumer lookup (Section 3) per CLAUDE.md formatting preferences.
    - Do NOT duplicate content from `plugins/development-harness/docs/TASK_FILE_FORMAT.md` — cross-reference it instead.
    - Do NOT include agent sequencing narrative (that is `local-workflow.md`'s role).

    ## Expected Outputs

    - `.claude/docs/workflow-architecture-diagram.md` — new file, ~12.5K characters

    ## Acceptance Criteria

    1. AC1: All 33 nodes present in Section 1 pipeline overview (8 MCP tools + 4 skills + 14 agents
       + 2 hooks + 5 CLI commands).
    2. AC2: Section 2 contains data structure shapes for all 7 artifacts (ReadyTasksResult,
       TaskAssignment, T0 Baseline YAML, TN Verification YAML, BacklogItem, active-task context file,
       sam_claim output) with exact field names and types sourced from the listed source files.
    3. AC3: Section 3 publisher-consumer table contains all 12 artifacts with their publishers and
       consumers.
    4. AC4: Section 4 state lifecycle diagram shows all 6 status values with the actor that writes
       each transition and any guard conditions.
    5. AC5: Section 5 cross-system dependency map shows the full propagation chain from GitHub issue
       number through BacklogItem → plan YAML (`issue:` field) → active-task context file
       (`parent_issue_number`) → hook GitHub sync → sub-issue (`github_issue` field).
    6. AC6: Section 6 documents both hook types (SubagentStop and PostToolUse) with trigger condition,
       input schema, and field effects.
    7. AC7: All Mermaid diagrams render without syntax errors. All fenced blocks have language
       specifiers.
    8. AC8: `uv run prek run --files .claude/docs/workflow-architecture-diagram.md` exits 0.

    ## Verification Steps

    1. After writing, read the file and count nodes in the Section 1 diagram — confirm total is 33.
    2. For each field in Section 2 subsections, confirm it appears in the source file cited.
    3. Count rows in Section 3 table — confirm 12 artifact rows present.
    4. Confirm Section 4 contains exactly 6 status values with actors.
    5. Confirm Section 5 shows all 5 link points in the issue number chain.
    6. Confirm Section 6 has subsections 6.1 and 6.2 with trigger condition and input schema.
    7. Search file for `<!-- PENDING:` — confirm zero matches.
    8. Run `uv run prek run --files .claude/docs/workflow-architecture-diagram.md` and confirm exit 0.

    ## CoVe Checks

    Accuracy risk is medium because Section 2 data shapes must match actual source schemas. A field
    listed incorrectly (wrong name, wrong type, wrong optionality) will cause agent hallucinations
    downstream — the exact problem this document is meant to prevent.

    Key claims to verify before finalizing Section 2:

    - Claim: `sam_ready` returns `skills`, `agent`, `dependencies`, `priority`, `complexity` per task.
      Verify: Read `plugins/python3-development/agents/swarm-task-planner.md` and the sam_schema
      models. Confirm each field exists in the `ReadyTasksResult` task entry.

    - Claim: TN verification YAML has no top-level `verdict` field — only per-criterion `status`.
      Verify: Read `plugins/python3-development/agents/tn-verification-gate.md` and confirm the
      output schema. The architecture spec Section 5.2 states "There is no top-level `verdict` field."

    - Claim: `parent_issue_number` in active-task context file is OMITTED (not null) when unknown.
      Verify: Read `task_status_hook.py` and confirm the hook treats absence of the key as `None`,
      not an error.

    - Claim: BacklogItem `plan` field holds a file path string.
      Verify: Read `plugins/development-harness/backlog_core/models.py` and confirm the `plan` field
      type annotation.

    Verification questions:
    1. Does `models.py` define a `BacklogItem` Pydantic model with a `plan` field typed as `str | None`?
    2. Does `tn-verification-gate.md` confirm the output is an array of per-criterion records with
       no wrapping `verdict` key?
    3. Does `task_status_hook.py` read `parent_issue_number` with `.get()` or equivalent
       (key-absent safe)?

    Revision rule: If any check fails or a field cannot be confirmed in source, remove the field from
    Section 2 and add a `# not-verified` comment. Flag removed fields in the handoff.

    ## Handoff

    Return:
    - Path to created file: `.claude/docs/workflow-architecture-diagram.md`
    - Node count from Section 1 verification (should be 33)
    - Any fields that could not be verified and were marked `# not-verified`
    - Exit code from `uv run prek run --files .claude/docs/workflow-architecture-diagram.md`

    ---
  handoff: |-
    Return path to created file and confirmation that all 8 verification criteria from architect spec Section 7 are satisfied
