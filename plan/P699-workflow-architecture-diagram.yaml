  description: |-
    ## Context

    T1 created `.claude/docs/workflow-architecture-diagram.md`. This task adds a single link from
    `.claude/rules/local-workflow.md` to that new file so agents reading `local-workflow.md` can
    discover the data shapes reference.

    The architecture spec (Section 4.2) specifies the exact location and text of the link. Depends
    on T1 being COMPLETE.

    ## Objective

    Add one markdown link sentence to `.claude/rules/local-workflow.md` immediately after the
    closing triple-backtick of the Data Flow Diagram section.

    ## Inputs

    - `.claude/rules/local-workflow.md` — file to edit; read it to locate the Data Flow Diagram
      section ending
    - Architecture spec Section 4.2 — specifies exact link text and relative path

    ## Requirements

    1. Read `.claude/rules/local-workflow.md` to locate the Data Flow Diagram section. Find the
       closing ` ``` ` of the flowchart block that ends with the `Done` node.
    2. After that closing ` ``` `, add one blank line, then this exact text:

       ```markdown
       For data structure shapes, publisher-consumer relationships, state lifecycle,
       and hook trigger conditions, see [Workflow Architecture Diagram](./../docs/workflow-architecture-diagram.md).
       ```

    3. Run `uv run prek run --files .claude/rules/local-workflow.md` and confirm exit 0.

    ## Constraints

    - Only add the link. Do not modify any other content in `local-workflow.md`.
    - The relative path must start with `./` per CLAUDE.md File Reference Standards.
    - Do not add a second blank line between the code fence and the new sentence.

    ## Expected Outputs

    - `.claude/rules/local-workflow.md` — modified with one link sentence added

    ## Acceptance Criteria

    1. The link sentence appears in `local-workflow.md` after the Data Flow Diagram flowchart block.
    2. The link uses relative path `./../docs/workflow-architecture-diagram.md`.
    3. `uv run prek run --files .claude/rules/local-workflow.md` exits 0.
    4. No other content in `local-workflow.md` is changed.

    ## Verification Steps

    1. Read the modified section and confirm the link text and path match the requirement exactly.
    2. Confirm only one insertion was made (no other diffs).
    3. Run `uv run prek run --files .claude/rules/local-workflow.md` and confirm exit 0.

    ## Handoff

    Return:
    - The exact line added (quoted)
    - Exit code from prek
  handoff: |-
