  body: |
    ## Context

    This task was merged from three planned changes (list_projects, create_project, GraphQL
    helpers) to avoid edit conflicts on github.py. Projects V2 has no REST API -- all operations
    use GraphQL via PyGithub's _requester, following the existing _resolve_labels_graphql pattern.

    Key files:
    - plugins/development-harness/backlog_core/github.py (add GraphQL helpers)
    - plugins/development-harness/backlog_core/server.py (add @mcp.tool functions)
    - plugins/development-harness/backlog_core/operations.py (add operation functions)
    - plan/architect-backlog-mcp-github-tools.md -- Sections 4 and 5 for GraphQL queries and return schemas

    ## Objective

    Add backlog_list_projects and backlog_create_project MCP tools backed by GraphQL helpers.

    ## Inputs

    - plan/architect-backlog-mcp-github-tools.md -- Section 4 for GraphQL queries, Section 5 for return schemas
    - plan/codebase/backlog-mcp-server-patterns.md -- for established patterns and existing GraphQL usage
    - plugins/development-harness/backlog_core/github.py -- existing _resolve_labels_graphql for pattern reference

    ## Requirements

    ### GraphQL infrastructure in github.py

