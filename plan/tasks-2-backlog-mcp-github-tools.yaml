    11. Create plugins/development-harness/tests/test_github_tools_issues.py
    12. Test list_issues: filters by milestone, filters by labels, handles empty results, respects limit, validates state param
    13. Test comment_issue: creates comment returns id/url, raises BacklogError on invalid issue number
    14. Mock get_github() to return mock Repository; do not make real API calls

