    ## Requirements

    ### list_issues operation and tool

    1. Add list_issues() to operations.py with params: repo, milestone, labels, state, limit, output
    2. Milestone param accepts title string; resolve to Milestone object via repo.get_milestones() before passing to repo.get_issues()
