plan_number: 2
slug: backlog-mcp-github-tools
goal: Add 9 new MCP tools to the backlog FastMCP server backed by PyGithub,
  replacing gh CLI dependencies across 12 plugin docs
feature: Backlog MCP Server GitHub Tools Extension
status: not-started
context: |
  Generated by context-gathering agent on 2026-03-20

  ## How This Currently Works: Backlog FastMCP Server Architecture

  The backlog MCP server (plugins/development-harness/backlog_core/) is a FastMCP-based service exposing GitHub operations as MCP tools. When an agent invokes a tool, the request flows: (1) server.py @mcp.tool async wrapper validates parameters via Annotated field descriptors, (2) asyncio.to_thread() offloads blocking PyGithub calls, (3) operations.py contains business logic calling github.py helpers, (4) github.py executes REST/GraphQL via PyGithub, (5) results return as dict with messages, warnings, error keys. The server has 14 existing tools covering issue CRUD (create_issue, view, list, pull, groom, update, sync) and status management (backlog_get_sam_tasks, backlog_update_sam_task_status, backlog_get_ready_sam_tasks, backlog_close, backlog_resolve, backlog_strike_entry, backlog_create_sam_task).

  All PyGithub calls are wrapped in try/except catching GithubException and GitHubUnavailableError, converting to BacklogError exceptions serialized in the error key. Architecture is layered: server.py handles async/await and parameter validation, operations.py contains business logic, github.py abstracts PyGithub REST/GraphQL, models.py defines data models. Error handling: ValidationError for invalid inputs (state validation, date parsing), GitHubUnavailableError when GITHUB_TOKEN missing or API unreachable, BacklogError for all other errors.

  The Output class from models.py accumulates messages and warnings during execution, merged into the return dict: {**operation_result, **output.to_dict()}. GraphQL support exists via _resolve_labels_graphql() in github.py (lines 48-80), demonstrating the pattern: (1) construct query string with template variables, (2) invoke repo._requester.requestJsonAndCheck(method="POST", url="https://api.github.com/graphql", input=json.dumps({"query": query, "variables": variables})), (3) parse response for top-level "errors" key, (4) raise BacklogError if present.

  Repository discovery via discover_repo() in models.py searches for .git or pyproject.toml. DEFAULT_REPO fallback is "Jamie-BitFlight/claude_skills". All tools accept optional repo parameter defaulting to DEFAULT_REPO.

  ## For New Tool Implementation: What Needs to Connect

  **T01 (Issues: list_issues, comment_issue)** adds two operations querying GitHub via repo.get_issues() and repo.get_issue().create_comment(). Both validate inputs (state: open/closed/all), handle pagination (limit parameter), return dicts with established keys. Special: milestone param accepts title string but get_issues() needs Milestone object—requires title-to-object resolution via repo.get_milestones(state="all") iteration.

  **T02 (Labels: list_labels)** adds read-only listing via repo.get_labels(). No mutations allowed—state_handler owns label mutations. Iterates to limit, returns label dicts with name, color, description.

  **T03 (Milestones: list_milestones, get_soonest_milestone, create_milestone)** adds three operations. list_milestones filters by state (open/closed/all). get_soonest_milestone reuses list logic, filters to those with due_on, returns earliest. create_milestone parses due_on (ISO 8601 string YYYY-MM-DD) to datetime before repo.create_milestone().

  **T04 (Projects V2: list_projects, create_project + 3 GraphQL helpers)** highest complexity. Requires three new github.py helpers following _resolve_labels_graphql() pattern: (1) _graphql_request(repo, query, variables) wrapping repo._requester.requestJsonAndCheck() with error parsing for top-level "errors" keys, (2) _projects_v2_list_query(owner, limit) returning (query_string, variables) tuple with exact architect spec Section 4 GraphQL query, (3) _projects_v2_create_mutation(owner_id, title) returning (mutation_string, variables) tuple. list_projects calls _graphql_request with list query, returns projects (id, title, number, url, closed, short_description). create_project first resolves owner to owner ID via repositoryOwner query, then calls _graphql_request with create mutation.

  **T05 (PRs: list_merged_prs)** adds single operation using repo.get_pulls(state="closed"), filtering to merged (pr.merged_at is not None), optionally searching title/body. Returns PRs with number, title, merged_at, author, url, head_branch.

  All 9 new operations added to operations.py following existing pattern: signature with output: Output | None, wrapped try/except catching BacklogError, merging output.to_dict() into result. All 9 new tools added to server.py as @mcp.tool async functions calling operation via asyncio.to_thread(). Test files per task: mock get_github() returning mock Repository, test success/error paths, verify return dict keys match architect spec.

  ## Technical Reference

  **File Locations**: plugins/development-harness/backlog_core/server.py (FastMCP tools), operations.py (9 new functions), github.py (3 new GraphQL helpers), models.py (no changes), tests/test_github_tools_*.py (5 new files)

  **Return Format**: {"<result_key>": <value>, "count": <int>, "messages": [...], "warnings": [...], "error": null}

  **Async Pattern**: @mcp.tool async def backlog_<name>(...) -> dict: try: result = await asyncio.to_thread(operations.<func>, ...); return result; except BacklogError as e: return {"error": str(e), "messages": [], "warnings": []}

  **Milestone Resolution** (T03): for m in repo.get_milestones(state="all"): if m.title == milestone: milestone_obj = m

  **GraphQL Pattern** (T04): response = repo._requester.requestJsonAndCheck("POST", "https://api.github.com/graphql", input=json.dumps({"query": query, "variables": variables})); if "errors" in response: raise BacklogError()

  **Test Mocking**: @patch("backlog_core.operations.get_github"); def test_<name>(mock_get_github): mock_repo = Mock(); mock_get_github.return_value = mock_repo; result = operations.<func>(mock_repo, ...)

  **Architecture Spec Sections**: Section 4 (Component Design—exact @mcp.tool signatures), Section 5 (Data Architecture—return schemas, GraphQL queries), Section 7 (Testing—mock strategy, coverage)

  Original context:
  The development-harness plugin's backlog MCP server (plugins/development-harness/backlog_core/)
  already exposes 14 tools for issue CRUD via PyGithub. Plugin docs reference 38 gh CLI commands
  across 12 files that fail at runtime because gh is not installed. This plan adds 9 new tools
  covering: issue listing/comments, read-only labels, milestone CRUD, Projects V2 via GraphQL,
  and merged PR search. No new dependencies. No subprocess calls.

  Architecture spec: plan/architect-backlog-mcp-github-tools.md
  Feature context: plan/feature-context-backlog-mcp-github-tools.md
  Codebase patterns: plan/codebase/backlog-mcp-server-patterns.md

  User corrections applied over architect spec:
  1. External file fetch is NOT a gap -- git clone --depth 1 to .claude/worktrees/ handles it natively. No MCP tool needed.
  2. Do NOT create any tool for external file fetching.

