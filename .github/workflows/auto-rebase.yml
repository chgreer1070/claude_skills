name: Auto Rebase

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled]

# Minimal permissions by default
permissions: {}

jobs:
  rebase:
    name: Rebase
    # Run on PR comments containing "/rebase" or when the "autorebase" label is added
    if: |
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/rebase')) ||
      (github.event_name == 'pull_request' &&
       github.event.label.name == 'autorebase')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # NOTE: Use a Personal Access Token (PAT) here instead of GITHUB_TOKEN
          # if you want subsequent CI workflows to be triggered after the rebase
          # push. GITHUB_TOKEN pushes do not trigger new workflow runs by default.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Rebase
        uses: peter-evans/rebase@v3
        with:
          # NOTE: Replace secrets.GITHUB_TOKEN with a PAT (e.g., secrets.REBASE_TOKEN)
          # to ensure that the push after rebase triggers downstream CI workflows.
          # Using GITHUB_TOKEN here is sufficient for the rebase itself but will
          # not re-trigger other workflow runs on the resulting commit.
          token: ${{ secrets.GITHUB_TOKEN }}
