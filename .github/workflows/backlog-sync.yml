name: Backlog sync

on:
  push:
    branches:
      - main
    paths:
      - ".claude/backlog/**"

permissions:
  contents: write
  issues: write

jobs:
  sync:
    name: Sync P0/P1 to GitHub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          cache-python: true

      - name: Sync backlog to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run -q fastmcp call plugins/development-harness/.mcp.json backlog_backlog_sync

      - name: Commit and push if updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet .claude/backlog/; then
            echo "No changes to commit."
          else
            git add .claude/backlog/
            git commit -m "chore(backlog): sync P0/P1 items to GitHub issues [skip ci]"
            git push
          fi
