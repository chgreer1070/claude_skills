name: Code quality

on:
  push:
    branches:
      - main
  pull_request:

# Prevent duplicate runs when pushing to a PR branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

# Minimal permissions by default
permissions: {}

jobs:
  # =============================================================================
  # Python: Ruff linting and formatting (via prek — single config source)
  # =============================================================================
  lint-python:
    name: Python / Ruff
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup-python

      - name: Lint with Ruff
        run: uv run prek run ruff --all-files

      - name: Check formatting with Ruff
        run: uv run prek run ruff-format --all-files

  # =============================================================================
  # Python: Type checking with basedpyright
  # =============================================================================
  typecheck-python:
    name: Python / Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup-python

      - name: Run basedpyright
        run: uv run --with pep723-loader --with basedpyright pep723-loader basedpyright

  # =============================================================================
  # Python: Type checking with ty (Astral)
  # Blocking as of 2026-02-19 — CI run 22188303914 passed cleanly.
  # =============================================================================
  typecheck-ty:
    name: Python / ty
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup-python

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ty
        run: uv run ty check .

  # =============================================================================
  # JavaScript/TypeScript/JSON: Biome linting and formatting (via prek)
  # =============================================================================
  lint-js:
    name: JS/TS/JSON / Biome
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup-python

      - name: Run Biome
        run: uv run prek run biome-check --all-files

  # =============================================================================
  # Markdown: markdownlint (via prek)
  # =============================================================================
  lint-markdown:
    name: Markdown / markdownlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup-python

      - name: Run markdownlint-cli2
        run: uv run prek run markdownlint-cli2 --all-files

  # =============================================================================
  # Shell: shellcheck and shfmt (via prek)
  # =============================================================================
  lint-shell:
    name: Shell / shellcheck + shfmt
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup-python

      - name: Run shellcheck
        run: uv run prek run shellcheck --all-files

      - name: Run shfmt
        run: uv run prek run shell-fmt-go --all-files

  # =============================================================================
  # Local hooks: plugin validation (via prek)
  # Blocking since 2026-02-18 — all pre-existing errors resolved.
  # =============================================================================
  validate-plugins:
    name: Local / Plugin validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup-python

      - name: Validate plugins
        run: uv run prek run skilllint --all-files

  # =============================================================================
  # Local hooks: manifest sync (via prek)
  # Blocking — drift was resolved 2026-02-18.
  # =============================================================================
  manifest-sync:
    name: Local / Manifest sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup-python

      - name: Check manifest sync
        run: uv run prek run auto-sync-manifests --all-files

  # =============================================================================
  # File hygiene: trailing whitespace, line endings, etc.
  # Runs via prek (same hooks as pre-commit) — single source of truth.
  # Hooks run: trailing-whitespace, check-merge-conflict,
  #   mixed-line-ending, check-added-large-files, check-case-conflict,
  #   check-executables-have-shebangs, check-shebang-scripts-are-executable,
  #   check-yaml, check-json, check-toml, check-symlinks, destroyed-symlinks
  # =============================================================================
  file-hygiene:
    name: Files / Hygiene checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup-python

      - name: Fetch PR base for diff scope
        if: github.event_name == 'pull_request'
        run: git fetch --depth=1 origin ${{ github.event.pull_request.base.sha }}

      - name: Run file hygiene hooks
        env:
          SKIP: sync-pre-commit-deps,conventional-pre-commit,repair-symlinks,biome-check,ruff,ruff-format,pypfmt,markdownlint-cli2,shell-fmt-go,shellcheck,auto-sync-manifests,skilllint,ty,enable-rerere
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.sha }}
          GH_EVENT: ${{ github.event_name }}
        run: |
          if [ "$GH_EVENT" = "pull_request" ]; then
            uv run prek run --from-ref "$PR_BASE" --to-ref "$PR_HEAD"
          else
            uv run prek run --all-files
          fi

  # =============================================================================
  # Python: pytest test suite
  # =============================================================================
  test-python:
    name: Python / Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: ./.github/actions/setup-python

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pytest
        run: uv run pytest

  # =============================================================================
  # JavaScript/TypeScript: test suite
  # No tests defined yet — job passes when no test script exists in package.json,
  # and automatically becomes blocking once `npm test` is wired up.
  # =============================================================================
  test-node:
    name: JS/TS / Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests
        run: |
          if node -e "const p = require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)" 2>/dev/null; then
            npm test
          else
            echo "No test script defined in package.json — skipping"
          fi

  # =============================================================================
  # Summary job that requires all checks to pass
  # =============================================================================
  quality-gate:
    name: Quality Gate
    if: always()
    needs:
      - lint-python
      - typecheck-python
      - typecheck-ty
      - lint-js
      - lint-markdown
      - lint-shell
      - validate-plugins
      - manifest-sync
      - file-hygiene
      - test-python
      - test-node
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
