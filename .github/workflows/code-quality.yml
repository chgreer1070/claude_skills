name: Code quality

on:
  push:
    branches:
      - main
  pull_request:

# Prevent duplicate runs when pushing to a PR branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

# Minimal permissions by default
permissions: {}

jobs:
  # =============================================================================
  # Python: Ruff linting and formatting
  # =============================================================================
  lint-python:
    name: Python / Ruff
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Lint with Ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: "check --output-format=github"

      - name: Check formatting with Ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --diff"

  # =============================================================================
  # Python: Type checking with basedpyright
  # =============================================================================
  typecheck-python:
    name: Python / Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          cache-python: true

      - name: Run basedpyright
        run: uv run --with pep723-loader --with basedpyright pep723-loader basedpyright

  # =============================================================================
  # Python: Type checking with ty (Astral)
  # Blocking as of 2026-02-19 — CI run 22188303914 passed cleanly.
  # =============================================================================
  typecheck-ty:
    name: Python / ty
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          cache-python: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ty
        run: uv run ty check .

  # =============================================================================
  # JavaScript/TypeScript: Biome linting and formatting
  # =============================================================================
  lint-js:
    name: JS/TS / Biome
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.3.13

      - name: Run Biome
        run: biome ci --error-on-warnings .

  # =============================================================================
  # Markdown: markdownlint
  # =============================================================================
  lint-markdown:
    name: Markdown / markdownlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Run markdownlint-cli2
        run: npx markdownlint-cli2@0.19.1 "**/*.md" "#node_modules" "#.venv"

  # =============================================================================
  # Shell: shellcheck and shfmt
  # =============================================================================
  lint-shell:
    name: Shell / shellcheck + shfmt
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Find shell scripts
        id: find-scripts
        run: |
          # Find .sh files and files with shell shebangs
          scripts=$(find . -type f \( -name "*.sh" -o -name "*.bash" \) -not -path "./.venv/*" -not -path "./node_modules/*" 2>/dev/null || true)
          shebang_scripts=$(grep -rlE "^#!.*/(ba)?sh" --include="*" . 2>/dev/null | grep -v ".venv" | grep -v "node_modules" || true)
          all_scripts=$(echo -e "$scripts\n$shebang_scripts" | sort -u | grep -v "^$" || true)

          if [ -z "$all_scripts" ]; then
            echo "has_scripts=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_scripts=true" >> "$GITHUB_OUTPUT"
            echo "scripts<<EOF" >> "$GITHUB_OUTPUT"
            echo "$all_scripts" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Run shellcheck
        if: steps.find-scripts.outputs.has_scripts == 'true'
        run: |
          echo "${{ steps.find-scripts.outputs.scripts }}" | xargs shellcheck -f gcc || true

      - name: Run shfmt
        if: steps.find-scripts.outputs.has_scripts == 'true'
        run: |
          echo "${{ steps.find-scripts.outputs.scripts }}" | xargs shfmt -d -i 4 -ci || true

  # =============================================================================
  # JSON: Prettier formatting
  # =============================================================================
  lint-json:
    name: JSON / Prettier
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Check JSON formatting
        run: npx prettier@3.5.3 --check "**/*.json" --ignore-path .gitignore

  # =============================================================================
  # Local hooks: frontmatter validation (blocking)
  # validate_frontmatter.py was consolidated into plugin_validator.py
  # (refactor: consolidate frontmatter validation into shared frontmatter_core module)
  # Frontmatter is now validated by the validate-plugins job below.
  # =============================================================================

  # =============================================================================
  # Local hooks: plugin validation (plugin_validator.py)
  # Blocking since 2026-02-18 — all pre-existing errors resolved.
  # =============================================================================
  validate-plugins:
    name: Local / Plugin validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          cache-python: true

      - name: Validate plugins
        run: |
          uv run plugins/plugin-creator/scripts/plugin_validator.py \
            $(find plugins .claude -type f \( -name 'SKILL.md' -o -path '*/agents/*.md' -o -path '*/commands/*.md' -o -name 'plugin.json' \) \
              -not -path './.venv/*' -not -path './node_modules/*' 2>/dev/null)

  # =============================================================================
  # Local hooks: manifest sync (auto_sync_manifests.py)
  # Blocking — drift was resolved 2026-02-18.
  # =============================================================================
  manifest-sync:
    name: Local / Manifest sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          cache-python: true

      - name: Check manifest sync
        run: uv run plugins/plugin-creator/scripts/auto_sync_manifests.py --reconcile --dry-run

  # =============================================================================
  # File hygiene: trailing whitespace, line endings, etc.
  # Runs via prek (same hooks as pre-commit) — single source of truth.
  # Hooks run: trailing-whitespace, check-merge-conflict,
  #   mixed-line-ending, check-added-large-files, check-case-conflict,
  #   check-executables-have-shebangs, check-shebang-scripts-are-executable,
  #   check-yaml, check-json, check-toml, check-symlinks, destroyed-symlinks
  # =============================================================================
  file-hygiene:
    name: Files / Hygiene checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          cache-python: true

      - name: Run file hygiene hooks
        run: |
          SKIP=sync-pre-commit-deps,conventional-pre-commit,repair-symlinks,biome-check,ruff,ruff-format,pypfmt,markdownlint-cli2,prettier,shell-fmt-go,shellcheck,auto-sync-manifests,plugin-validator,ty,enable-rerere \
          uv run prek run --all-files

  # =============================================================================
  # Python: pytest test suite
  # =============================================================================
  test-python:
    name: Python / Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          cache-python: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run pytest
        run: uv run pytest

  # =============================================================================
  # JavaScript/TypeScript: test suite
  # No tests defined yet — job passes when no test script exists in package.json,
  # and automatically becomes blocking once `npm test` is wired up.
  # =============================================================================
  test-node:
    name: JS/TS / Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests
        run: |
          if node -e "const p = require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)" 2>/dev/null; then
            npm test
          else
            echo "No test script defined in package.json — skipping"
          fi

  # =============================================================================
  # Summary job that requires all checks to pass
  # =============================================================================
  quality-gate:
    name: Quality Gate
    if: always()
    needs:
      - lint-python
      - typecheck-python
      - typecheck-ty
      - lint-js
      - lint-markdown
      - lint-shell
      - lint-json
      - validate-plugins
      - manifest-sync
      - file-hygiene
      - test-python
      - test-node
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
