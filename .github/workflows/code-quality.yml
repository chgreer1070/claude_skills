name: Code quality

on:
  push:
    branches:
      - main
  pull_request:

# Prevent duplicate runs when pushing to a PR branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

# Minimal permissions by default
permissions: {}

jobs:
  # =============================================================================
  # Python: Ruff linting and formatting
  # =============================================================================
  lint-python:
    name: Python / Ruff
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Lint with Ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: "check --output-format=github"

      - name: Check formatting with Ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --diff"

  # =============================================================================
  # Python: Type checking with basedpyright
  # =============================================================================
  typecheck-python:
    name: Python / Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          cache-python: true

      - name: Run basedpyright
        run: uv run --with pep723-loader --with basedpyright pep723-loader basedpyright

  # =============================================================================
  # Python: Type checking with ty (Astral)
  # Blocking as of 2026-02-19 — CI run 22188303914 passed cleanly.
  # =============================================================================
  typecheck-ty:
    name: Python / ty
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          cache-python: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ty
        run: uv run ty check .

  # =============================================================================
  # JavaScript/TypeScript: Biome linting and formatting
  # =============================================================================
  lint-js:
    name: JS/TS / Biome
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.3.13

      - name: Run Biome
        run: biome ci --error-on-warnings .

  # =============================================================================
  # Markdown: markdownlint
  # =============================================================================
  lint-markdown:
    name: Markdown / markdownlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Run markdownlint-cli2
        run: npx markdownlint-cli2@0.19.1 "**/*.md" "#node_modules" "#.venv"

  # =============================================================================
  # Shell: shellcheck and shfmt
  # =============================================================================
  lint-shell:
    name: Shell / shellcheck + shfmt
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Find shell scripts
        id: find-scripts
        run: |
          # Find .sh files and files with shell shebangs
          scripts=$(find . -type f \( -name "*.sh" -o -name "*.bash" \) -not -path "./.venv/*" -not -path "./node_modules/*" 2>/dev/null || true)
          shebang_scripts=$(grep -rlE "^#!.*/(ba)?sh" --include="*" . 2>/dev/null | grep -v ".venv" | grep -v "node_modules" || true)
          all_scripts=$(echo -e "$scripts\n$shebang_scripts" | sort -u | grep -v "^$" || true)

          if [ -z "$all_scripts" ]; then
            echo "has_scripts=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_scripts=true" >> "$GITHUB_OUTPUT"
            echo "scripts<<EOF" >> "$GITHUB_OUTPUT"
            echo "$all_scripts" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Run shellcheck
        if: steps.find-scripts.outputs.has_scripts == 'true'
        run: |
          echo "${{ steps.find-scripts.outputs.scripts }}" | xargs shellcheck -f gcc || true

      - name: Run shfmt
        if: steps.find-scripts.outputs.has_scripts == 'true'
        run: |
          echo "${{ steps.find-scripts.outputs.scripts }}" | xargs shfmt -d -i 4 -ci || true

  # =============================================================================
  # JSON: Prettier formatting
  # =============================================================================
  lint-json:
    name: JSON / Prettier
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Check JSON formatting
        run: npx prettier@3.5.3 --check "**/*.json" --ignore-path .gitignore

  # =============================================================================
  # Local hooks: frontmatter validation (blocking)
  # =============================================================================
  validate-frontmatter:
    name: Local / Frontmatter
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          cache-python: true

      - name: Validate frontmatter
        run: uv run plugins/plugin-creator/scripts/validate_frontmatter.py --check

  # =============================================================================
  # Local hooks: plugin validation (plugin_validator.py)
  # Blocking since 2026-02-18 — all pre-existing errors resolved.
  # =============================================================================
  validate-plugins:
    name: Local / Plugin validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          cache-python: true

      - name: Validate plugins
        run: |
          uv run plugins/plugin-creator/scripts/plugin_validator.py \
            $(find plugins .claude -type f \( -name 'SKILL.md' -o -path '*/agents/*.md' -o -path '*/commands/*.md' -o -name 'plugin.json' \) \
              -not -path './.venv/*' -not -path './node_modules/*' 2>/dev/null)

  # =============================================================================
  # Local hooks: manifest sync (auto_sync_manifests.py)
  # Blocking — drift was resolved 2026-02-18.
  # =============================================================================
  manifest-sync:
    name: Local / Manifest sync
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "**/uv.lock"
          cache-python: true

      - name: Check manifest sync
        run: uv run plugins/plugin-creator/scripts/auto_sync_manifests.py --reconcile --dry-run

  # =============================================================================
  # File hygiene: trailing whitespace, line endings, etc.
  # =============================================================================
  file-hygiene:
    name: Files / Hygiene checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Check for trailing whitespace
        run: |
          ! git grep -lE '\s+$' -- ':!*.lock' ':!.venv/*' ':!node_modules/*' || {
            echo "::error::Files with trailing whitespace found"
            exit 1
          }

      - name: Check for missing final newline
        run: |
          files_missing_newline=""
          while IFS= read -r -d '' file; do
            if [ -f "$file" ] && [ ! -L "$file" ] && [ -s "$file" ] && [ "$(tail -c 1 "$file" | wc -l)" -eq 0 ]; then
              files_missing_newline="$files_missing_newline $file"
            fi
          done < <(git ls-files -z -- ':!*.lock' ':!.venv/*' ':!node_modules/*' ':!*.png' ':!*.jpg' ':!*.gif' ':!*.ico')

          if [ -n "$files_missing_newline" ]; then
            echo "::error::Files missing final newline:$files_missing_newline"
            exit 1
          fi

      - name: Check for merge conflict markers
        run: |
          # Only match unambiguous conflict markers (<<<<<<< and >>>>>>>).
          # Excludes ======= which is valid RST heading underline syntax.
          conflict_files=$(git grep -lE '^(<{7}|>{7})( |$)' -- ':!*.lock' ':!.venv/*' ':!node_modules/*' || true)
          if [ -n "$conflict_files" ]; then
            echo "::error::Files with merge conflict markers found:"
            echo "$conflict_files"
            exit 1
          fi

      - name: Check for mixed line endings
        run: |
          mixed=""
          while IFS= read -r -d '' file; do
            if [ -f "$file" ] && [ ! -L "$file" ] && [ -s "$file" ] && file "$file" | grep -q "text"; then
              if grep -Pql '\r\n' "$file" 2>/dev/null; then
                mixed="$mixed $file"
              fi
            fi
          done < <(git ls-files -z -- ':!*.lock' ':!.venv/*' ':!node_modules/*' ':!*.png' ':!*.jpg' ':!*.gif' ':!*.ico')

          if [ -n "$mixed" ]; then
            echo "::error::Files with CRLF line endings (should be LF):$mixed"
            exit 1
          fi

      - name: Check for broken symlinks
        run: |
          broken=""
          while IFS= read -r -d '' file; do
            if [ -L "$file" ] && [ ! -e "$file" ]; then
              broken="$broken $file"
            fi
          done < <(git ls-files -z)

          if [ -n "$broken" ]; then
            echo "::error::Broken symlinks found:$broken"
            exit 1
          fi

      - name: Check for large files
        run: |
          # 10MB limit, matching prek check-added-large-files --maxkb=10000
          large_files=$(git ls-files -z | xargs -0 -I{} find {} -maxdepth 0 -size +10M 2>/dev/null || true)
          if [ -n "$large_files" ]; then
            echo "::error::Files exceeding 10MB limit:"
            echo "$large_files"
            exit 1
          fi

      - name: Check executables have shebangs
        run: |
          errors=""
          while IFS= read -r -d '' file; do
            if [ -x "$file" ] && [ -f "$file" ] && [ ! -L "$file" ] && [ -s "$file" ] && file "$file" | grep -q "text"; then
              first_bytes=$(head -c 2 "$file")
              if [ "$first_bytes" != "#!" ]; then
                errors="$errors $file"
              fi
            fi
          done < <(git ls-files -z -- ':!*.lock' ':!.venv/*' ':!node_modules/*')

          if [ -n "$errors" ]; then
            echo "::error::Executable files missing shebangs:$errors"
            exit 1
          fi

      - name: Check shebang scripts are executable
        run: |
          errors=""
          while IFS= read -r -d '' file; do
            if [ -f "$file" ] && [ ! -L "$file" ] && [ -s "$file" ]; then
              first_bytes=$(head -c 2 "$file")
              if [ "$first_bytes" = "#!" ] && [ ! -x "$file" ]; then
                errors="$errors $file"
              fi
            fi
          done < <(git ls-files -z -- ':!*.lock' ':!.venv/*' ':!node_modules/*')

          if [ -n "$errors" ]; then
            echo "::error::Scripts with shebangs missing executable permission:$errors"
            exit 1
          fi

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Check JSON syntax
        run: |
          uv run python -c "
          import json
          import sys
          from pathlib import Path

          errors = []
          for f in Path('.').rglob('*.json'):
              if '.venv' in str(f) or 'node_modules' in str(f):
                  continue
              try:
                  json.loads(f.read_text())
              except json.JSONDecodeError as e:
                  errors.append(f'{f}: {e}')

          if errors:
              for e in errors:
                  print(f'::error::{e}')
              sys.exit(1)
          "

      - name: Check TOML syntax
        run: |
          uv run python -c "
          import tomllib
          import sys
          from pathlib import Path

          errors = []
          for f in Path('.').rglob('*.toml'):
              if '.venv' in str(f) or 'node_modules' in str(f):
                  continue
              try:
                  tomllib.loads(f.read_text())
              except tomllib.TOMLDecodeError as e:
                  errors.append(f'{f}: {e}')

          if errors:
              for e in errors:
                  print(f'::error::{e}')
              sys.exit(1)
          "

      - name: Check YAML syntax
        run: |
          uv run --with pyyaml python -c "
          import yaml
          import sys
          from pathlib import Path

          errors = []
          for f in Path('.').rglob('*.yml'):
              if '.venv' in str(f) or 'node_modules' in str(f):
                  continue
              try:
                  yaml.safe_load(f.read_text())
              except yaml.YAMLError as e:
                  errors.append(f'{f}: {e}')

          for f in Path('.').rglob('*.yaml'):
              if '.venv' in str(f) or 'node_modules' in str(f):
                  continue
              try:
                  yaml.safe_load(f.read_text())
              except yaml.YAMLError as e:
                  errors.append(f'{f}: {e}')

          if errors:
              for e in errors:
                  print(f'::error::{e}')
              sys.exit(1)
          "

      - name: Check for case conflicts
        run: |
          git ls-files | sort -f | uniq -di | while read -r file; do
            echo "::error::Case conflict detected: $file"
            exit 1
          done

  # =============================================================================
  # Summary job that requires all checks to pass
  # =============================================================================
  quality-gate:
    name: Quality Gate
    if: always()
    needs:
      - lint-python
      - typecheck-python
      - typecheck-ty
      - lint-js
      - lint-markdown
      - lint-shell
      - lint-json
      - validate-frontmatter
      - validate-plugins
      - manifest-sync
      - file-hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
