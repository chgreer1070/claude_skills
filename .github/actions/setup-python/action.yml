name: Setup Python
description: Checkout repo and set up uv + Python 3.11 with caching

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        persist-credentials: false

    - name: Setup uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: "3.11"
        enable-cache: true
        cache-dependency-glob: "**/uv.lock"
        cache-python: true
