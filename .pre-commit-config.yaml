# prek - Pre-commit Re-engineered in Rust
# install via: `uv tool install prek`
# prek is a Rust-based drop-in replacement for pre-commit created by https://github.com/j178/prek
# Sources:
# - https://github.com/j178/prek
# - https://prek.j178.dev/
# - https://pypi.org/project/prek/
# - https://hugovk.dev/blog/2025/ready-prek-go/
# - https://pydevtools.com/blog/prek-pre-commit-but-fast/

# Global exclude: scratch/temp files are never project-quality — skip all hooks
exclude: '^\.tmp/'

default_stages:
  - commit-msg
  - pre-commit

repos:
  - repo: https://github.com/mxr/sync-pre-commit-deps
    rev: v0.0.3
    hooks:
      - id: sync-pre-commit-deps

  # prek now correctly passes commit message file path (issue #1194 fixed)
  - repo: local
    hooks:
      - id: conventional-pre-commit
        name: Conventional Commit
        stages: [commit-msg]
        language: system
        always_run: true
        entry: uv run --with conventional-pre-commit conventional-pre-commit --strict --force-scope

  # Repair destroyed symlinks (Windows: core.symlinks false → plain files)
  - repo: local
    hooks:
      - id: repair-symlinks
        name: Repair destroyed Git symlinks
        entry: uv run -q scripts/repair_symlinks.py
        language: system
        stages: [pre-commit]
        pass_filenames: false
      # Local check-symlinks: upstream uses os.path.exists() which returns False
      # for valid symlinks on Windows. We use Path.resolve().exists() instead.
      - id: check-symlinks
        name: Check for broken symlinks
        entry: uv run -q scripts/check_symlinks.py
        language: system
        stages: [pre-commit]
        pass_filenames: true

  # Standard pre-commit hooks for general file maintenance
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: destroyed-symlinks
        name: Detect destroyed symlinks
        description: fails if symlinks were converted to plain files (run after repair-symlinks)
      - id: trailing-whitespace
        exclude: (\.lock$|.*requirements\.txt|plans?/.*|.claude/backlog/.*|.claude/reports/.*)$
      - id: check-yaml
        args: [--unsafe] # Allow Python tags in mkdocs.yml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=10000"] # 10MB limit
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # TOML sorting and formatting
  - repo: https://github.com/bitflight-devops/pyproject-fmt
    rev: v1.1.5
    hooks:
      - id: pypfmt
        name: Sort and format pyproject.toml with pypfmt
        language: system
        # PYTHONUTF8=1 required: pypfmt calls taplo via subprocess.run(text=True)
        # which defaults to cp1252 on Windows, causing taplo to fail silently.
        entry: env PYTHONUTF8=1 uv run -q --with pypfmt pypfmt
        files: ^pyproject\.toml$

  # Python formatting and linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        name: Lint Python with ruff
        args: [--fix]
      - id: ruff-format
        name: Format Python with ruff
  # JavaScript/TypeScript formatting and linting with Biome
  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.8
    hooks:
      - id: biome-check

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.0
    hooks:
      - id: markdownlint-cli2
        exclude: ^(plan/|\.claude/backlog/|\.claude/BACKLOG\.md)

  # Shell formatting
  - repo: https://github.com/pecigonzalo/pre-commit-shfmt
    rev: v2.2.0
    hooks:
      - id: shell-fmt-go
        args:
          - "--apply-ignore"
          - -w
          - -i
          - "4"
          - -ci

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  # Local hooks for type checking
  - repo: local
    hooks:
      - id: auto-sync-manifests
        name: Auto-sync plugin and marketplace manifests
        entry: uv run -q --no-sync plugins/plugin-creator/scripts/auto_sync_manifests.py
        language: system
        stages: [pre-commit]
        pass_filenames: false
        files: ^plugins/

      - id: check-agent-auto-discovery
        name: Guard against plugin.json masking auto-discovered agents/commands
        entry: uv run -q --no-sync plugins/plugin-creator/scripts/check_agent_auto_discovery.py
        language: system
        stages: [pre-commit]
        pass_filenames: true
        files: ^plugins/.*/\.claude-plugin/plugin\.json$
        always_run: false

      - id: skilllint
        name: Validate and fix plugins, skills, agents, commands
        entry: uvx skilllint@latest check --fix
        language: system
        stages: [pre-commit]
        pass_filenames: true
        # TODO: re-add hooks\.json after skilllint publishes TaskCompleted event support
        files: ^(plugins|\.claude)/.*(SKILL\.md|CLAUDE\.md|agents/.*\.md|commands/.*\.md|plugin\.json)$

      - id: check-compat-annotations
        name: Check COMPAT annotation completeness
        entry: uv run -q scripts/check_compat_annotations.py
        language: system
        types: [python]

      - id: ty
        name: ty check
        entry: uv run -q --frozen --with ty ty check
        language: system
        types: [python]
        pass_filenames: true
        exclude: 'plugins/development-harness/skills/implementation-manager/.*|plugins/uv/skills/uv/.*'

      - id: enable-rerere
        name: Enable git rerere (auto-replay conflict resolutions)
        entry: bash -c 'git config rerere.enabled true && git config rerere.autoupdate true'
        language: system
        stages: [pre-rebase, post-merge]
        always_run: true
        pass_filenames: false


# Configuration for specific hooks
default_language_version:
  python: python3
