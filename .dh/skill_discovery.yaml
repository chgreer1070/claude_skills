# .dh/skill_discovery.yaml
# Generated by /dh:setup-skill-discovery wizard (AUTO_MODE)
# Review and adjust entries as needed.

skill_discovery: auto   # auto | suggest | off

always_use_skills:      # unconditional; applied to every feature
  []                    # No unconditional skills — all conditional via skill_rules

prefer_skills:          # tiebreaker advisory; not added unconditionally
  []

avoid_skills:           # never inject; overrides all rules
  []

skill_rules:
  # Python typing, Protocol, and Pydantic patterns
  - when: "involves Python Protocol, BacklogBackend, type annotations, Pydantic models, or typing"
    use:
      - python-engineering:python3-typing   # AUTO_MODE: review and adjust as needed
    # Reason: backlog_core uses Python Protocol and Pydantic extensively; type safety is enforced by ty

  # Python testing patterns (pytest, fixtures, parametrize)
  - when: "involves pytest, test files, test coverage, or Python tests"
    use:
      - python-engineering:python3-testing  # AUTO_MODE: review and adjust as needed
    # Reason: backlog_core tests use pytest; test migration may be needed for rendering tests

  # Modern Python patterns (dataclasses, walrus, structural pattern matching)
  - when: "involves Python refactoring, modernizing Python code, or Python best practices"
    use:
      - python-engineering:modernpython     # AUTO_MODE: review and adjust as needed
    # Reason: Protocol extension and backend refactoring benefits from modern Python idioms

  # FastMCP server patterns (tools, resources, lifecycle)
  - when: "involves MCP server, FastMCP tools, backlog server, SAM server, or MCP protocol"
    use:
      - fastmcp-creator:fastmcp-creator     # AUTO_MODE: review and adjust as needed
    # Reason: backlog_core/server.py is a FastMCP server; MCP tool changes require understanding FastMCP patterns

  # Claude Code plugin authoring (agents, skills, hooks, plugin.json)
  - when: "involves plugin structure, agent files, skill files, hooks, or plugin.json"
    use:
      - plugin-creator:claude-plugins-reference-2026  # AUTO_MODE: review and adjust as needed
    # Reason: Claude Code plugin project — agents and skills require correct frontmatter and schema
